function snd(t){if(!ac)return;const n=ac.currentTime,g=ac.createGain(),o=ac.createOscillator();
o.connect(g);g.connect(ac.destination);
const P={hit_l:[180,'square',.15,.1],hit_m:[220,'square',.12,.12],hit_h:[80,'sawtooth',.25,.18],
block:[700,'triangle',.08,.07],ko:[50,'sawtooth',.35,1.2],
special:[350,'square',.15,.22],super:[250,'sawtooth',.22,.5],
round:[523,'square',.12,.35],fight:[400,'sawtooth',.18,.45],sel:[660,'triangle',.07,.1],
nocaute:[150,'sawtooth',.3,.9],throw:[100,'sawtooth',.2,.3],dash:[500,'triangle',.08,.05],
fatality:[30,'sawtooth',.4,2],finish:[80,'square',.3,1.5],dramatic:[200,'sawtooth',.25,.6],
mp:[250,'square',.1,.12],mk:[300,'square',.12,.14]};
const p=P[t];if(!p)return;
o.frequency.value=p[0];o.type=p[1];g.gain.setValueAtTime(p[2],n);
g.gain.exponentialRampToValueAtTime(.001,n+p[3]);o.start(n);o.stop(n+p[3]);
if(t==='super'){const o2=ac.createOscillator();o2.connect(g);o2.type='square';
o2.frequency.value=600;o2.start(n+.08);o2.stop(n+.35);}
if(t==='fight'){o.frequency.linearRampToValueAtTime(900,n+.2);}
if(t==='ko'){const o2=ac.createOscillator(),g2=ac.createGain();
o2.connect(g2);g2.connect(ac.destination);o2.type='sine';o2.frequency.value=35;
g2.gain.setValueAtTime(.4,n);g2.gain.exponentialRampToValueAtTime(.001,n+1.5);
o2.start(n);o2.stop(n+1.5);}

GP.hk=(g.buttons[1]&&g.buttons[1].pressed)?1:0;
GP.mp=(g.buttons[4]&&g.buttons[4].pressed)?1:0;
GP.mk=(g.buttons[5]&&g.buttons[5].pressed)?1:0;
GP.bl=((g.buttons[6]&&g.buttons[6].pressed)||(g.buttons[7]&&g.buttons[7].pressed))?1:0;

const d=I.d?'D':'';const u=I.u?'U':'';const l=I.l?'L':'';const r=I.r?'R':'';

if(IBUF.length===0||IBUF[IBUF.length-1].d!==dir){
IBUF.push({d:dir,t:performance.now()});
if(IBUF.length>IBUF_MAX)IBUF.shift();}}
function checkMotion(seq,fc){
// seq like ['D','DR','R'] for QCF when facing right
const now=performance.now();const window=300;
let si=seq.length-1;
for(let i=IBUF.length-1;i>=0&&si>=0;i--){
if(now-IBUF[i].t>window)break;
let expected=seq[si];
if(fc===-1){expected=expected.replace('R','$').replace('L','R').replace('$','L');}
if(IBUF[i].d===expected)si--;
}return si<0;}
function isQCF(fc){return checkMotion(['D','DR','R'],fc)||checkMotion(['D','R'],fc);}
function isQCB(fc){return checkMotion(['D','DL','L'],fc)||checkMotion(['D','L'],fc);}
function isDP(fc){return checkMotion(['R','D','DR'],fc)||checkMotion(['R','DR'],fc);}
function isCharge(fc){// simplified - just back then forward
const now=performance.now();let hadBack=false;
for(let i=0;i<IBUF.length;i++){
if(now-IBUF[i].t>600)continue;
const b=fc===1?'L':'R';const f=fc===1?'R':'L';
if(IBUF[i].d===b)hadBack=true;
if(hadBack&&IBUF[i].d===f)return true;}return false;}

const PT=[];const PT_MAX=80;
function spP(x,y,c,n,s,life,tp){for(let i=0;i<Math.min(n,PT_MAX-PT.length);i++){
const a=Math.random()*6.28;PT.push({x,y,vx:Math.cos(a)*s*(.4+Math.random()*.8),
vy:Math.sin(a)*s*(.4+Math.random()*.8)-1.5,l:life||1,dc:.02+Math.random()*.03,
sz:tp==='spark'?1+Math.random()*2:2+Math.random()*5,c,tp:tp||'dot'});}}
function spImpact(x,y,c,n){// directional impact sparks
for(let i=0;i<Math.min(n,PT_MAX-PT.length);i++){
const a=-1+Math.random()*2;PT.push({x,y,vx:a*6,vy:-2-Math.random()*4,
l:.8,dc:.04,sz:1+Math.random()*2,c,tp:'spark'});}}
function spRing(x,y,c){PT.push({x,y,vx:0,vy:0,l:1,dc:.08,sz:5,c,tp:'ring',maxSz:40});}
function uPT(){for(let i=PT.length-1;i>=0;i--){const p=PT[i];
if(p.tp==='ring'){p.sz+=(p.maxSz-p.sz)*.2;p.l-=p.dc;}
else{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l-=p.dc;}
if(p.l<=0)PT.splice(i,1);}}
function dPT(){for(const p of PT){cx.globalAlpha=Math.max(0,p.l*.8);cx.fillStyle=p.c;
if(p.tp==='spark'){cx.save();cx.translate(p.x*S,p.y*S);
const a=Math.atan2(p.vy,p.vx);cx.rotate(a);
cx.fillRect(0,-S,p.sz*3*S,2*S);cx.restore();}
else if(p.tp==='ring'){cx.strokeStyle=p.c;cx.lineWidth=2*S;
cx.beginPath();cx.arc(p.x*S,p.y*S,p.sz*S,0,6.28);cx.stroke();}
else{cx.beginPath();cx.arc(p.x*S,p.y*S,p.sz*S,0,6.28);cx.fill();}}cx.globalAlpha=1;}

function uDmgNums(){for(let i=DMG_NUMS.length-1;i>=0;i--){
const d=DMG_NUMS[i];d.y+=d.vy;d.vy+=.05;d.l-=.02;if(d.l<=0)DMG_NUMS.splice(i,1);}}

/* === COMBO SYSTEM === */
const COMBO_WINDOW=14;// frames to input next hit
class ComboTracker{
constructor(){this.reset();}
reset(){this.seq=[];this.timer=0;this.count=0;this.maxC=0;this.dmgTotal=0;this.juggle=0;}
addHit(dm){this.count++;this.dmgTotal+=dm;this.timer=COMBO_WINDOW;
if(this.count>this.maxC)this.maxC=this.count;}
tick(){if(this.timer>0){this.timer--;if(this.timer<=0&&this.count>0){this.count=0;this.dmgTotal=0;}}}
}

/* === FIGHTER CLASS === */
class F{
constructor(ch,x,fc,ai){
this.ch=ch;this.x=x;this.y=460;this.vx=0;this.vy=0;this.fc=fc;
this.hp=ch.hp;this.mhp=ch.hp;this.sp=0;this.st='idle';this.stT=0;
this.af=0;this.at=0;this.hs=0;this.bks=0;this.atk=0;
this.cm=null;this.mf=0;this.hc=0;
this.combo=new ComboTracker();this.mxc=0;
this.ai=ai;this.cr=0;this.bl=0;this.inv=0;this.fl=0;
this.rw=0;this.w=62;this.h=190*ch.tall;this.sa=0;this.ko=0;
this.px=0;this.py=0;this.pvx=0;this.pl=0;this.pa=0;
this.ait=0;this.aic=0;this.juggle=0;
this.dashF=0;this.dashB=0;this.dashT=0;
this.fatality=0;this.fatT=0;
this.comboStr=[];this.comboStrT=0;
this.inputBuf=[];
}
get gd(){return this.y>=460}
reset(x,f){this.x=x;this.y=460;this.vx=0;this.vy=0;this.hp=this.mhp;
this.sp=0;this.st='idle';this.hs=0;this.bks=0;this.atk=0;
this.cm=null;this.mf=0;this.hc=0;this.combo.reset();this.cr=0;this.bl=0;
this.inv=0;this.fl=0;this.fc=f;this.pa=0;this.sa=0;this.ko=0;
this.juggle=0;this.dashF=0;this.dashB=0;this.fatality=0;this.fatT=0;
this.comboStr=[];this.comboStrT=0;this.inputBuf=[];}
upd(inp,opp){
if(this.fatality){this.fatT++;return;}
if(this.st==='ko'){this.ko++;return;}
if(this.inv>0)this.inv--;
if(this.fl>0)this.fl--;
this.combo.tick();
if(this.comboStrT>0)this.comboStrT--;
if(this.hs>0){this.hs--;this.vx*=.9;if(!this.hs){this.st='idle';this.atk=0;}this.phy();return;}
if(this.bks>0){this.bks--;this.vx*=.9;if(!this.bks){this.st='idle';this.bl=0;}this.phy();return;}
if(!this.atk&&this.gd){if(opp.x>this.x+8)this.fc=1;else if(opp.x<this.x-8)this.fc=-1;}
if(this.atk&&this.cm){this.mf++;
if(this.mf>=this.cm.su+this.cm.ac+this.cm.rc){this.atk=0;this.cm=null;this.mf=0;
this.st=this.gd?'idle':'jump';this.hc=0;}this.phy();return;}
if(this.sa>0){this.sa--;if(!this.sa){this.atk=0;this.st='idle';}this.phy();return;}
this.cr=0;this.bl=0;
// Track input for combo strings
if(inp._lp)this.inputBuf.push(0);
else if(inp._mp)this.inputBuf.push(1);
else if(inp._hp)this.inputBuf.push(2);
else if(inp._lk)this.inputBuf.push(3);
else if(inp._mk)this.inputBuf.push(4);
else if(inp._hk)this.inputBuf.push(5);
if(this.inputBuf.length>6)this.inputBuf.shift();
if(this.gd){
this.vx=0;
if(inp.bl){this.bl=1;this.st='block';}
else if(inp.d){this.cr=1;this.st='crouch';
if(inp._lp)this.doA('clp');
else if(inp._mk)this.doA('cmk');
else if(inp._hk)this.doA('chk');
else if(inp._sweep)this.doA('sweep');}
else{
// Dash detection
if(inp._dashF){this.vx=this.fc*this.ch.spd*2.5;this.dashT=8;this.st='dash';snd('dash');}
else if(inp._dashB){this.vx=-this.fc*this.ch.spd*2;this.dashT=8;this.st='dash';snd('dash');}
if(this.dashT>0){this.dashT--;if(!this.dashT)this.st='idle';}
else{
if(inp.l)this.vx=-this.ch.spd;if(inp.r)this.vx=this.ch.spd;
if(inp.u){this.vy=this.ch.jmp;this.st='jump';snd('sel');}
// Special moves (priority: Super > Special > Normal)
if(inp._su&&this.sp>=100)this.doSu();
else if(inp._fatality&&opp.hp<=0)this.doFatality(opp);
else if(inp._sp1)this.doSp(1);
else if(inp._sp2)this.doSp(2);
else if(inp._sp3)this.doSp(3);
else if(inp._throw_f&&Math.abs(this.x-opp.x)<50)this.doThrow(opp,1);
else if(inp._throw_b&&Math.abs(this.x-opp.x)<50)this.doThrow(opp,-1);
// Normal attacks
else if(inp._lp)this.doA('lp');
else if(inp._mp)this.doA('mp');
else if(inp._hp)this.doA('hp');
else if(inp._lk)this.doA('lk');
else if(inp._mk)this.doA('mk');
else if(inp._hk)this.doA('hk');
if(this.vx&&!this.atk&&this.st!=='dash')this.st='walk';
else if(!this.atk&&this.st!=='dash')this.st='idle';
}}}else{
if(inp.l)this.vx=Math.max(-this.ch.spd,this.vx-.3);
if(inp.r)this.vx=Math.min(this.ch.spd,this.vx+.3);
if(inp._lp)this.doA('jlp');
else if(inp._hk)this.doA('jhk');
else if(inp._mk)this.doA('jdive');}
this.phy();this.at++;if(this.at>7){this.at=0;this.af=(this.af+1)%4;}
if(this.pa){this.px+=this.pvx;this.pl--;if(this.pl<=0||this.px<0||this.px>GW)this.pa=0;}
}
phy(){this.x+=this.vx;if(!this.gd){this.vy+=.55;this.y+=this.vy;}
if(this.y>=460){this.y=460;this.vy=0;this.juggle=0;}
this.x=Math.max(35,Math.min(GW-35,this.x));}
doA(t){if(this.atk)return;const m=MV[t];if(!m)return;
this.atk=1;this.cm={...m,tp:t};this.mf=0;this.hc=0;this.st='attack';
const sn=t.includes('h')?'hit_h':t.includes('m')?'hit_m':'sel';snd(sn);}
doSp(n){if(this.atk)return;this.atk=1;this.mf=0;this.hc=0;
const dmKey='sp'+n+'D';const dm=this.ch[dmKey]||100;
this.st='sp'+n;
const frames=n===3?{su:6,ac:8,rc:10}:{su:5,ac:6,rc:12};
this.cm={...frames,dm,kb:10+n*3,hs:16+n*2,bs:10,rg:85+n*10,tp:'sp'+n};
if(n===1&&this.ch.proj){this.pa=1;this.px=this.x+this.fc*35;this.py=this.y-60;
this.pvx=this.fc*9;this.pl=50;}
if(n===2){if(this.ch.id==='leon'||this.ch.id==='togado'||this.ch.id==='duce')this.vx=this.fc*8;
else this.vy=-10;}
if(n===3){this.inv=6;this.vy=-8;this.vx=this.fc*3;}
this.sp=Math.min(100,this.sp+12);snd('special');}
doSu(){if(this.sp<100||this.atk)return;this.atk=1;this.mf=0;this.hc=0;this.st='super';
this.sa=50;this.sp=0;this.inv=50;
this.cm={su:10,ac:25,rc:12,dm:this.ch.suD,kb:25,hs:30,bs:15,rg:110,tp:'super'};
spP(this.x,this.y-70,this.ch.o3,35,7,1.2);
spRing(this.x,this.y-50,this.ch.o3);snd('super');}
doThrow(opp,dir){if(this.atk||opp.inv>0||opp.bl)return;
this.atk=1;this.st='throw';const m=dir===1?MV.throw_f:MV.throw_b;
this.cm={...m,tp:dir===1?'throw_f':'throw_b'};this.mf=0;this.hc=0;
opp.hp=Math.max(0,opp.hp-m.dm);opp.vx=dir*this.fc*m.kb;opp.vy=-6;
opp.hs=m.hs;opp.st='hit';opp.fl=10;
spP(opp.x,opp.y-50,'#FFA500',12,5,.8);snd('throw');
this.sp=Math.min(100,this.sp+15);
this.combo.addHit(m.dm);spDmg(opp.x,opp.y-80,m.dm,'#FF8800');}
doFatality(opp){if(opp.hp>0)return;
this.fatality=1;this.fatT=0;this.atk=1;this.st='fatality';
scrFlash=20;scrFlashC='rgba(255,0,0,0.4)';snd('fatality');
spP(opp.x,opp.y-60,'#FF0000',40,8,1.5);
spP(opp.x,opp.y-40,'#FFD700',20,6,1);}
ghb(){if(!this.atk||!this.cm)return null;
if(this.mf<this.cm.su||this.mf>=this.cm.su+this.cm.ac)return null;
return{x:this.x+this.fc*(this.w/2),y:this.cr?this.y-35:this.y-65,w:this.cm.rg,h:45,fc:this.fc};}
gub(){const h=this.cr?this.h*.6:this.h;return{x:this.x-this.w/2,y:this.y-h,w:this.w,h};}
hit(dm,kb,atk){
if(this.inv>0)return 0;
const fb=(atk.x>this.x&&this.fc===-1)||(atk.x<this.x&&this.fc===1);
if(this.bl||fb&&this.st==='block'){
this.bks=atk.cm?atk.cm.bs:8;this.vx=-this.fc*kb*.3;this.st='block';this.bl=1;
this.hp=Math.max(0,this.hp-Math.floor(dm*.08));snd('block');
spP(this.x+this.fc*20,this.y-65,'#FFF',6,3,.6,'spark');return 0;}
// Apply defense modifier
const fdm=Math.floor(dm*(2-this.ch.def));
this.hp=Math.max(0,this.hp-fdm);this.hs=atk.cm?atk.cm.hs:12;
this.vx=-this.fc*kb;if(!this.gd){this.juggle++;this.vy=-4;}
this.atk=0;this.cm=null;this.mf=0;
this.st='hit';this.fl=8;
atk.combo.addHit(fdm);
atk.sp=Math.min(100,atk.sp+fdm/7);
// Visual effects
spImpact(this.x,this.y-55,'#FF3333',10);
spImpact(this.x,this.y-55,'#FFAA00',6);
spP(this.x,this.y-60,'#FFF',3,4,.4,'spark');
spRing(this.x,this.y-55,dm>60?'#FF4444':'#FFFFFF');
spDmg(this.x,this.y-90,fdm,fdm>60?'#FF4444':'#FFF');
if(dm>60){scrFlash=8;scrFlashC='rgba(255,60,30,0.3)';
scrShakeX=(Math.random()-.5)*16;scrShakeY=(Math.random()-.5)*12;}
else{scrShakeX=(Math.random()-.5)*8;scrShakeY=(Math.random()-.5)*6;}
if(dm>100){camZoomT=1.12;}// hit zoom for heavy
if(this.hp<=0){this.st='ko';this.ko=0;snd('ko');}else snd(dm>60?'hit_h':'hit_l');
return 1;}
cpj(o){if(!this.pa)return;const h=o.gub();
if(this.px>h.x&&this.px<h.x+h.w&&this.py>h.y&&this.py<h.y+h.h){
this.pa=0;o.hit(Math.floor(this.ch.sp1D*.55),5,this);spP(this.px,this.py,'#FFD700',12,4,.7);}}
}

/* ================================================================
   CEL-SHADING CHARACTER RENDERER
   ================================================================ */
function dF(f){
const s=S,c=f.ch,bx=f.x*s,by=f.y*s,fc=f.fc;
if(f.fl>0&&f.fl%2===0)return;
// Shadow
cx.save();const sh=f.gd?1:Math.min(2,(f.y-300)/160);
cx.fillStyle='rgba(0,0,0,0.4)';
cx.beginPath();cx.ellipse(bx,(460+4)*s,38*c.bulk*s*sh,5*s/sh,0,0,6.28);cx.fill();cx.restore();
cx.save();cx.translate(bx,by);cx.scale(fc,1);
const B=c.bulk,T=c.tall;
const hd=22*T*s,nkH=9*T*s;
const trW=40*B*s,trH=62*T*s;
const armU=34*T*s,armL=30*T*s,armW=12*B*s;
const legU=38*T*s,legL=34*T*s,legW=14*B*s;
let bOff=0,aAng=0,a2Ang=0,lAng=0,l2Ang=0,pExt=0,kExt=0;
const af=f.af;
switch(f.st){
case'idle':bOff=Math.sin(af*1.57)*.8*s;aAng=Math.sin(af*1.57)*.04;break;
case'walk':lAng=Math.sin(af*1.57)*.45;l2Ang=-lAng;aAng=-lAng*.4;a2Ang=lAng*.4;
bOff=Math.abs(Math.sin(af*1.57))*1.5*s;break;
case'jump':lAng=-.35;l2Ang=.35;aAng=-.4;a2Ang=.4;break;
case'crouch':bOff=18*s;lAng=.7;l2Ang=.7;break;
case'dash':bOff=2*s;aAng=-.3;a2Ang=.3;lAng=-.2;l2Ang=.2;break;
case'attack':case'sp1':case'sp2':case'sp3':case'super':case'throw':case'fatality':
if(f.cm){const pr=f.mf/(f.cm.su+f.cm.ac+f.cm.rc);
const ia2=f.mf>=f.cm.su&&f.mf<f.cm.su+f.cm.ac;
const tp=f.cm.tp;
if(tp==='lp'||tp==='mp'||tp==='hp'||tp==='clp'||tp==='jlp'){pExt=ia2?1:pr<.3?pr/.3:Math.max(0,1-(pr-.3)/.7);aAng=-1.4*pExt;}
else if(tp==='lk'||tp==='mk'||tp==='hk'||tp==='cmk'||tp==='chk'||tp==='jhk'||tp==='jdive'||tp==='sweep'){kExt=ia2?1:pr*.5;lAng=-1.3*kExt;aAng=.25;}
else if(tp==='sp1'){aAng=-1.6;pExt=ia2?1.3:0;a2Ang=.4;}
else if(tp==='sp2'){if(c.id==='leon'||c.id==='togado'||c.id==='duce'){aAng=-.9;a2Ang=-.9;lAng=-.3;}
else{aAng=-1.1;lAng=-.4;bOff=-12*s;}}
else if(tp==='sp3'){aAng=-1.8;bOff=-8*s;lAng=-.5;pExt=ia2?1.5:0;}
else if(tp==='super'){const pu=Math.sin(f.mf*.5)*.3;aAng=-1.6+pu;a2Ang=-1.6-pu;lAng=.15+pu;}
else if(tp.includes('throw')){aAng=-.8;a2Ang=-.8;lAng=.2;}
}break;
case'block':aAng=.7;a2Ang=.7;bOff=2*s;break;
case'hit':bOff=4*s;aAng=.4;a2Ang=.5;break;
case'ko':const kp=Math.min(1,f.ko/35);cx.rotate(kp*1.57*-fc);bOff=kp*50*s;break;
}
const baseY=-bOff;
// === OUTLINE PASS (cel-shading) ===
cx.save();cx.scale(1.04,1.04);cx.translate(0,-1*s);
cx.globalAlpha=.85;
drawBody(cx,c,B,T,s,baseY,hd,nkH,trW,trH,armU,armL,armW,legU,legL,legW,
aAng,a2Ang,lAng,l2Ang,pExt,kExt,f,'#0A0A0A',true);
cx.restore();
// === FILL PASS ===
if(f.sa>0){cx.shadowColor=c.o3;cx.shadowBlur=20*s;}
drawBody(cx,c,B,T,s,baseY,hd,nkH,trW,trH,armU,armL,armW,legU,legL,legW,
aAng,a2Ang,lAng,l2Ang,pExt,kExt,f,null,false);
cx.shadowBlur=0;
// === HIGHLIGHT PASS ===
cx.globalAlpha=.12;cx.strokeStyle='#FFF';cx.lineWidth=1*s;
cx.beginPath();cx.moveTo(-trW*.3,baseY-trH+4*s);cx.lineTo(-trW*.2,baseY-trH*.4);cx.stroke();
cx.beginPath();cx.moveTo(trW*.1,baseY-trH+4*s);cx.lineTo(trW*.2,baseY-trH*.4);cx.stroke();
cx.globalAlpha=1;
cx.restore();
// Projectile
if(f.pa){drawProj(f,s,c);}
// Super aura
if(f.sa>0){cx.save();cx.globalAlpha=.25+Math.sin(f.mf*.5)*.15;
const ag=cx.createRadialGradient(bx,by-60*s,10*s,bx,by-60*s,70*s);
ag.addColorStop(0,c.o3);ag.addColorStop(1,'transparent');
cx.fillStyle=ag;cx.beginPath();cx.arc(bx,by-60*s,70*s,0,6.28);cx.fill();
// Orbital particles
for(let i=0;i<6;i++){const a=f.mf*.15+i*1.05;
cx.fillStyle=c.o4||c.o3;cx.beginPath();
cx.arc(bx+Math.cos(a)*45*s,by-60*s+Math.sin(a)*30*s,4*s,0,6.28);cx.fill();}
cx.restore();}
// Fatality effects
if(f.fatality&&f.fatT>0){cx.save();cx.globalAlpha=Math.min(1,f.fatT/20);
cx.fillStyle='rgba(255,0,0,0.3)';cx.beginPath();

/* === AI (improved) === */
function aiUp(ai,opp,diff){
ai.aic--;if(ai.aic>0)return{};
const d=Math.abs(ai.x-opp.x),r=Math.random();
const agr=diff*.15+.15;// aggression scales with difficulty
const inp={u:0,d:0,l:0,r:0,bl:0,_lp:0,_mp:0,_hp:0,_lk:0,_mk:0,_hk:0,
_sp1:0,_sp2:0,_sp3:0,_su:0,_throw_f:0,_throw_b:0,_dashF:0,_dashB:0,
_fatality:0,_sweep:0};
if(ai.hs>0||ai.bks>0||ai.atk)return inp;
if(d>160){inp.r=opp.x>ai.x?1:0;inp.l=opp.x<ai.x?1:0;
if(r<.04)inp.u=1;
if(r<.08&&d>220){inp._sp1=1;ai.aic=40;return inp;}
if(r<.12&&diff>2){inp._dashF=1;ai.aic=15;}}
else if(d>70){
if(r<agr){inp._hk=1;ai.aic=20;}
else if(r<agr+.08){inp._mp=1;ai.aic=14;}
else if(r<agr+.14){inp._hp=1;ai.aic=18;}
else if(r<agr+.2){inp._mk=1;ai.aic=16;}
else if(r<agr+.24&&ai.sp>=100){inp._su=1;ai.aic=55;}
else if(r<agr+.3){inp[r<agr+.27?'_sp1':'_sp2']=1;ai.aic=35;}
else if(r<agr+.34){inp._sp3=1;ai.aic=30;}
else{inp.r=opp.x>ai.x?1:0;inp.l=opp.x<ai.x?1:0;}}
else{if(r<.15){inp._lp=1;ai.aic=8;}
else if(r<.25){inp.bl=1;ai.aic=15;}
else if(r<.32){inp._throw_f=1;ai.aic=25;}
else if(r<.38){inp.l=opp.x>ai.x?1:0;inp.r=opp.x<ai.x?1:0;ai.aic=10;}
else if(r<.44){inp.d=1;inp._hk=1;ai.aic=20;}
else if(r<.50){inp._sweep=1;ai.aic=22;}
else if(r<.54){inp.u=1;inp._hk=1;ai.aic=16;}}
if(ai.hp/ai.mhp<.3&&r<.35){inp.bl=1;ai.aic=20;inp.l=inp.r=0;}
if(opp.atk&&d<110&&r<.5){inp.bl=1;ai.aic=10;}
// AI fatality
if(opp.hp<=0&&opp.st==='ko'&&r<.3){inp._fatality=1;ai.aic=60;}
return inp;}

else if(k==='enter'||k===' '||k==='j'){

if(this.mode==='arcade'){

else if(k==='3')this.trainDummy='jump';
else if(k==='4')this.trainDummy='block';}
startM(){this.p1=new F(CH[this.sc],250,1);

cx.beginPath();cx.ellipse(px+5*s,py-40*s,3.5*s,2.5*s,0,0,6.28);cx.fill();

if(c.beard){cx.fillStyle='#999';cx.beginPath();cx.ellipse(px,py-28*s,7*s,5*s,0,0,3.14);cx.fill();}

cx.fillStyle='#DDD';cx.font='bold '+9*s+'px sans-serif';cx.textAlign='center';
cx.fillText(c.nm,(x+cw/2)*s,(y+ch2-6)*s);
cx.fillStyle=c.side?'#1A5A1A':'#5A1A1A';cx.fillRect(x*s,y*s,3*s,ch2*s);}
// Selected info panel
const sel=CH[this.sc];cx.textAlign='center';

// Specials list

dAnn(){const s=S,a=Math.min(1,this.anT/20);

cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(0,(GH/2-40)*s,GW*s,80*s);

dEnd(){const s=S;

cx.textAlign='left';}

/* === CLICK HANDLER === */
cv.addEventListener('click',e=>{ia();
const r=cv.getBoundingClientRect(),mx=(e.clientX-r.left)/S,my=(e.clientY-r.top)/S;
if(G.st==='TITLE'){G.tInput();return;}
if(G.st==='MODE'){G.mInput('1');return;}
if(G.st==='END'||G.st==='CONTINUE'){G.eInput('enter');return;}
if(G.st==='SEL'){
const cw=105,ch2=125,cols=4,gx=(GW-cols*cw-(cols-1)*10)/2,gy=44;
for(let i=0;i<CH.length;i++){const col=i%cols,row=Math.floor(i/cols);
const x=gx+col*(cw+10),y=gy+row*(ch2+10);
if(mx>=x&&mx<=x+cw&&my>=y&&my<=y+ch2){
if(i===G.sc){G.sInput('enter');}
else{G.sc=i;snd('sel');}return;}}
if(!UL()&&mx>=370&&mx<=590&&my>=518&&my<=540)window.open(STRIPE,'_blank');}});

/* === MAIN LOOP === */
G=new Game();
let lastFPS=60,fpsCnt=0,fpsTime=0;
(function loop(ts){
fpsCnt++;if(ts-fpsTime>1000){lastFPS=fpsCnt;fpsCnt=0;fpsTime=ts;}
// Skip particles if FPS drops
if(lastFPS<40&&PT.length>40)PT.splice(40);
G.update();G.draw();requestAnimationFrame(loop)})(0);

// Service worker cleanup
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){
regs.forEach(function(r){r.unregister()});
if(typeof caches!=='undefined')caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});
})}
