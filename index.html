<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no">
<meta name="description" content="TapCraft — A beautiful Minecraft-inspired voxel world. Mine, craft, build! Tap to mine blocks, collect resources, craft tools, and build your world.">
<meta name="theme-color" content="#87CEEB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TapCraft">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>TapCraft — Minecraft-Inspired Voxel World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:system-ui,-apple-system,sans-serif;
  touch-action:none;user-select:none;-webkit-user-select:none}
body{display:flex;flex-direction:column}
canvas{display:block;width:100%;flex:1;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;pointer-events:none;z-index:10}
.hud-left,.hud-right{pointer-events:auto}
.hud-stat{color:#fff;font-size:13px;font-weight:700;text-shadow:2px 2px 0 rgba(0,0,0,0.5);display:flex;align-items:center;gap:6px}
.hud-stat .icon{width:20px;height:20px;border-radius:3px;display:inline-block}

/* Hotbar */
.hotbar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;
  background:rgba(0,0,0,0.6);padding:6px;border-radius:8px;border:2px solid rgba(255,255,255,0.15);z-index:10}
.hotbar-slot{width:48px;height:48px;border:2px solid rgba(255,255,255,0.2);border-radius:6px;
  background:rgba(0,0,0,0.4);display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:all .15s}
.hotbar-slot.active{border-color:#fff;background:rgba(255,255,255,0.15);box-shadow:0 0 10px rgba(255,255,255,0.3)}
.hotbar-slot canvas{width:32px;height:32px;image-rendering:pixelated}
.hotbar-count{position:absolute;bottom:2px;right:4px;font-size:9px;font-weight:900;color:#fff;
  text-shadow:1px 1px 0 #000,-1px 1px 0 #000}

/* Mode toggle */
.mode-toggle{position:fixed;bottom:72px;right:12px;z-index:10;display:flex;flex-direction:column;gap:6px}
.mode-btn{width:44px;height:44px;border-radius:8px;border:2px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.5);color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.mode-btn.active{border-color:#5c7;background:rgba(85,204,119,0.3)}
.mode-btn:active{transform:scale(0.9)}

/* D-pad */
.dpad{position:fixed;bottom:72px;left:12px;z-index:10;display:grid;grid-template-columns:44px 44px 44px;
  grid-template-rows:44px 44px;gap:4px}
.dpad-btn{width:44px;height:44px;border-radius:8px;border:2px solid rgba(255,255,255,0.15);
  background:rgba(0,0,0,0.4);color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.dpad-btn:active{background:rgba(255,255,255,0.2)}

/* Toast */
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:100;
  background:rgba(0,0,0,0.8);color:#fff;font-size:13px;font-weight:700;padding:8px 20px;
  border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Crafting panel */
.craft-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:50;
  background:rgba(30,20,10,0.95);border:3px solid #8B7355;border-radius:8px;padding:16px;
  min-width:280px;transition:transform .2s cubic-bezier(.34,1.56,.64,1);color:#fff}
.craft-panel.show{transform:translate(-50%,-50%) scale(1)}
.craft-panel h3{font-size:16px;margin-bottom:12px;color:#c8a86e;text-align:center;letter-spacing:2px}
.craft-recipe{display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:6px;
  background:rgba(255,255,255,0.05);border-radius:6px;cursor:pointer;transition:background .15s}
.craft-recipe:hover,.craft-recipe:active{background:rgba(255,255,255,0.12)}
.craft-recipe canvas{width:28px;height:28px;image-rendering:pixelated}
.craft-recipe .arrow{color:#888;font-size:16px}
.craft-recipe .name{font-size:12px;font-weight:700;flex:1}
.craft-recipe .cost{font-size:10px;color:#aaa}
.craft-close{display:block;width:100%;margin-top:10px;padding:10px;border:2px solid #8B7355;border-radius:6px;
  background:rgba(139,115,85,0.3);color:#c8a86e;font-size:13px;font-weight:700;cursor:pointer}

/* Premium overlay */
.premium-bar{position:fixed;top:40px;right:8px;z-index:10;display:flex;gap:6px}
.prem-btn{padding:6px 12px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer}
.prem-unlock{background:linear-gradient(135deg,#f6d365,#fda085);color:#333}
.prem-craft{background:rgba(139,115,85,0.6);color:#c8a86e;border:1px solid #8B7355}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="hud-left">
    <div class="hud-stat" id="hudScore"><span class="icon" style="background:#5c7">&#9874;</span> <span id="scoreNum">0</span></div>
  </div>
  <div class="hud-right">
    <div class="hud-stat" id="hudDay">Day <span id="dayNum">1</span></div>
  </div>
</div>

<div class="premium-bar">
  <button class="prem-btn prem-craft" onclick="toggleCraft()">Craft</button>
  <button class="prem-btn prem-unlock" onclick="buyPremium()">Unlock All $0.99</button>
</div>

<div class="hotbar" id="hotbar"></div>

<div class="dpad">
  <div></div>
  <button class="dpad-btn" ontouchstart="movePlayer(0,-1)" onmousedown="movePlayer(0,-1)">&#9650;</button>
  <div></div>
  <button class="dpad-btn" ontouchstart="movePlayer(-1,0)" onmousedown="movePlayer(-1,0)">&#9664;</button>
  <button class="dpad-btn" ontouchstart="movePlayer(0,1)" onmousedown="movePlayer(0,1)">&#9660;</button>
  <button class="dpad-btn" ontouchstart="movePlayer(1,0)" onmousedown="movePlayer(1,0)">&#9654;</button>
</div>

<div class="mode-toggle">
  <button class="mode-btn active" id="btnMine" onclick="setMode('mine')" title="Mine">&#9935;</button>
  <button class="mode-btn" id="btnPlace" onclick="setMode('place')" title="Place">&#9645;</button>
</div>

<div class="craft-panel" id="craftPanel">
  <h3>CRAFTING</h3>
  <div id="craftList"></div>
  <button class="craft-close" onclick="toggleCraft()">Close</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONSTANTS =====
const TILE = 32;
const WORLD_W = 128, WORLD_H = 64;
const SURFACE_Y = 24;
const STRIPE_URL = 'https://buy.stripe.com/6oUdR80Vu5pm3S56uV0x20c';
const PAYPAL_URL = 'https://www.paypal.com/paypalme/PadraoBitcoin/0.99';

// Block types
const B = {
  AIR:0, GRASS:1, DIRT:2, STONE:3, WOOD:4, LEAVES:5, SAND:6,
  WATER:7, DIAMOND:8, GOLD:9, COAL:10, BEDROCK:11, PLANK:12,
  BRICK:13, GLASS:14, IRON:15, SNOW:16, LAVA:17, OBSIDIAN:18, CRAFT_TABLE:19
};
const BLOCK_INFO = {
  [B.AIR]:{name:'Air',color:null,hardness:0},
  [B.GRASS]:{name:'Grass',top:'#5DAE47',side:'#8B6E4E',bottom:'#6B5038',hardness:2},
  [B.DIRT]:{name:'Dirt',top:'#8B6E4E',side:'#7A5E3E',bottom:'#6B5038',hardness:2},
  [B.STONE]:{name:'Stone',top:'#888',side:'#777',bottom:'#666',hardness:4},
  [B.WOOD]:{name:'Wood',top:'#9E7C4F',side:'#8B6B3F',bottom:'#7A5A2F',hardness:3,pattern:'wood'},
  [B.LEAVES]:{name:'Leaves',top:'#3A8E2A',side:'#2D7A1F',bottom:'#2A6E1C',hardness:1,transparent:true},
  [B.SAND]:{name:'Sand',top:'#E8D5A3',side:'#D4C193',bottom:'#C0AD83',hardness:1},
  [B.WATER]:{name:'Water',top:'#3B7DD8',side:'#2B6DC8',bottom:'#1B5DB8',hardness:0,transparent:true,liquid:true},
  [B.DIAMOND]:{name:'Diamond',top:'#6EE7E7',side:'#5ED7D7',bottom:'#4EC7C7',hardness:6,sparkle:'#AFFFFF'},
  [B.GOLD]:{name:'Gold',top:'#FFD700',side:'#EFCA00',bottom:'#DFBD00',hardness:5,sparkle:'#FFEC70'},
  [B.COAL]:{name:'Coal',top:'#444',side:'#333',bottom:'#222',hardness:3,sparkle:'#555'},
  [B.BEDROCK]:{name:'Bedrock',top:'#222',side:'#1a1a1a',bottom:'#111',hardness:99},
  [B.PLANK]:{name:'Planks',top:'#C4A46E',side:'#B49360',bottom:'#A48250',hardness:2,pattern:'plank'},
  [B.BRICK]:{name:'Brick',top:'#A0522D',side:'#8B4513',bottom:'#7A3A0A',hardness:5,pattern:'brick'},
  [B.GLASS]:{name:'Glass',top:'rgba(200,230,255,0.4)',side:'rgba(180,210,240,0.3)',bottom:'rgba(160,190,220,0.3)',hardness:1,transparent:true},
  [B.IRON]:{name:'Iron',top:'#C8C8C8',side:'#B0B0B0',bottom:'#989898',hardness:5,sparkle:'#E0E0E0'},
  [B.SNOW]:{name:'Snow',top:'#F0F0F0',side:'#E0E0E0',bottom:'#D0D0D0',hardness:1},
  [B.LAVA]:{name:'Lava',top:'#FF4500',side:'#E03D00',bottom:'#CC3300',hardness:0,liquid:true,glow:'#FF6633'},
  [B.OBSIDIAN]:{name:'Obsidian',top:'#1A0A2E',side:'#120720',bottom:'#0A0418',hardness:8},
  [B.CRAFT_TABLE]:{name:'Crafting Table',top:'#B8945C',side:'#9E7C4F',bottom:'#7A5A2F',hardness:3,pattern:'craft'},
};

// Crafting recipes
const RECIPES = [
  {result:B.PLANK,count:4,ingredients:[{block:B.WOOD,count:1}],name:'Wood → 4 Planks'},
  {result:B.CRAFT_TABLE,count:1,ingredients:[{block:B.PLANK,count:4}],name:'4 Planks → Craft Table'},
  {result:B.BRICK,count:4,ingredients:[{block:B.STONE,count:4},{block:B.COAL,count:1}],name:'4 Stone+Coal → 4 Bricks'},
  {result:B.GLASS,count:4,ingredients:[{block:B.SAND,count:4},{block:B.COAL,count:1}],name:'4 Sand+Coal → 4 Glass'},
  {result:B.OBSIDIAN,count:1,ingredients:[{block:B.LAVA,count:1},{block:B.WATER,count:1}],name:'Lava+Water → Obsidian',premium:true},
];

// ===== STATE =====
let world = [];
let camX = 0, camY = 0;
let playerX = WORLD_W/2, playerY = SURFACE_Y - 2;
let inventory = {};
let selectedSlot = 0;
let hotbarBlocks = [B.DIRT, B.STONE, B.WOOD, B.PLANK, B.SAND, B.GLASS, B.BRICK, B.CRAFT_TABLE];
let mode = 'mine'; // mine or place
let score = 0;
let dayTime = 0; // 0 to 1
let dayNum = 1;
let miningTarget = null; // {x,y,progress,maxProgress}
let particles = [];
let drops = [];
let isPremium = localStorage.getItem('tapcraft_premium') === 'true';
let blockCanvases = {};

// Initialize inventory
Object.keys(B).forEach(k => { if(B[k] > 0) inventory[B[k]] = 0; });
// Starting items
inventory[B.WOOD] = 10;
inventory[B.DIRT] = 20;
inventory[B.STONE] = 5;

// ===== CANVAS SETUP =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== WORLD GENERATION =====
function generateWorld() {
  world = Array.from({length:WORLD_W}, () => new Uint8Array(WORLD_H));

  // Heightmap with smooth hills
  const heights = [];
  for (let x = 0; x < WORLD_W; x++) {
    let h = SURFACE_Y;
    h += Math.sin(x * 0.05) * 4;
    h += Math.sin(x * 0.12) * 2;
    h += Math.sin(x * 0.02) * 6;
    h += (Math.random() - 0.5) * 1.5;
    heights[x] = Math.round(h);
  }

  for (let x = 0; x < WORLD_W; x++) {
    const surfH = heights[x];
    for (let y = 0; y < WORLD_H; y++) {
      if (y === WORLD_H - 1) {
        world[x][y] = B.BEDROCK;
      } else if (y > surfH + 20 && Math.random() < 0.01) {
        world[x][y] = B.LAVA;
      } else if (y > surfH) {
        // Underground
        const depth = y - surfH;
        if (depth <= 3) world[x][y] = B.DIRT;
        else {
          world[x][y] = B.STONE;
          // Ore generation
          if (depth > 6 && Math.random() < 0.02) world[x][y] = B.COAL;
          if (depth > 12 && Math.random() < 0.012) world[x][y] = B.IRON;
          if (depth > 18 && Math.random() < 0.008) world[x][y] = B.GOLD;
          if (depth > 25 && Math.random() < 0.004) world[x][y] = B.DIAMOND;
        }
        // Caves
        const cave = Math.sin(x*0.15+y*0.1)*Math.sin(x*0.08-y*0.12)+Math.sin(x*0.2)*Math.cos(y*0.18);
        if (cave > 0.7 && depth > 5) world[x][y] = B.AIR;
      } else if (y === surfH) {
        // Surface block
        if (heights[x] > SURFACE_Y + 4) world[x][y] = B.SNOW;
        else if (heights[x] > SURFACE_Y + 2) world[x][y] = B.STONE;
        else world[x][y] = B.GRASS;
      } else if (y >= surfH - 2 && y < surfH) {
        // Water in valleys
        if (surfH > SURFACE_Y + 1) world[x][y] = B.AIR;
        else world[x][y] = B.WATER;
      }
    }

    // Trees
    if (heights[x] <= SURFACE_Y + 1 && Math.random() < 0.06) {
      const ty = heights[x];
      if (world[x][ty] === B.GRASS) {
        // Trunk
        for (let t = 1; t <= 4; t++) if (ty-t >= 0) world[x][ty-t] = B.WOOD;
        // Canopy
        for (let dx = -2; dx <= 2; dx++) {
          for (let dy = -2; dy <= -1; dy++) {
            const tx = x+dx, tty = ty-4+dy;
            if (tx>=0 && tx<WORLD_W && tty>=0 && tty<WORLD_H && world[tx][tty]===B.AIR) {
              if (Math.abs(dx)<2 || Math.abs(dy)<2) world[tx][tty] = B.LEAVES;
            }
          }
        }
        if (ty-6>=0 && world[x][ty-6]===B.AIR) world[x][ty-6] = B.LEAVES;
        if (ty-5>=0 && world[x][ty-5]===B.AIR) world[x][ty-5] = B.LEAVES;
      }
    }
  }
}
generateWorld();

// Find spawn point
for (let y = 0; y < WORLD_H; y++) {
  if (world[Math.floor(WORLD_W/2)][y] !== B.AIR && world[Math.floor(WORLD_W/2)][y] !== B.WATER) {
    playerY = y - 1; break;
  }
}

// ===== DRAWING =====
function drawBlock(bx, by, blockType, screenX, screenY) {
  const info = BLOCK_INFO[blockType];
  if (!info || !info.top) return;

  // Top face
  ctx.fillStyle = info.top;
  ctx.fillRect(screenX, screenY, TILE, TILE);

  // Right edge (darker)
  ctx.fillStyle = info.side;
  ctx.fillRect(screenX + TILE - 3, screenY, 3, TILE);

  // Bottom edge (darkest)
  ctx.fillStyle = info.bottom;
  ctx.fillRect(screenX, screenY + TILE - 3, TILE, 3);

  // Top-left highlight
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(screenX, screenY, TILE, 2);
  ctx.fillRect(screenX, screenY, 2, TILE);

  // Patterns
  if (info.pattern === 'wood') {
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    for (let i = 0; i < 3; i++) ctx.fillRect(screenX+2, screenY+6+i*10, TILE-4, 1);
  } else if (info.pattern === 'brick') {
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(screenX+1, screenY+1, TILE/2-1, TILE/2-1);
    ctx.strokeRect(screenX+TILE/2, screenY+TILE/2, TILE/2-1, TILE/2-1);
  } else if (info.pattern === 'plank') {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(screenX+TILE/2-1, screenY, 2, TILE);
  } else if (info.pattern === 'craft') {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(screenX+4, screenY+4, TILE-8, TILE-8);
    ctx.fillStyle = 'rgba(255,200,100,0.3)';
    ctx.fillRect(screenX+6, screenY+6, TILE-12, TILE-12);
  }

  // Sparkle for ores
  if (info.sparkle && Math.random() < 0.3) {
    ctx.fillStyle = info.sparkle;
    const sx = screenX + 4 + Math.random()*(TILE-8);
    const sy = screenY + 4 + Math.random()*(TILE-8);
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Glow for lava
  if (info.glow) {
    ctx.fillStyle = info.glow;
    ctx.globalAlpha = 0.15 + Math.sin(performance.now()*0.003+bx+by)*0.1;
    ctx.fillRect(screenX, screenY, TILE, TILE);
    ctx.globalAlpha = 1;
  }

  // Water animation
  if (info.liquid && blockType === B.WATER) {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    const waveY = Math.sin(performance.now()*0.002+bx*0.5)*3;
    ctx.fillRect(screenX, screenY+waveY+4, TILE, 2);
  }

  // Transparent blocks
  if (info.transparent && !info.liquid) {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(screenX, screenY, TILE, TILE);
  }
}

function drawSky() {
  // Day/night cycle
  const t = dayTime;
  let skyTop, skyBot, sunMoonY, sunColor;
  if (t < 0.25) { // Dawn
    const p = t / 0.25;
    skyTop = lerpColor('#0a0a2e', '#FF7E47', p);
    skyBot = lerpColor('#050520', '#FFB347', p);
  } else if (t < 0.5) { // Day
    const p = (t - 0.25) / 0.25;
    skyTop = lerpColor('#FF7E47', '#5DADEC', p);
    skyBot = lerpColor('#FFB347', '#87CEEB', p);
  } else if (t < 0.75) { // Dusk
    const p = (t - 0.5) / 0.25;
    skyTop = lerpColor('#5DADEC', '#FF6347', p);
    skyBot = lerpColor('#87CEEB', '#FF8C69', p);
  } else { // Night
    const p = (t - 0.75) / 0.25;
    skyTop = lerpColor('#FF6347', '#0a0a2e', p);
    skyBot = lerpColor('#FF8C69', '#050520', p);
  }

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, skyTop);
  grad.addColorStop(1, skyBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Sun/Moon
  const celestialAngle = t * Math.PI * 2;
  const cx = W/2 + Math.cos(celestialAngle - Math.PI/2) * W * 0.35;
  const cy = H*0.3 - Math.sin(celestialAngle - Math.PI/2) * H * 0.25;
  if (t > 0.15 && t < 0.65) {
    // Sun
    ctx.fillStyle = '#FFF700';
    ctx.shadowColor = '#FFF700';
    ctx.shadowBlur = 30;
    ctx.beginPath(); ctx.arc(cx, cy, 20, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  } else if (t > 0.7 || t < 0.1) {
    // Moon
    ctx.fillStyle = '#E8E8F0';
    ctx.shadowColor = '#E8E8F0';
    ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0a0a2e';
    ctx.beginPath(); ctx.arc(cx+5, cy-3, 13, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Stars at night
  if (t > 0.7 || t < 0.15) {
    const alpha = t > 0.7 ? (t-0.7)/0.3 : (0.15-t)/0.15;
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 40; i++) {
      ctx.globalAlpha = alpha * (0.3 + 0.4*Math.sin(performance.now()*0.001+i*7));
      const sx = (i*137.508) % W;
      const sy = (i*97.3 + Math.sin(i*3)*50) % (H*0.5);
      ctx.fillRect(sx, sy, i%5===0?2:1, i%5===0?2:1);
    }
    ctx.globalAlpha = 1;
  }

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  for (let i = 0; i < 6; i++) {
    const cloudX = ((i*200 + performance.now()*0.01) % (W+200)) - 100;
    const cloudY = 30 + i*15 + Math.sin(i*2)*10;
    ctx.beginPath();
    ctx.arc(cloudX, cloudY, 20, 0, Math.PI*2); ctx.fill();
    ctx.arc(cloudX+18, cloudY-5, 16, 0, Math.PI*2); ctx.fill();
    ctx.arc(cloudX+30, cloudY, 18, 0, Math.PI*2); ctx.fill();
  }
}

function drawPlayer(sx, sy) {
  // Body
  ctx.fillStyle = '#4169E1';
  ctx.fillRect(sx+8, sy+8, 16, 18);
  // Head
  ctx.fillStyle = '#FFD5B4';
  ctx.fillRect(sx+10, sy, 12, 12);
  // Eyes
  ctx.fillStyle = '#333';
  ctx.fillRect(sx+12, sy+4, 3, 3);
  ctx.fillRect(sx+18, sy+4, 3, 3);
  // Eye whites
  ctx.fillStyle = '#fff';
  ctx.fillRect(sx+12, sy+4, 2, 2);
  ctx.fillRect(sx+18, sy+4, 2, 2);
  // Mouth
  ctx.fillStyle = '#c88';
  ctx.fillRect(sx+14, sy+8, 4, 1);
  // Legs
  ctx.fillStyle = '#333';
  ctx.fillRect(sx+10, sy+26, 6, 6);
  ctx.fillRect(sx+18, sy+26, 6, 6);
  // Arm holding tool
  ctx.fillStyle = '#4169E1';
  ctx.fillRect(sx+24, sy+10, 4, 12);
  // Shoes
  ctx.fillStyle = '#555';
  ctx.fillRect(sx+9, sy+30, 7, 2);
  ctx.fillRect(sx+17, sy+30, 7, 2);
}

function drawMiningCrack(sx, sy, progress) {
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  const p = progress;
  if (p > 0.2) {
    ctx.beginPath(); ctx.moveTo(sx+TILE/2, sy); ctx.lineTo(sx+TILE/2+4, sy+TILE/2); ctx.stroke();
  }
  if (p > 0.5) {
    ctx.beginPath(); ctx.moveTo(sx, sy+TILE/3); ctx.lineTo(sx+TILE/2, sy+TILE/3+3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx+TILE/2+4, sy+TILE/2); ctx.lineTo(sx+TILE, sy+TILE*0.6); ctx.stroke();
  }
  if (p > 0.8) {
    ctx.beginPath(); ctx.moveTo(sx+TILE/4, sy+TILE); ctx.lineTo(sx+TILE/3, sy+TILE/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx+TILE*0.7, sy+TILE); ctx.lineTo(sx+TILE*0.8, sy+TILE*0.4); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ===== PARTICLES =====
function spawnBlockParticles(x, y, blockType) {
  const info = BLOCK_INFO[blockType];
  if (!info) return;
  const colors = [info.top, info.side, info.bottom].filter(Boolean);
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: x*TILE + TILE/2, y: y*TILE + TILE/2,
      vx: (Math.random()-0.5)*6, vy: -Math.random()*4-2,
      size: 2+Math.random()*3, life: 1, decay: 0.02+Math.random()*0.02,
      color: colors[Math.floor(Math.random()*colors.length)],
      gravity: 0.15
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.life -= p.decay;
    return p.life > 0;
  });
}

function drawParticles() {
  particles.forEach(p => {
    const sx = p.x - camX;
    const sy = p.y - camY;
    if (sx < -20 || sx > W+20 || sy < -20 || sy > H+20) return;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(sx, sy, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ===== ITEM DROPS =====
function spawnDrop(x, y, blockType) {
  drops.push({
    x: x*TILE+TILE/4, y: y*TILE,
    vy: -3, block: blockType,
    bounces: 0, grounded: false, timer: 300
  });
}

function updateDrops() {
  drops = drops.filter(d => {
    if (!d.grounded) {
      d.vy += 0.3;
      d.y += d.vy;
      const gridY = Math.floor(d.y/TILE);
      const gridX = Math.floor(d.x/TILE);
      if (gridY >= 0 && gridY < WORLD_H && gridX >= 0 && gridX < WORLD_W) {
        if (world[gridX][gridY] !== B.AIR && world[gridX][gridY] !== B.WATER) {
          d.y = (gridY)*TILE - TILE/2;
          d.vy = -d.vy * 0.3;
          d.bounces++;
          if (d.bounces > 2) d.grounded = true;
        }
      }
    }
    // Auto collect if near player
    const dx = d.x - playerX*TILE;
    const dy = d.y - playerY*TILE;
    if (Math.sqrt(dx*dx+dy*dy) < TILE*2) {
      inventory[d.block] = (inventory[d.block]||0) + 1;
      score += 10;
      playSound('pickup');
      updateHotbar();
      return false;
    }
    d.timer--;
    return d.timer > 0;
  });
}

function drawDrops() {
  drops.forEach(d => {
    const sx = d.x - camX;
    const sy = d.y - camY;
    if (sx<-20||sx>W+20||sy<-20||sy>H+20) return;
    const bob = Math.sin(performance.now()*0.005)*3;
    const info = BLOCK_INFO[d.block];
    if (!info || !info.top) return;
    ctx.fillStyle = info.top;
    ctx.fillRect(sx, sy+bob, TILE/2, TILE/2);
    ctx.fillStyle = info.side;
    ctx.fillRect(sx+TILE/2-2, sy+bob, 2, TILE/2);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(sx, sy+bob, TILE/2, 2);
  });
}

// ===== AUDIO =====
let audioCtx;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playSound(type){
  try{
    const c=getAudio(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    if(type==='mine'){o.frequency.setValueAtTime(200+Math.random()*100,c.currentTime);o.type='square';
      g.gain.setValueAtTime(0.06,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);
      o.start(c.currentTime);o.stop(c.currentTime+0.1);}
    else if(type==='break'){o.frequency.setValueAtTime(150,c.currentTime);o.frequency.exponentialRampToValueAtTime(80,c.currentTime+0.15);
      o.type='sawtooth';g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
      o.start(c.currentTime);o.stop(c.currentTime+0.2);}
    else if(type==='place'){o.frequency.setValueAtTime(400,c.currentTime);o.frequency.setValueAtTime(500,c.currentTime+0.03);
      o.type='sine';g.gain.setValueAtTime(0.06,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);
      o.start(c.currentTime);o.stop(c.currentTime+0.1);}
    else if(type==='pickup'){[0,0.04,0.08].forEach((t,i)=>{const o2=c.createOscillator(),g2=c.createGain();
      o2.connect(g2);g2.connect(c.destination);o2.frequency.setValueAtTime(600+i*150,c.currentTime+t);
      o2.type='sine';g2.gain.setValueAtTime(0.05,c.currentTime+t);
      g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.06);
      o2.start(c.currentTime+t);o2.stop(c.currentTime+t+0.06);});}
    else if(type==='craft'){o.frequency.setValueAtTime(523,c.currentTime);o.frequency.setValueAtTime(659,c.currentTime+0.1);
      o.frequency.setValueAtTime(784,c.currentTime+0.2);o.type='sine';
      g.gain.setValueAtTime(0.07,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);
      o.start(c.currentTime);o.stop(c.currentTime+0.3);}
  }catch(e){}
}

// ===== INPUT =====
let touchX=0,touchY=0,tapping=false,mineInterval=null;

canvas.addEventListener('touchstart',e=>{e.preventDefault();handleTap(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('mousedown',e=>{handleTap(e.clientX,e.clientY);});
canvas.addEventListener('touchend',()=>{clearMining();},{passive:true});
canvas.addEventListener('mouseup',()=>{clearMining();});

function handleTap(cx,cy){
  const worldX = Math.floor((cx + camX) / TILE);
  const worldY = Math.floor((cy + camY) / TILE);
  if(worldX<0||worldX>=WORLD_W||worldY<0||worldY>=WORLD_H) return;

  if(mode==='mine'){
    const block = world[worldX][worldY];
    if(block===B.AIR||block===B.WATER) return;
    const info = BLOCK_INFO[block];
    if(info.hardness>=99) { showToast('Unbreakable!'); return; }
    miningTarget = {x:worldX, y:worldY, progress:0, maxProgress:info.hardness*8};
    tapping = true;
    if(mineInterval) clearInterval(mineInterval);
    mineInterval = setInterval(()=>{ mineStep(); },50);
    mineStep();
  } else {
    // Place mode
    if(world[worldX][worldY]!==B.AIR && !BLOCK_INFO[world[worldX][worldY]].liquid) return;
    if(worldX===Math.floor(playerX)&&worldY===Math.floor(playerY)) return;
    const block = hotbarBlocks[selectedSlot];
    if(!block || (inventory[block]||0) <= 0) { showToast('No blocks!'); return; }
    world[worldX][worldY] = block;
    inventory[block]--;
    playSound('place');
    updateHotbar();
  }
}

function mineStep(){
  if(!miningTarget) return;
  const {x,y} = miningTarget;
  if(world[x][y]===B.AIR){clearMining();return;}
  miningTarget.progress++;
  playSound('mine');
  if(miningTarget.progress >= miningTarget.maxProgress){
    const block = world[x][y];
    world[x][y] = B.AIR;
    spawnBlockParticles(x,y,block);
    spawnDrop(x,y,block);
    playSound('break');
    score += BLOCK_INFO[block].hardness * 5;
    clearMining();
  }
}

function clearMining(){tapping=false;miningTarget=null;if(mineInterval){clearInterval(mineInterval);mineInterval=null;}}

function movePlayer(dx,dy){
  const nx = playerX+dx, ny = playerY+dy;
  if(nx<0||nx>=WORLD_W||ny<0||ny>=WORLD_H) return;
  const target = world[nx][ny];
  if(target!==B.AIR && target!==B.WATER && !BLOCK_INFO[target].transparent) return;
  playerX=nx; playerY=ny;
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')movePlayer(-1,0);
  if(e.key==='ArrowRight'||e.key==='d')movePlayer(1,0);
  if(e.key==='ArrowUp'||e.key==='w')movePlayer(0,-1);
  if(e.key==='ArrowDown'||e.key==='s')movePlayer(0,1);
  if(e.key>='1'&&e.key<='8'){selectedSlot=parseInt(e.key)-1;updateHotbar();}
  if(e.key==='e')toggleCraft();
  if(e.key==='q'){mode=mode==='mine'?'place':'mine';updateModeUI();}
});

function setMode(m){mode=m;updateModeUI();}
function updateModeUI(){
  document.getElementById('btnMine').classList.toggle('active',mode==='mine');
  document.getElementById('btnPlace').classList.toggle('active',mode==='place');
}

// ===== HOTBAR =====
function updateHotbar(){
  const bar = document.getElementById('hotbar');
  bar.innerHTML = '';
  hotbarBlocks.forEach((b,i)=>{
    const slot = document.createElement('div');
    slot.className = 'hotbar-slot' + (i===selectedSlot?' active':'');
    const info = BLOCK_INFO[b];
    if(info && info.top){
      const c = document.createElement('canvas');
      c.width=16;c.height=16;
      const cx2=c.getContext('2d');
      cx2.fillStyle=info.top;cx2.fillRect(0,0,16,16);
      cx2.fillStyle=info.side;cx2.fillRect(13,0,3,16);
      cx2.fillStyle=info.bottom;cx2.fillRect(0,13,16,3);
      cx2.fillStyle='rgba(255,255,255,0.15)';cx2.fillRect(0,0,16,2);cx2.fillRect(0,0,2,16);
      slot.appendChild(c);
    }
    const count = inventory[b]||0;
    const countEl = document.createElement('div');
    countEl.className='hotbar-count';
    countEl.textContent=count;
    slot.appendChild(countEl);
    slot.onclick=()=>{selectedSlot=i;updateHotbar();};
    bar.appendChild(slot);
  });
  document.getElementById('scoreNum').textContent=score;
}
updateHotbar();

// ===== CRAFTING =====
function toggleCraft(){
  document.getElementById('craftPanel').classList.toggle('show');
  renderCraftList();
}

function renderCraftList(){
  const list = document.getElementById('craftList');
  list.innerHTML='';
  RECIPES.forEach((r,i)=>{
    if(r.premium && !isPremium) return;
    const div = document.createElement('div');
    div.className='craft-recipe';
    const canCraft = r.ingredients.every(ing=>(inventory[ing.block]||0)>=ing.count);
    div.style.opacity = canCraft?'1':'0.4';
    const rInfo = BLOCK_INFO[r.result];
    const c = document.createElement('canvas');
    c.width=16;c.height=16;
    const cx2=c.getContext('2d');
    if(rInfo&&rInfo.top){cx2.fillStyle=rInfo.top;cx2.fillRect(0,0,16,16);cx2.fillStyle=rInfo.side;cx2.fillRect(13,0,3,16);}
    div.appendChild(c);
    const name=document.createElement('span');name.className='name';name.textContent=r.name;
    div.appendChild(name);
    div.onclick=()=>{
      if(!canCraft){showToast('Not enough materials!');return;}
      r.ingredients.forEach(ing=>{inventory[ing.block]-=ing.count;});
      inventory[r.result]=(inventory[r.result]||0)+r.count;
      playSound('craft');
      showToast('Crafted '+r.count+'x '+BLOCK_INFO[r.result].name+'!');
      updateHotbar();renderCraftList();
    };
    list.appendChild(div);
  });
}

// ===== PAYMENT =====
function buyPremium(){
  if(isPremium){showToast('Already premium!');return;}
  const choice = confirm('Unlock all blocks, recipes & creative mode for $0.99?\n\nChoose OK for Stripe, Cancel then use PayPal link.');
  if(choice){
    localStorage.setItem('tapcraft_pending','stripe');
    window.open(STRIPE_URL,'_blank');
  }
}
const urlP = new URLSearchParams(window.location.search);
if(urlP.get('paid')==='true'&&!isPremium){
  isPremium=true;localStorage.setItem('tapcraft_premium','true');
  showToast('Premium unlocked!');history.replaceState(null,'',window.location.pathname);
}

// ===== TOAST =====
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
}

// ===== HELPERS =====
function lerpColor(a,b,t){
  const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
  const ra=(pa>>16)&255,ga=(pa>>8)&255,ba2=pa&255;
  const rb=(pb>>16)&255,gb=(pb>>8)&255,bb=pb&255;
  const r=Math.round(ra+(rb-ra)*t),g=Math.round(ga+(gb-ga)*t),bl=Math.round(ba2+(bb-ba2)*t);
  return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}

// ===== GAME LOOP =====
let lastTime = 0;
function gameLoop(time){
  const dt = Math.min((time-lastTime)/16.67, 3);
  lastTime = time;

  // Day/night
  dayTime += 0.00008 * dt;
  if(dayTime >= 1){dayTime=0;dayNum++;document.getElementById('dayNum').textContent=dayNum;}

  // Camera follow player
  const targetCamX = playerX*TILE - W/2 + TILE/2;
  const targetCamY = playerY*TILE - H/2 + TILE/2;
  camX += (targetCamX - camX) * 0.1 * dt;
  camY += (targetCamY - camY) * 0.1 * dt;

  // Simple player gravity
  const belowY = playerY+1;
  if(belowY < WORLD_H){
    const below = world[Math.floor(playerX)][belowY];
    if(below===B.AIR || below===B.WATER){
      playerY = belowY;
    }
  }

  updateParticles();
  updateDrops();

  // Draw
  drawSky();

  // Visible tile range
  const startX = Math.max(0, Math.floor(camX/TILE)-1);
  const endX = Math.min(WORLD_W, Math.ceil((camX+W)/TILE)+1);
  const startY = Math.max(0, Math.floor(camY/TILE)-1);
  const endY = Math.min(WORLD_H, Math.ceil((camY+H)/TILE)+1);

  // Draw world
  for(let x=startX;x<endX;x++){
    for(let y=startY;y<endY;y++){
      const block = world[x][y];
      if(block===B.AIR) continue;
      const sx = x*TILE - camX;
      const sy = y*TILE - camY;
      drawBlock(x,y,block,sx,sy);
    }
  }

  // Mining crack overlay
  if(miningTarget){
    const sx = miningTarget.x*TILE - camX;
    const sy = miningTarget.y*TILE - camY;
    drawMiningCrack(sx, sy, miningTarget.progress/miningTarget.maxProgress);
  }

  // Draw drops
  drawDrops();

  // Draw particles
  drawParticles();

  // Draw player
  const psx = playerX*TILE - camX;
  const psy = playerY*TILE - camY;
  drawPlayer(psx, psy);

  // Night overlay
  if(dayTime > 0.7 || dayTime < 0.15){
    const alpha = dayTime>0.7?(dayTime-0.7)/0.3*0.4:(0.15-dayTime)/0.15*0.4;
    ctx.fillStyle = `rgba(0,0,20,${alpha})`;
    ctx.fillRect(0,0,W,H);
    // Torch glow around player
    const tg = ctx.createRadialGradient(psx+TILE/2,psy+TILE/2,10,psx+TILE/2,psy+TILE/2,TILE*4);
    tg.addColorStop(0,`rgba(255,200,100,${alpha*0.5})`);
    tg.addColorStop(1,'transparent');
    ctx.fillStyle=tg;
    ctx.fillRect(psx-TILE*4,psy-TILE*4,TILE*8,TILE*8);
  }

  // Score
  document.getElementById('scoreNum').textContent = score;

  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
