/* === AUDIO === */
let ac=null;
function ia(){if(!ac)ac=new(AudioContext||webkitAudioContext)()}
function snd(t){if(!ac)return;const n=ac.currentTime,g=ac.createGain(),o=ac.createOscillator();
o.connect(g);g.connect(ac.destination);
const P={hit_l:[180,'square',.15,.1],hit_h:[80,'sawtooth',.25,.18],
block:[700,'triangle',.08,.07],ko:[50,'sawtooth',.35,1.2],
special:[350,'square',.15,.22],super:[250,'sawtooth',.22,.5],
round:[523,'square',.12,.35],fight:[400,'sawtooth',.18,.45],sel:[660,'triangle',.07,.1],
nocaute:[150,'sawtooth',.3,.9]};
const p=P[t];if(!p)return;
o.frequency.value=p[0];o.type=p[1];g.gain.setValueAtTime(p[2],n);
g.gain.exponentialRampToValueAtTime(.001,n+p[3]);o.start(n);o.stop(n+p[3]);
if(t==='super'){const o2=ac.createOscillator();o2.connect(g);o2.type='square';
o2.frequency.value=600;o2.start(n+.08);o2.stop(n+.35);}
if(t==='fight'){o.frequency.linearRampToValueAtTime(900,n+.2);}
if(t==='ko'){const o2=ac.createOscillator(),g2=ac.createGain();
o2.connect(g2);g2.connect(ac.destination);o2.type='sine';o2.frequency.value=35;
g2.gain.setValueAtTime(.4,n);g2.gain.exponentialRampToValueAtTime(.001,n+1.5);
o2.start(n);o2.stop(n+1.5);}}

/* === GAMEPAD === */
const GP={u:0,d:0,l:0,r:0,lp:0,hp:0,lk:0,hk:0,bl:0,start:0};
const GPP={...GP};
function pollGP(){
Object.assign(GPP,GP);
const gps=navigator.getGamepads?navigator.getGamepads():[];
let g=null;for(let i=0;i<4;i++)if(gps[i]){g=gps[i];break;}
if(!g){GP.u=GP.d=GP.l=GP.r=GP.lp=GP.hp=GP.lk=GP.hk=GP.bl=GP.start=0;return;}
const DZ=0.3;
GP.u=(g.buttons[12]&&g.buttons[12].pressed)||(g.axes[1]<-DZ)?1:0;
GP.d=(g.buttons[13]&&g.buttons[13].pressed)||(g.axes[1]>DZ)?1:0;
GP.l=(g.buttons[14]&&g.buttons[14].pressed)||(g.axes[0]<-DZ)?1:0;
GP.r=(g.buttons[15]&&g.buttons[15].pressed)||(g.axes[0]>DZ)?1:0;
GP.lp=(g.buttons[2]&&g.buttons[2].pressed)?1:0;
GP.hp=(g.buttons[3]&&g.buttons[3].pressed)?1:0;
GP.lk=(g.buttons[0]&&g.buttons[0].pressed)?1:0;
GP.hk=(g.buttons[1]&&g.buttons[1].pressed)?1:0;
GP.bl=((g.buttons[4]&&g.buttons[4].pressed)||(g.buttons[5]&&g.buttons[5].pressed))?1:0;
GP.start=(g.buttons[9]&&g.buttons[9].pressed)?1:0;
}
function gpJP(b){return GP[b]&&!GPP[b]}
function uI(){Object.assign(IP,I);pollGP();
I.u=K.arrowup||K.w||GP.u||0;I.d=K.arrowdown||K.s||GP.d||0;
I.l=K.arrowleft||K.a||GP.l||0;I.r=K.arrowright||K.d||GP.r||0;
I.lp=K.j||K[' ']||GP.lp||0;I.hp=K.k||GP.hp||0;I.lk=K.u||GP.lk||0;I.hk=K.i||GP.hk||0;I.bl=K.l||GP.bl||0;}
function jp(b){return(I[b]&&!IP[b])}

/* === MOVE DATA === */
const MV={
lp:{su:3,ac:3,rc:5,dm:32,kb:2,hs:8,bs:4,rg:58},
hp:{su:6,ac:4,rc:10,dm:72,kb:5,hs:14,bs:8,rg:68},
lk:{su:4,ac:3,rc:6,dm:36,kb:3,hs:9,bs:5,rg:62},
hk:{su:8,ac:5,rc:12,dm:82,kb:8,hs:16,bs:10,rg:72},
clp:{su:3,ac:3,rc:5,dm:26,kb:1,hs:7,bs:3,rg:52},
chk:{su:7,ac:6,rc:14,dm:68,kb:12,hs:18,bs:8,rg:82},
jlp:{su:3,ac:4,rc:3,dm:38,kb:2,hs:10,bs:5,rg:52},
jhk:{su:5,ac:5,rc:4,dm:62,kb:6,hs:14,bs:8,rg:62},
};

/* === PARTICLES === */
const PT=[];
function spP(x,y,c,n,s,life,tp){for(let i=0;i<Math.min(n,60-PT.length);i++){
const a=Math.random()*6.28;PT.push({x,y,vx:Math.cos(a)*s*(.4+Math.random()*.8),
vy:Math.sin(a)*s*(.4+Math.random()*.8)-1.5,l:life||1,dc:.02+Math.random()*.03,
sz:tp==='spark'?1+Math.random()*2:2+Math.random()*5,c,tp:tp||'dot'});}}
function uPT(){for(let i=PT.length-1;i>=0;i--){const p=PT[i];
p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l-=p.dc;if(p.l<=0)PT.splice(i,1);}}
function dPT(){for(const p of PT){cx.globalAlpha=p.l*.8;cx.fillStyle=p.c;
if(p.tp==='spark'){cx.save();cx.translate(p.x*S,p.y*S);
const a=Math.atan2(p.vy,p.vx);cx.rotate(a);
cx.fillRect(0,-S,p.sz*3*S,2*S);cx.restore();}
else{cx.beginPath();cx.arc(p.x*S,p.y*S,p.sz*S,0,6.28);cx.fill();}}cx.globalAlpha=1;}

/* === SCREEN FX === */
let scrFlash=0,scrFlashC='#FFF';
const ATM=[];
function spATM(idx){ATM.length=0;const n=idx===1?15:idx===2?12:8;
for(let i=0;i<n;i++)ATM.push({x:Math.random()*GW,y:Math.random()*GH,
s:Math.random()*2+.5,sp:.2+Math.random()*.6,a:.08+Math.random()*.2});}
function dATM(idx){const s=S;for(const p of ATM){p.x+=p.sp;if(p.x>GW+10)p.x=-10;
if(idx===1){p.y+=p.sp*.5;if(p.y>GH)p.y=0;
cx.fillStyle='rgba(100,160,255,'+p.a+')';cx.fillRect(p.x*s,p.y*s,p.s*.5*s,p.s*6*s);}
else if(idx===2){cx.fillStyle='rgba(255,200,100,'+p.a+')';
cx.beginPath();cx.arc(p.x*s,p.y*s,p.s*s,0,6.28);cx.fill();}
else{cx.fillStyle='rgba(220,220,200,'+p.a+')';
cx.beginPath();cx.arc(p.x*s,p.y*s,p.s*.7*s,0,6.28);cx.fill();}}}

/* === FIGHTER === */
class F{
constructor(ch,x,fc,ai){
this.ch=ch;this.x=x;this.y=460;this.vx=0;this.vy=0;this.fc=fc;
this.hp=ch.hp;this.mhp=ch.hp;this.sp=0;this.st='idle';this.stT=0;
this.af=0;this.at=0;this.hs=0;this.bks=0;this.atk=0;
this.cm=null;this.mf=0;this.hc=0;this.combo=0;this.mxc=0;
this.ai=ai;this.cr=0;this.bl=0;this.inv=0;this.fl=0;
this.rw=0;this.w=44;this.h=130*ch.tall;this.sa=0;this.ko=0;
this.px=0;this.py=0;this.pvx=0;this.pl=0;this.pa=0;
this.ait=0;this.aic=0;
}
get gd(){return this.y>=460}
reset(x,f){this.x=x;this.y=460;this.vx=0;this.vy=0;this.hp=this.mhp;
this.sp=0;this.st='idle';this.hs=0;this.bks=0;this.atk=0;
this.cm=null;this.mf=0;this.hc=0;this.combo=0;this.cr=0;this.bl=0;
this.inv=0;this.fl=0;this.fc=f;this.pa=0;this.sa=0;this.ko=0;}
upd(inp,opp){
if(this.st==='ko'){this.ko++;return}
if(this.inv>0)this.inv--;
if(this.fl>0)this.fl--;
if(this.hs>0){this.hs--;this.vx*=.9;if(!this.hs){this.st='idle';this.atk=0;}this.phy();return;}
if(this.bks>0){this.bks--;this.vx*=.9;if(!this.bks){this.st='idle';this.bl=0;}this.phy();return;}
if(!this.atk&&this.gd){if(opp.x>this.x+8)this.fc=1;else if(opp.x<this.x-8)this.fc=-1;}
if(this.atk&&this.cm){this.mf++;
if(this.mf>=this.cm.su+this.cm.ac+this.cm.rc){this.atk=0;this.cm=null;this.mf=0;
this.st=this.gd?'idle':'jump';this.hc=0;}this.phy();return;}
if(this.sa>0){this.sa--;if(!this.sa){this.atk=0;this.st='idle';}this.phy();return;}
this.cr=0;this.bl=0;
if(this.gd){
this.vx=0;
if(inp.bl){this.bl=1;this.st='block';}
else if(inp.d){this.cr=1;this.st='crouch';
if(inp._lp)this.doA('clp');else if(inp._hk)this.doA('chk');}
else{
if(inp.l)this.vx=-this.ch.spd;if(inp.r)this.vx=this.ch.spd;
if(inp.u){this.vy=this.ch.jmp;this.st='jump';snd('sel');}
if(inp._lp)this.doA('lp');else if(inp._hp)this.doA('hp');
else if(inp._lk)this.doA('lk');else if(inp._hk)this.doA('hk');
else if(inp._sp1)this.doSp1();else if(inp._sp2)this.doSp2();
else if(inp._su&&this.sp>=100)this.doSu();
if(this.vx&&!this.atk)this.st='walk';else if(!this.atk)this.st='idle';
}}else{
if(inp.l)this.vx=Math.max(-this.ch.spd,this.vx-.3);
if(inp.r)this.vx=Math.min(this.ch.spd,this.vx+.3);
if(inp._lp)this.doA('jlp');else if(inp._hk)this.doA('jhk');}
this.phy();this.at++;if(this.at>7){this.at=0;this.af=(this.af+1)%4;}
if(this.pa){this.px+=this.pvx;this.pl--;if(this.pl<=0||this.px<0||this.px>GW)this.pa=0;}
}
phy(){this.x+=this.vx;if(!this.gd){this.vy+=.55;this.y+=this.vy;}
if(this.y>=460){this.y=460;this.vy=0;}this.x=Math.max(35,Math.min(GW-35,this.x));}
doA(t){if(this.atk)return;const m=MV[t];if(!m)return;
this.atk=1;this.cm={...m,tp:t};this.mf=0;this.hc=0;this.st='attack';
snd(t.includes('h')?'hit_h':'sel');}
doSp1(){if(this.atk)return;this.atk=1;this.mf=0;this.hc=0;this.st='sp1';
this.cm={su:5,ac:6,rc:12,dm:this.ch.sp1D,kb:10,hs:18,bs:10,rg:95,tp:'sp1'};
if(this.ch.proj){this.pa=1;this.px=this.x+this.fc*35;this.py=this.y-60;
this.pvx=this.fc*8;this.pl=55;}
this.sp=Math.min(100,this.sp+15);snd('special');}
doSp2(){if(this.atk)return;this.atk=1;this.mf=0;this.hc=0;this.st='sp2';
this.cm={su:4,ac:8,rc:10,dm:this.ch.sp2D,kb:12,hs:20,bs:10,rg:75,tp:'sp2'};
if(this.ch.id==='leon'||this.ch.id==='togado')this.vx=this.fc*7;
else this.vy=-9;
this.sp=Math.min(100,this.sp+15);snd('special');}
doSu(){if(this.sp<100||this.atk)return;this.atk=1;this.mf=0;this.hc=0;this.st='super';
this.sa=45;this.sp=0;this.inv=45;
this.cm={su:8,ac:22,rc:12,dm:this.ch.suD,kb:22,hs:30,bs:15,rg:105,tp:'super'};
spP(this.x,this.y-70,this.ch.o3,35,7,1.2);snd('super');}
ghb(){if(!this.atk||!this.cm)return null;
if(this.mf<this.cm.su||this.mf>=this.cm.su+this.cm.ac)return null;
return{x:this.x+this.fc*(this.w/2),y:this.cr?this.y-35:this.y-65,w:this.cm.rg,h:45,fc:this.fc};}
gub(){const h=this.cr?this.h*.6:this.h;return{x:this.x-this.w/2,y:this.y-h,w:this.w,h};}
hit(dm,kb,atk){
if(this.inv>0)return 0;
const fb=(atk.x>this.x&&this.fc===-1)||(atk.x<this.x&&this.fc===1);
if(this.bl||fb&&this.st==='block'){
this.bks=atk.cm?atk.cm.bs:8;this.vx=-this.fc*kb*.3;this.st='block';this.bl=1;
this.hp=Math.max(0,this.hp-Math.floor(dm*.08));snd('block');
spP(this.x+this.fc*20,this.y-65,'#FFF',6,3,.6,'spark');return 0;}
this.hp=Math.max(0,this.hp-dm);this.hs=atk.cm?atk.cm.hs:12;
this.vx=-this.fc*kb;this.atk=0;this.cm=null;this.mf=0;
this.st='hit';this.fl=8;this.combo=0;
atk.combo++;if(atk.combo>atk.mxc)atk.mxc=atk.combo;
atk.sp=Math.min(100,atk.sp+dm/8);
spP(this.x,this.y-55,'#FF3333',8,5,.8);
spP(this.x,this.y-55,'#FFAA00',5,3,.6,'spark');
spP(this.x,this.y-60,'#FFF',3,4,.4,'spark');
if(dm>60){scrFlash=8;scrFlashC='rgba(255,60,30,0.35)';}

else{inp.r=opp.x>ai.x?1:0;inp.l=opp.x<ai.x?1:0;}}

else if(r<.42){inp.d=1;inp._hk=1;ai.aic=22;}
else if(r<.48){inp.u=1;inp._hk=1;ai.aic=18;}}

return inp;}

dTitle(){const s=S,t=this.tb;

cx.font='bold '+68*s+'px sans-serif';cx.fillText('FIGHTER',(GW/2+3)*s,(222+3)*s);
// title
cx.fillStyle='#007722';cx.font='bold '+56*s+'px sans-serif';cx.fillText('PATRIOTA',GW/2*s,148*s);
const fg=cx.createLinearGradient(GW*.3*s,0,GW*.7*s,0);
fg.addColorStop(0,'#CC9900');fg.addColorStop(.5,'#FFDD44');fg.addColorStop(1,'#CC9900');
cx.fillStyle=fg;cx.font='bold '+68*s+'px sans-serif';cx.fillText('FIGHTER',GW/2*s,222*s);

// character silhouettes (darker, more dramatic)
const cols=['#0A3A0A','#0A2A5A','#0A0A0A','#5A0A0A','#0A0A0A','#5A0A0A'];
for(let i=0;i<6;i++){const cx2=(120+i*145)*s,cy=380*s;

cx.fillRect(cx2-7*s,cy-25*s,6*s,30*s);cx.fillRect(cx2+1*s,cy-25*s,6*s,30*s);}
cx.globalAlpha=1;
// blink

cx.fillText('PRESSIONE ENTER PARA LUTAR',GW/2*s,460*s);}
// gamepad hint

cx.fillText('v3.0 — Padrao Bitcoin',GW/2*s,525*s);cx.textAlign='left';}
dSel(){const s=S;
// Dark background
cx.fillStyle='#040410';cx.fillRect(0,0,GW*s,GH*s);
// Subtle grid pattern
cx.strokeStyle='rgba(255,255,255,0.02)';cx.lineWidth=1;
for(let x=0;x<GW;x+=30)cx.strokeRect(x*s,0,30*s,GH*s);
cx.textAlign='center';cx.fillStyle='#CC9900';
cx.font='bold '+26*s+'px sans-serif';cx.fillText('ESCOLHA SEU LUTADOR',GW/2*s,38*s);
// grid 3x2
const cw=135,ch2=155,cols=3,gx=(GW-cols*cw-(cols-1)*12)/2,gy=58;

const col=i%cols,row=Math.floor(i/cols);
const x=gx+col*(cw+12),y=gy+row*(ch2+12);
const sel=i===this.sc;
// card bg dark
const cg=cx.createLinearGradient(x*s,y*s,x*s,(y+ch2)*s);
cg.addColorStop(0,sel?'rgba(200,160,0,0.12)':'rgba(15,15,30,0.7)');
cg.addColorStop(1,sel?'rgba(200,160,0,0.04)':'rgba(8,8,15,0.7)');
cx.fillStyle=cg;rrect(x*s,y*s,cw*s,ch2*s,6*s);
// border — selected pulses gold
if(sel){const pulse=.6+Math.sin(this.tb*.1)*.4;
cx.strokeStyle='rgba(255,215,0,'+pulse+')';cx.lineWidth=3*s;}
else{cx.strokeStyle=c.side?'#2A6A2A':'#6A2A2A';cx.lineWidth=1.5*s;}
cx.beginPath();cx.roundRect(x*s,y*s,cw*s,ch2*s,6*s);cx.stroke();
// mini character preview
const px=(x+cw/2)*s,py=(y+85)*s;
cx.fillStyle=c.sk;cx.beginPath();cx.ellipse(px,py-38*s,11*s,12*s,0,0,6.28);cx.fill();
cx.fillStyle=c.hr;
if(c.hair==='wild'){for(let h=-3;h<=3;h++)cx.fillRect(px+h*4*s,py-52*s,5*s,10*s);
cx.beginPath();cx.arc(px,py-42*s,12*s,3.14,0);cx.fill();}
else if(c.hair==='up'){cx.fillRect(px-8*s,py-54*s,16*s,12*s);}
else if(c.hair==='bald'){cx.beginPath();cx.arc(px,py-38*s,11.5*s,3.3,6);cx.fill();}
else{cx.fillRect(px-11*s,py-48*s,22*s,8*s);}
cx.fillStyle=c.o1;cx.fillRect(px-14*s,py-24*s,28*s,35*s);
if(c.beard){cx.fillStyle='#999';cx.fillRect(px-7*s,py-30*s,14*s,7*s);}
if(c.glass){cx.strokeStyle='#333';cx.lineWidth=1*s;
cx.strokeRect(px-9*s,py-40*s,8*s,6*s);cx.strokeRect(px+1*s,py-40*s,8*s,6*s);}
cx.fillStyle='#FFF';cx.fillRect(px-6*s,py-40*s,4*s,3*s);cx.fillRect(px+2*s,py-40*s,4*s,3*s);
cx.fillStyle='#111';cx.fillRect(px-5*s,py-39*s,2*s,2*s);cx.fillRect(px+3*s,py-39*s,2*s,2*s);
// locked overlay
if(i>=4&&!UL()){cx.fillStyle='rgba(0,0,0,0.6)';rrect(x*s,y*s,cw*s,ch2*s,6*s);
cx.fillStyle='#AA7700';cx.font='bold '+22*s+'px sans-serif';cx.textAlign='center';
cx.fillText('\u{1F512}',px,(y+ch2/2-5)*s);
cx.fillStyle='#FFD700';cx.font='bold '+12*s+'px sans-serif';
cx.fillText('$0.99',px,(y+ch2/2+18)*s);}
// name
cx.fillStyle='#DDD';cx.font='bold '+11*s+'px sans-serif';cx.textAlign='center';
cx.fillText(c.nm,(x+cw/2)*s,(y+ch2-8)*s);
// side color bar
cx.fillStyle=c.side?'#1A5A1A':'#5A1A1A';cx.fillRect(x*s,y*s,4*s,ch2*s);}
// selected info
const sel=CH[this.sc];cx.textAlign='center';
cx.fillStyle='#FFF';cx.font='bold '+20*s+'px sans-serif';
cx.fillText(sel.nm+' \u2014 '+sel.tt,GW/2*s,410*s);
cx.fillStyle='rgba(255,255,255,0.4)';cx.font=13*s+'px sans-serif';
cx.fillText(sel.desc,GW/2*s,432*s);
// stats bars
const sy=455;cx.font=10*s+'px sans-serif';cx.textAlign='left';
cx.fillStyle='#666';cx.fillText('FORCA',220*s,sy*s);
cx.fillStyle='#AA2222';rrect(280*s,(sy-8)*s,(sel.hp/14)*s,8*s,2*s);
cx.fillStyle='#666';cx.fillText('VELOC',420*s,sy*s);
cx.fillStyle='#1155AA';rrect(480*s,(sy-8)*s,(sel.spd*19)*s,8*s,2*s);
cx.fillStyle='#666';cx.fillText('PODER',620*s,sy*s);
cx.fillStyle='#AA8800';rrect(680*s,(sy-8)*s,(sel.sp1D/1.4)*s,8*s,2*s);
// controls
cx.fillStyle='rgba(255,255,255,0.2)';cx.font=10*s+'px sans-serif';cx.textAlign='center';
cx.fillText('SETAS/D-pad: Mover | J/X: Soco | K/Y: Forte | U/A: Chute | I/B: Pesado | L/LB: Guard',GW/2*s,505*s);
cx.fillText('DF+Soco: Especial | DB+Chute: Especial 2 | Soco+Forte: SUPER',GW/2*s,518*s);
// unlock button
if(!UL()){cx.fillStyle='rgba(200,160,0,0.06)';rrect(370*s,476*s,220*s,26*s,8*s);
cx.strokeStyle='#AA8800';cx.lineWidth=1*s;cx.beginPath();cx.roundRect(370*s,476*s,220*s,26*s,8*s);cx.stroke();
cx.fillStyle='#FFD700';cx.font='bold '+12*s+'px sans-serif';
cx.fillText('DESBLOQUEAR TUDO \u2014 $0.99',480*s,493*s);}
cx.textAlign='left';}
dAnn(){const s=S,a=Math.min(1,this.anT/20);

dEnd(){const s=S;
cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,GW*s,GH*s);
// Dark vignette
const vg=cx.createRadialGradient(GW/2*s,GH/2*s,50*s,GW/2*s,GH/2*s,GW*.6*s);

cx.fillText('Combo Maximo: '+w.mxc,GW/2*s,278*s);
cx.fillText('Rounds: '+w.rw+' - '+(w===this.p1?this.p2.rw:this.p1.rw),GW/2*s,298*s);

/* === CLICK === */
cv.addEventListener('click',e=>{ia();
const r=cv.getBoundingClientRect(),mx=(e.clientX-r.left)/S,my=(e.clientY-r.top)/S;
if(G.st==='TITLE'){G.tInput();return;}
if(G.st==='END'){G.eInput();return;}
if(G.st==='SEL'){
const cw=135,ch2=155,cols=3,gx=(GW-cols*cw-(cols-1)*12)/2,gy=58;
for(let i=0;i<CH.length;i++){const col=i%cols,row=Math.floor(i/cols);
const x=gx+col*(cw+12),y=gy+row*(ch2+12);
if(mx>=x&&mx<=x+cw&&my>=y&&my<=y+ch2){
if(i===G.sc){if(i>=4&&!UL()){G.ann='DESBLOQUEIE POR $0.99!';G.anT=120;return;}
G.s2=G.sc;do{G.s2=Math.floor(Math.random()*CH.length)}while(G.s2===G.sc);
G.si=Math.floor(Math.random()*3);G.startM();snd('fight');}
else{G.sc=i;snd('sel');}return;}}
if(!UL()&&mx>=370&&mx<=590&&my>=476&&my<=502)window.open(STRIPE,'_blank');}});

/* === LOOP === */
G=new Game();
(function loop(){G.update();G.draw();requestAnimationFrame(loop)})();
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){
regs.forEach(function(r){r.unregister()});
if(typeof caches!=='undefined')caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});
})}
