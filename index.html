<html lang="en">

<title>TapToon Sheik - Interactive Character Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0e1d;--surface:#1a1935;--surface2:#2a2850;--surface3:#3a3668;
  --gold:#ffd60a;--red:#ff006e;--green:#00ff87;--blue:#3978a8;--purple:#b55088;
  --cyan:#00f5ff;--orange:#f77622;--white:#f0f0ff;--gray:#8b9bb4;--dark:#080714;
  --neon1:#ff006e;--neon2:#00f5ff;--neon3:#ffd60a;
  --pixel:4px;--font:'Press Start 2P',monospace;
}
html,body{width:100%;height:100%;overflow-x:hidden;background:var(--bg);color:var(--white);font-family:var(--font);font-size:10px}
body{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;position:relative}
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.app-wrap{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  mix-blend-mode:multiply}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%)}
.header{text-align:center;padding:20px 8px 10px;background:linear-gradient(180deg,var(--dark) 0%,transparent 100%);position:relative}
.header h1{font-size:16px;color:var(--gold);letter-spacing:3px;
  text-shadow:0 0 10px var(--gold),0 0 30px var(--gold),0 0 60px rgba(255,214,10,0.5),2px 2px 0 var(--orange);
  animation:titlePulse 3s ease-in-out infinite}
@keyframes titlePulse{0%,100%{text-shadow:0 0 10px var(--gold),0 0 30px var(--gold),0 0 60px rgba(255,214,10,0.5),2px 2px 0 var(--orange)}
  50%{text-shadow:0 0 15px var(--gold),0 0 40px var(--gold),0 0 80px rgba(255,214,10,0.7),2px 2px 0 var(--orange)}}
.header .ver{font-size:7px;color:var(--cyan);margin-top:6px;text-shadow:0 0 8px var(--cyan)}
.tabs{display:flex;background:var(--dark);border-bottom:2px solid var(--surface2);padding:0 8px;gap:4px}
.tab{flex:1;padding:12px 4px;text-align:center;font-family:var(--font);font-size:8px;color:var(--gray);background:var(--surface);
  cursor:pointer;border:none;border-top:2px solid transparent;transition:all .25s ease;position:relative}
.tab:hover{color:var(--white);background:var(--surface2);text-shadow:0 0 8px var(--cyan)}
.tab.active{color:var(--gold);background:linear-gradient(180deg,var(--surface2),var(--surface));border-top-color:var(--gold);
  text-shadow:0 0 10px var(--gold),0 0 20px rgba(255,214,10,0.3);
  box-shadow:0 -2px 10px rgba(255,214,10,0.2),inset 0 1px 0 rgba(255,214,10,0.1)}
.tab-content{display:none;flex:1;overflow-y:auto;padding:12px 8px 120px}
.tab-content.active{display:block}
.char-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:4px}
.char-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border:2px solid var(--surface3);
  border-radius:8px;padding:10px 6px 12px;text-align:center;position:relative;cursor:pointer;
  transition:all .2s ease;overflow:hidden;min-height:240px}
.char-card:active{transform:scale(0.95);border-color:var(--gold);box-shadow:0 0 25px rgba(255,214,10,0.4)}
.char-card.locked{opacity:0.5;filter:saturate(0.3)}
.char-card.locked::after{content:'\1f512 PREMIUM';position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;background:rgba(15,14,29,0.85);
  font-family:var(--font);font-size:9px;color:var(--gold);backdrop-filter:blur(2px);z-index:5;
  text-shadow:0 0 10px var(--gold)}
.char-avatar{display:block;margin:0 auto 6px;image-rendering:pixelated;image-rendering:crisp-edges;width:120px;height:150px}
.char-name{font-size:9px;color:var(--gold);text-shadow:0 0 8px rgba(255,214,10,0.4);margin-bottom:3px;letter-spacing:1px}
.char-personality{font-size:6px;color:var(--cyan);text-shadow:0 0 6px rgba(0,245,255,0.3);margin-bottom:6px}
.char-badge{font-size:6px;padding:3px 8px;border-radius:2px;display:inline-block}
.char-badge.free{background:var(--green);color:var(--dark);box-shadow:0 0 6px rgba(0,255,135,0.3)}
.char-badge.premium{background:linear-gradient(135deg,var(--red),var(--purple));color:var(--white);box-shadow:0 0 6px rgba(255,0,110,0.3)}
.char-taps{font-size:6px;color:var(--gray);margin-top:4px}
.char-reaction{font-size:6px;color:var(--cyan);margin-top:2px;opacity:0;transition:opacity .3s;min-height:10px}
.char-reaction.show{opacity:1}
.speech-bubble{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:var(--gold);color:var(--dark);font-family:var(--font);font-size:10px;padding:14px 22px;border-radius:8px;
  z-index:200;pointer-events:none;transition:transform .2s cubic-bezier(0.34,1.56,0.64,1),opacity .3s;
  opacity:0;max-width:85%;text-align:center;box-shadow:0 0 30px rgba(255,214,10,0.5),0 8px 32px rgba(0,0,0,0.4);
  line-height:1.4}
.speech-bubble.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.speech-bubble::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid var(--gold)}
.game-area{text-align:center}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:8px}
.game-score{color:var(--gold)}
.game-hi{color:var(--green)}
#gameCanvas{width:100%;max-width:480px;aspect-ratio:16/9;background:var(--dark);image-rendering:pixelated;image-rendering:crisp-edges;
  cursor:pointer;display:block;margin:0 auto;border:2px solid var(--cyan);border-radius:4px;
  box-shadow:0 0 20px rgba(0,245,255,0.2),0 0 40px rgba(0,245,255,0.05),inset 0 0 20px rgba(0,0,0,0.5)}
.combo-flash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:140;opacity:0;transition:opacity 0.1s}
.score-popup{position:absolute;font-family:var(--font);font-size:12px;color:var(--gold);text-shadow:0 0 8px var(--gold);pointer-events:none;
  animation:popScore 0.8s ease-out forwards;z-index:60}
@keyframes popScore{0%{opacity:1;transform:translateY(0) scale(1.2)}50%{opacity:1;transform:translateY(-20px) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(0.8)}}
.game-controls{margin-top:8px;font-size:7px;color:var(--gray)}
.game-char-select{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.char-btn{width:56px;height:56px;background:var(--surface);border:2px solid var(--surface2);cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center}
.char-btn.active{border-color:var(--gold)}
.char-btn canvas{width:44px;height:44px;image-rendering:pixelated}
.game-sound-select{margin:8px 0;font-size:7px;color:var(--gray)}
.game-sound-select select{font-family:var(--font);font-size:7px;background:var(--surface2);color:var(--white);border:2px solid var(--surface3);padding:4px}
/* On-screen game pad */
.game-pad{display:none;justify-content:space-between;align-items:flex-end;max-width:480px;margin:8px auto 0;padding:0 4px;user-select:none;-webkit-user-select:none}
.game-pad.visible{display:flex}
.pad-left,.pad-right{display:flex;gap:6px;align-items:flex-end}
.ctrl-btn{
  width:50px;height:50px;border:2px solid var(--cyan);background:rgba(0,245,255,0.12);
  color:var(--cyan);font-family:var(--font);font-size:16px;cursor:pointer;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  touch-action:none;-webkit-tap-highlight-color:transparent;
  box-shadow:0 0 8px rgba(0,245,255,0.15);transition:background .1s}
.ctrl-btn:active,.ctrl-btn.pressed{background:rgba(0,245,255,0.4);box-shadow:0 0 18px rgba(0,245,255,0.4)}
.ctrl-jump{width:68px;height:68px;border-color:var(--gold);background:rgba(255,214,10,0.12);
  color:var(--gold);font-size:10px;box-shadow:0 0 10px rgba(255,214,10,0.2);border-radius:50%}
.ctrl-jump:active,.ctrl-jump.pressed{background:rgba(255,214,10,0.4)}
.ctrl-sm{width:46px;height:40px;font-size:7px;border-color:var(--green);background:rgba(0,255,135,0.1);color:var(--green)}
.ctrl-sm:active,.ctrl-sm.pressed{background:rgba(0,255,135,0.35)}
/* Settings tab */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--surface);margin-bottom:8px;font-size:8px}
.setting-label{color:var(--gray)}
.setting-value{color:var(--gold)}
.toggle{width:40px;height:22px;background:var(--surface2);border-radius:11px;cursor:pointer;position:relative;border:2px solid var(--surface3)}
.toggle.on{background:var(--green);border-color:var(--green)}
.toggle::after{content:'';position:absolute;top:1px;left:1px;width:16px;height:16px;background:var(--white);border-radius:50%;transition:.2s}
.toggle.on::after{left:19px}
.premium-banner{position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,rgba(8,7,20,0.95),var(--dark));
  border-top:2px solid var(--gold);
  padding:12px;text-align:center;z-index:100;display:flex;flex-direction:column;gap:8px;
  box-shadow:0 -4px 30px rgba(255,214,10,0.15),0 -1px 0 var(--gold)}
.premium-banner.hidden{display:none}
.premium-title{font-size:11px;color:var(--gold);
  text-shadow:0 0 10px var(--gold),0 0 30px rgba(255,214,10,0.5);
  animation:neonFlicker 2s ease-in-out infinite}
@keyframes neonFlicker{0%,100%{opacity:1;text-shadow:0 0 10px var(--gold),0 0 30px rgba(255,214,10,0.5)}
  92%{opacity:1}93%{opacity:0.8}94%{opacity:1}96%{opacity:0.9}97%{opacity:1}}
.premium-subtitle{font-size:7px;color:var(--cyan);text-shadow:0 0 6px rgba(0,245,255,0.3)}
.btn-buy{display:block;width:100%;max-width:300px;margin:0 auto;padding:12px 16px;font-family:var(--font);font-size:9px;
  border:2px solid var(--gold);cursor:pointer;color:var(--dark);border-radius:4px;
  background:linear-gradient(135deg,var(--gold),#ffe066);transition:all .2s ease;
  box-shadow:0 0 15px rgba(255,214,10,0.3),0 0 30px rgba(255,214,10,0.1),inset 0 1px 0 rgba(255,255,255,0.3)}
.btn-buy:hover{box-shadow:0 0 20px rgba(255,214,10,0.5),0 0 50px rgba(255,214,10,0.2);transform:translateY(-1px)}
.btn-buy:active{transform:scale(0.96)}
.btn-buy.paypal{background:linear-gradient(135deg,var(--blue),#4a9ee0);color:var(--white);font-size:7px;margin-top:4px;
  border-color:var(--cyan);box-shadow:0 0 12px rgba(0,245,255,0.2)}
.btn-buy.activate{background:linear-gradient(135deg,var(--green),#33ffaa);color:var(--dark);font-size:7px;margin-top:4px;
  border-color:var(--green);box-shadow:0 0 12px rgba(0,255,135,0.2)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);
  background:linear-gradient(135deg,var(--gold),#ffe066);color:var(--dark);
  padding:14px 24px;font-family:var(--font);font-size:9px;z-index:200;opacity:0;transition:all .25s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;text-align:center;border-radius:4px;
  box-shadow:0 0 30px rgba(255,214,10,0.5),0 0 60px rgba(255,214,10,0.2),0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.shake-indicator{position:fixed;top:60px;right:8px;font-size:7px;color:var(--cyan);opacity:0;transition:opacity .3s;z-index:50}
.shake-indicator.active{opacity:1}
@media(max-width:320px){
  .char-gallery{grid-template-columns:1fr}
  .char-avatar{width:140px;height:175px}
}
@media(min-width:600px){
  .char-gallery{grid-template-columns:repeat(3,1fr)}
  html{font-size:11px}
}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--surface2)}
</style>

<script>
// ===== AUDIO ENGINE =====
let ctx,masterGain,vol=1,isPremium=false;
const settings={shake:true,vibrate:true};

function initAudio(){
  if(ctx) return;
  ctx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=ctx.createGain();
  masterGain.connect(ctx.destination);
}

// ===== SYNTHESIS RECIPES =====
function tone(freq,dur,type='sine',attack=0.01,decay=0){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,ctx.currentTime);
  g.gain.linearRampToValueAtTime(vol,ctx.currentTime+attack);
  g.gain.linearRampToValueAtTime(vol*(1-decay),ctx.currentTime+dur*0.5);
  g.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
  o.connect(g);g.connect(masterGain);
  o.start();o.stop(ctx.currentTime+dur);
}

function sweep(f1,f2,dur,type='sine'){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type;o.frequency.setValueAtTime(f1,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(f2,1),ctx.currentTime+dur);
  g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
  o.connect(g);g.connect(masterGain);
  o.start();o.stop(ctx.currentTime+dur);
}

function burst(freq,dur,count,type='square'){
  const gap=dur/count;
  for(let i=0;i<count;i++){
    setTimeout(()=>tone(freq*(1+i*0.05),gap*0.7,type,0.005),i*gap*1000);
  }
}

function formant(pitch,vowel,dur,vibRate=5,vibDepth=10){
  const formants={
    a:[[800,1200,2500],[0.9,0.6,0.3]],
    e:[[400,2000,2800],[0.8,0.7,0.3]],
    i:[[300,2300,3000],[0.7,0.8,0.3]],
    o:[[500,900,2300],[0.9,0.5,0.3]],
    u:[[350,700,2200],[0.8,0.4,0.2]]
  };
  const f=formants[vowel]||formants.a;
  const src=ctx.createOscillator();
  src.type='sawtooth';src.frequency.value=pitch;
  const vib=ctx.createOscillator();vib.frequency.value=vibRate;
  const vibG=ctx.createGain();vibG.gain.value=vibDepth;
  vib.connect(vibG);vibG.connect(src.frequency);
  vib.start();vib.stop(ctx.currentTime+dur);
  const env=ctx.createGain();
  env.gain.setValueAtTime(0,ctx.currentTime);
  env.gain.linearRampToValueAtTime(vol*0.7,ctx.currentTime+0.03);
  env.gain.setValueAtTime(vol*0.7,ctx.currentTime+dur*0.7);
  env.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
  f[0].forEach((freq,i)=>{
    const bp=ctx.createBiquadFilter();
    bp.type='bandpass';bp.frequency.value=freq;bp.Q.value=8;
    const fg=ctx.createGain();fg.gain.value=f[1][i]*vol;
    src.connect(bp);bp.connect(fg);fg.connect(env);
  });
  env.connect(masterGain);
  src.start();src.stop(ctx.currentTime+dur);
}

function noise(dur,filterFreq=1000,type='lowpass'){
  const bufSize=ctx.sampleRate*dur;
  const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i]=Math.random()*2-1;
  const src=ctx.createBufferSource();src.buffer=buf;
  const filt=ctx.createBiquadFilter();filt.type=type;filt.frequency.value=filterFreq;
  const g=ctx.createGain();
  g.gain.setValueAtTime(vol*0.5,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
  src.connect(filt);filt.connect(g);g.connect(masterGain);
  src.start();src.stop(ctx.currentTime+dur);
}

function wobble(freq,dur,rate=8,depth=50,type='sine'){
  const o=ctx.createOscillator(),g=ctx.createGain();
  const lfo=ctx.createOscillator(),lfoG=ctx.createGain();
  o.type=type;o.frequency.value=freq;
  lfo.frequency.value=rate;lfoG.gain.value=depth;
  lfo.connect(lfoG);lfoG.connect(o.frequency);
  g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
  o.connect(g);g.connect(masterGain);
  o.start();lfo.start();o.stop(ctx.currentTime+dur);lfo.stop(ctx.currentTime+dur);
}

function impact(freq,dur){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';o.frequency.setValueAtTime(freq,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(freq*0.1,20),ctx.currentTime+dur);
  g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  o.connect(g);g.connect(masterGain);
  o.start();o.stop(ctx.currentTime+dur);
  noise(dur*0.3,freq*2);
}

function chord(freqs,dur,type='sine'){
  freqs.forEach(f=>tone(f,dur,type,0.02,0.3));
}

function slide(freqs,dur,type='sine'){
  const step=dur/freqs.length;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type;o.frequency.setValueAtTime(freqs[0],ctx.currentTime);
  freqs.forEach((f,i)=>{if(i>0) o.frequency.linearRampToValueAtTime(f,ctx.currentTime+step*i)});
  g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
  o.connect(g);g.connect(masterGain);
  o.start();o.stop(ctx.currentTime+dur);
}

function repeat(fn,times,gap){
  for(let i=0;i<times;i++) setTimeout(fn,i*gap*1000);
}

function drawMonster(ctx,idx,x,y,s,state){
  const r=(gx,gy,gw,gh,col)=>{ctx.fillStyle=col;ctx.fillRect(Math.floor(x+gx*s),Math.floor(y+gy*s),Math.ceil(gw*s),Math.ceil(gh*s))};
  let la=0,lb=0;
  if(state==='run1'){la=-1;lb=1}else if(state==='run2'){la=1;lb=-1}
  const tuck=(state==='jump'||state==='fall');
  const L=ML[idx];
  // Arms
  r(L[0],L[1],L[2],L[3],L[4]);r(22-L[0]-L[2],L[1],L[2],L[3],L[4]);
  r(L[0]-1,L[1]+L[3]-2,L[2],2,L[4]);r(22-L[0],L[1]+L[3]-2,L[2],2,L[4]);
  // Body
  M_BODY[idx].forEach(p=>r(p[0],p[1],p[2],p[3],p[4]));
  // Legs
  if(!tuck){
    r(L[5]+la,25,L[6],L[7],L[8]);r(22-L[5]-L[6]+lb,25,L[6],L[7],L[8]);
    r(L[5]+la-1,25+L[7]-1,L[6]+1,1,L[8]);r(22-L[5]-L[6]+lb,25+L[7]-1,L[6]+1,1,L[8]);
  }else{
    r(L[5]+1,23,L[6],2,L[8]);r(22-L[5]-L[6]-1,23,L[6],2,L[8]);
  }
}

function renderChar(charIdx,canvas,scale){
  scale=scale||3;
  const c=canvas.getContext('2d');
  canvas.width=22*scale;canvas.height=28*scale;
  c.clearRect(0,0,canvas.width,canvas.height);
  drawMonster(c,charIdx,0,0,scale,'idle');
}

let idleFrame=0,idleInterval=null;
function drawCharAvatar(ctx,ci,x,y,s,frame){
  const d=CHAR_AVATARS[ci];if(!d)return;
  const blink=(frame%30)<2;
  const breathe=Math.sin(frame*0.08);
  const r=(gx,gy,gw,gh,col)=>{ctx.fillStyle=col;ctx.fillRect(Math.floor(x+gx*s),Math.floor(y+(gy+breathe)*s),Math.ceil(gw*s),Math.ceil(gh*s))};
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(Math.floor(x+8*s),Math.floor(y+47*s),Math.ceil(24*s),Math.ceil(3*s));
  // Body
  d.body.forEach(p=>r(p[0],p[1],p[2],p[3],p[4]));
  // Face (with blink)
  const faceData=blink?d.blink:d.face;
  faceData.forEach(p=>r(p[0],p[1],p[2],p[3],p[4]));
  // Details
  if(d.detail) d.detail.forEach(p=>r(p[0],p[1],p[2],p[3],p[4]));
}

// ===== PARTICLE SYSTEM v3.0 =====
const particles=[];
function emitParticles(x,y,type){
  const configs={
    dust:{count:8,vxRange:3.5,vyMin:-3,vyMax:0,life:18,colors:['#8b9bb4','#b0c4de','#6a7a8a'],size:3},
    trail:{count:2,vxRange:1.2,vyMin:-0.8,vyMax:-0.2,life:12,colors:['#f77622','#ff9944'],size:2},
    ring:{count:6,vxRange:2.5,vyMin:-2.5,vyMax:-0.5,life:16,colors:['#ffd60a','#ffe066','#fff8cc'],size:2},
    sparkle:{count:10,vxRange:4,vyMin:-4,vyMax:-1,life:20,colors:['#ffd60a','#00f5ff','#ff006e','#00ff87','#fff'],size:2},
    speed:{count:3,vxRange:0.3,vyMin:-0.2,vyMax:0.2,life:8,colors:['#00f5ff','#00ff87'],size:4}
  };
  const c=configs[type]||configs.dust;
  for(let i=0;i<c.count;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*c.vxRange,
      vy:c.vyMin+Math.random()*(c.vyMax-c.vyMin),
      life:c.life+Math.floor(Math.random()*6),
      maxLife:c.life+6,
      color:c.colors[Math.floor(Math.random()*c.colors.length)],
      size:c.size,
      type
    });
  }
}
function updateDrawParticles(cx){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=p.type==='sparkle'?0.08:0.05;
    if(p.type==='sparkle') p.vx*=0.97;
    p.life--;
    if(p.life<=0){particles.splice(i,1);continue}
    const alpha=p.life/p.maxLife;
    gctx.globalAlpha=alpha;
    gctx.fillStyle=p.color;
    const sz=p.type==='sparkle'?Math.max(1,p.size*alpha):p.size;
    gctx.fillRect(Math.floor(p.x-cx),Math.floor(p.y),sz,sz);
    // Sparkle glow
    if(p.type==='sparkle'&&alpha>0.5){
      gctx.globalAlpha=alpha*0.2;
      gctx.fillRect(Math.floor(p.x-cx)-1,Math.floor(p.y)-1,sz+2,sz+2);
    }
  }
  gctx.globalAlpha=1;
}

// ===== LEVEL GENERATION v3.0 =====
function makeSegment(diff,startX){
  const seg={platforms:[],rings:[],enemies:[],powerups:[],width:320+Math.random()*260};
  let gx=startX;
  while(gx<startX+seg.width){
    const gw=55+Math.random()*100;
    seg.platforms.push({x:gx,y:GROUND_Y,w:gw,h:50,ground:true});
    if(Math.random()<0.5){
      const rc=2+Math.floor(Math.random()*4);
      for(let r=0;r<rc;r++) seg.rings.push({x:gx+15+r*18,y:GROUND_Y-30,collected:false,anim:Math.random()*6.28,spark:0});
    }
    gx+=gw;
    if(diff>1&&Math.random()<0.12*diff) gx+=30+Math.random()*25;
  }
  const platCount=Math.floor(1+Math.random()*(1.5+diff*0.5));
  for(let i=0;i<platCount;i++){
    const px=startX+50+Math.random()*(seg.width-100);
    const py=GROUND_Y-55-Math.random()*65;
    const pw=40+Math.random()*50;
    seg.platforms.push({x:px,y:py,w:pw,h:10,ground:false});
    if(Math.random()<0.55){
      const rc=1+Math.floor(Math.random()*3);
      for(let r=0;r<rc;r++) seg.rings.push({x:px+8+r*18,y:py-18,collected:false,anim:Math.random()*6.28,spark:0});
    }
  }
  // Ground enemies (badniks)
  const enemyCount=Math.floor(Math.random()*(0.9+diff*0.4));
  for(let i=0;i<enemyCount;i++){
    const ex=startX+100+Math.random()*(seg.width-150);
    seg.enemies.push({x:ex,y:GROUND_Y-16,w:18,h:16,vx:0.5+Math.random()*0.6,
      minX:ex-30,maxX:ex+30,alive:true,frame:0,type:'ground',hp:1});
  }
  // Flying enemies (appear at higher difficulty)
  if(diff>2&&Math.random()<0.3*diff){
    const fx=startX+120+Math.random()*(seg.width-180);
    seg.enemies.push({x:fx,y:GROUND_Y-80-Math.random()*40,w:20,h:14,vx:0.3+Math.random()*0.4,
      minX:fx-40,maxX:fx+40,alive:true,frame:0,type:'flying',hp:1,baseY:GROUND_Y-80-Math.random()*40});
  }
  // Powerups (rare)
  if(Math.random()<0.08+diff*0.02){
    const ptype=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
    seg.powerups.push({x:startX+60+Math.random()*(seg.width-120),y:GROUND_Y-50-Math.random()*30,
      type:ptype,collected:false,anim:0});
  }
  return seg;
}
function generateLevel(){
  platforms=[];rings=[];enemies=[];powerups=[];segmentIdx=0;nextSegX=0;
  for(let i=0;i<5;i++) appendSegment();
}
function appendSegment(){
  const diff=Math.min(1+segmentIdx*0.13,5);
  const seg=makeSegment(diff,nextSegX);
  platforms.push(...seg.platforms);
  rings.push(...seg.rings);
  enemies.push(...seg.enemies);
  powerups.push(...seg.powerups);
  nextSegX+=seg.width;
  segmentIdx++;
}

// ===== PLAYER PHYSICS v3.0 (squash/stretch, combo, trail, double jump) =====
function addScorePopup(x,y,text,color='#ffd60a'){
  scorePopups.push({x,y,text,color,life:60,maxLife:60});
}
function updatePlayer(){
  if(input.left){player.vx=Math.max(player.vx-0.35,-MAX_VX);player.facing=-1}
  else if(input.right){player.vx=Math.min(player.vx+0.35,MAX_VX);player.facing=1}
  else{player.vx*=0.84;if(Math.abs(player.vx)<0.1)player.vx=0}
  if(player.grounded&&!input.left&&!input.right) player.vx+=0.05;

  // Combo timer decay
  if(player.comboTimer>0){player.comboTimer--}else{player.combo=0}
  // Invincibility decay
  if(player.invincible>0) player.invincible--;

  if(input.boost&&player.grounded&&player.boostTimer<=0){
    player.boosting=true;player.boostTimer=100;
    playSFX('speed_boost',0.4);
    try{gameSFX.boost()}catch(e){}
    // Squash on boost start
    player.scaleX=1.4;player.scaleY=0.7;
  }
  if(player.boostTimer>0)player.boostTimer--;else player.boosting=false;
  const spd=player.boosting?BOOST_MULT:1;

  // Jump (with double jump support)
  if(input.jumpPressed){
    if(player.grounded){
      player.vy=JUMP_FORCE;player.grounded=false;player.curled=true;player.hasDoubleJump=true;
      // Stretch on jump
      player.scaleX=0.7;player.scaleY=1.4;
      playSFX('jump',0.4);
      try{gameSFX.spring()}catch(e){}
      if(settings.vibrate&&navigator.vibrate) navigator.vibrate(30);
      wasAirborne=true;
    }else if(player.hasDoubleJump){
      player.vy=JUMP_FORCE*0.82;player.hasDoubleJump=false;player.curled=true;
      player.scaleX=0.65;player.scaleY=1.45;
      playSFX('double_jump',0.35);
      emitParticles(player.x+10,player.y+20,'sparkle');
    }
  }
  input.jumpPressed=false;

  player.vy+=GRAVITY;
  player.x+=player.vx*spd;
  player.y+=player.vy;

  // Squash/stretch spring back
  player.scaleX+=(1-player.scaleX)*0.15;
  player.scaleY+=(1-player.scaleY)*0.15;

  // Trail when boosting
  if(player.boosting&&frameCount%2===0){
    player.trail.push({x:player.x,y:player.y,alpha:0.5,life:12});
  }
  player.trail=player.trail.filter(t=>{t.life--;t.alpha*=0.85;return t.life>0});

  player.grounded=false;
  const pw=22,ph=30;
  for(const p of platforms){
    if(Math.abs(p.x+p.w/2-player.x-11)>p.w/2+35) continue;
    if(player.vy>=0&&player.x+pw>p.x+2&&player.x<p.x+p.w-2
      &&player.y+ph>=p.y&&player.y+ph<=p.y+16){
      player.y=p.y-ph;player.vy=0;player.grounded=true;player.curled=false;
      if(wasAirborne){
        landTimer=6;
        // Squash on land
        player.scaleX=1.35;player.scaleY=0.65;
        emitParticles(player.x+11,player.y+ph-4,'dust');
        playSFX('land',0.25);
        wasAirborne=false;
        // Camera shake on hard land
        addShake(0.08);
      }
    }
  }

  if(player.y>CH+40){
    gameOver=true;gameRunning=false;
    playSFX('death',0.6);
    try{gameSFX.hurt()}catch(e){}
    if(settings.vibrate&&navigator.vibrate) navigator.vibrate([100,50,100]);
    screenFlash=8;screenFlashColor='#ff006e';slowMo=0.3;
    endGame();
  }

  if(player.grounded&&Math.abs(player.vx)>2&&frameCount%3===0)
    emitParticles(player.x+(player.facing<0?22:0),player.y+ph-4,'trail');

  if(landTimer>0) landTimer--;
  if(!player.grounded) wasAirborne=true;
}

// ===== RINGS, ENEMIES & POWERUPS v3.0 =====
function updateRings(){
  for(const r of rings){
    if(r.collected) continue;
    r.anim+=0.1;
    const magnetRange=powerups.some(p=>p.type==='magnet'&&p.collected)?120:16;
    const dx=r.x-player.x-6,dy=r.y-player.y-10;
    // Magnet pull
    if(magnetRange>16&&Math.abs(dx)<magnetRange&&Math.abs(dy)<magnetRange){
      r.x-=dx*0.08;r.y-=dy*0.08;
    }
    if(Math.abs(dx)<18&&Math.abs(dy)<24){
      r.collected=true;ringCount++;gameScore+=10;r.spark=8;
      document.getElementById('score').textContent=gameScore;
      emitParticles(r.x,r.y,'ring');
      playSFX('ring_collect',0.35);
      try{gameSFX.ring()}catch(e){}
    }
  }
}
function updatePowerups(){
  for(const p of powerups){
    if(p.collected) continue;
    p.anim+=0.05;
    if(Math.abs(p.x-player.x-8)<22&&Math.abs(p.y-player.y-12)<26){
      p.collected=true;
      playSFX('power_up',0.5);
      emitParticles(p.x,p.y,'sparkle');
      addScorePopup(p.x,p.y,p.type.toUpperCase(),'#00ff87');
      screenFlash=4;screenFlashColor='#00ff87';
      if(p.type==='shield') player.invincible=300;
      else if(p.type==='speed'){player.boosting=true;player.boostTimer=180}
      // magnet handled in ring collection
    }
  }
}
function updateEnemies(){
  const ph=30;
  for(const e of enemies){
    if(!e.alive) continue;
    e.x+=e.vx;e.frame=(e.frame+0.12)%2;
    if(e.type==='flying') e.y=e.baseY+Math.sin(frameCount*0.04+e.x)*12;
    if(e.x<=e.minX||e.x>=e.maxX) e.vx*=-1;
    if(Math.abs(e.x-player.x)<20&&Math.abs(e.y-player.y-10)<22){
      const canKillFromAbove=player.vy>0&&player.y+ph<e.y+12;
      const canKillCurled=player.curled;
      const shielded=player.invincible>0;
      if(canKillFromAbove||canKillCurled||shielded){
        e.alive=false;
        player.vy=canKillFromAbove?JUMP_FORCE*0.6:player.vy;
        // Combo system
        player.combo++;player.comboTimer=90;
        const comboMult=Math.min(player.combo,8);
        const points=50*comboMult;
        gameScore+=points;
        document.getElementById('score').textContent=gameScore;
        // Hitstop!
        hitstopFrames=comboMult>3?6:4;
        addShake(0.15+comboMult*0.05);
        screenFlash=3;screenFlashColor='#ffd60a';
        // Score popup with combo
        const txt=comboMult>1?`+${points} x${comboMult}!`:`+${points}`;
        const col=comboMult>4?'#ff006e':comboMult>2?'#00f5ff':'#ffd60a';
        addScorePopup(e.x,e.y-10,txt,col);
        playSFX('enemy_stomp',0.5);
        try{gameSFX.stomp()}catch(e2){}
        emitParticles(e.x,e.y,'dust');
        emitParticles(e.x,e.y,'sparkle');
        if(settings.vibrate&&navigator.vibrate) navigator.vibrate(40+comboMult*10);
      }else{
        gameOver=true;gameRunning=false;
        playSFX('hurt',0.5);
        try{gameSFX.hurt()}catch(e2){}
        if(settings.vibrate&&navigator.vibrate) navigator.vibrate([100,50,100]);
        screenFlash=8;screenFlashColor='#ff006e';slowMo=0.3;
        endGame();
      }
    }
  }
}

function drawGame(){
  // Apply camera shake
  gctx.save();
  gctx.translate(camShakeX,camShakeY);

  drawParallax();

  // Platforms (Green Hill Zone style — enhanced)
  for(const p of platforms){
    const sx=Math.floor(p.x-camX);
    if(sx>CW+20||sx+p.w<-20) continue;
    if(p.ground){
      for(let y=0;y<p.h;y+=4){
        for(let x=0;x<p.w;x+=4){
          const c1=y<10?'#46cd6e':'#3d8a3d';
          const c2=y<10?'#3d8a3d':'#2d7a2d';
          gctx.fillStyle=((Math.floor((p.x+x)/4)+Math.floor(y/4))%2===0)?c1:c2;
          gctx.fillRect(sx+x,p.y+y,4,4);
        }
      }
      gctx.fillStyle='#73e88e';gctx.fillRect(sx,p.y,p.w,3);
      gctx.fillStyle='#90f0a0';
      for(let gx=0;gx<p.w;gx+=5){
        const gh=3+((gx*7+Math.floor(p.x))%6);
        gctx.fillRect(sx+gx,p.y-gh,2,gh);
      }
      gctx.fillStyle='#5c3a1a';gctx.fillRect(sx,p.y+p.h-5,p.w,5);
      gctx.fillStyle='#7a4a2a';gctx.fillRect(sx,p.y+p.h-7,p.w,2);
      // Earthy detail spots
      gctx.fillStyle='#4a2a0a';
      for(let dx=8;dx<p.w-8;dx+=18){gctx.fillRect(sx+dx,p.y+p.h-12,3,2)}
    }else{
      const platGrad=gctx.createLinearGradient(0,p.y,0,p.y+p.h);
      platGrad.addColorStop(0,'#c0d4ee');platGrad.addColorStop(0.3,'#8b9bb4');platGrad.addColorStop(1,'#6a7a8a');
      gctx.fillStyle=platGrad;gctx.fillRect(sx,p.y,p.w,p.h);
      gctx.fillStyle='#e0ecf8';gctx.fillRect(sx,p.y,p.w,2);
      gctx.fillStyle='#4a5a6a';gctx.fillRect(sx,p.y+p.h-1,p.w,1);
      gctx.fillStyle='#7a8a9a';
      gctx.fillRect(sx+Math.floor(p.w/3),p.y+2,1,p.h-3);
      gctx.fillRect(sx+Math.floor(p.w*2/3),p.y+2,1,p.h-3);
      // Glow under floating platform
      gctx.fillStyle='rgba(0,245,255,0.05)';gctx.fillRect(sx-2,p.y+p.h,p.w+4,6);
    }
  }

  // Powerups
  for(const pu of powerups){
    if(pu.collected) continue;
    const sx=Math.floor(pu.x-camX);
    if(sx<-15||sx>CW+15) continue;
    const bob=Math.sin(pu.anim*3)*4;
    const sparkle=Math.sin(frameCount*0.2)*0.3+0.7;
    const cols={shield:'#00f5ff',magnet:'#ff006e',speed:'#00ff87'};
    const icons={shield:'S',magnet:'M',speed:'F'};
    // Glow
    gctx.fillStyle=cols[pu.type];gctx.globalAlpha=0.15*sparkle;
    gctx.fillRect(sx-4,pu.y+bob-4,22,22);gctx.globalAlpha=1;
    // Box
    gctx.fillStyle='#1a1c2c';gctx.fillRect(sx,pu.y+bob,14,14);
    gctx.fillStyle=cols[pu.type];gctx.fillRect(sx+1,pu.y+bob+1,12,12);
    gctx.fillStyle='#1a1c2c';gctx.font='8px "Press Start 2P"';
    gctx.fillText(icons[pu.type],sx+3,pu.y+bob+11);
    // Sparkle corners
    if(Math.sin(frameCount*0.1+pu.x)>0.5){
      gctx.fillStyle='#fff';gctx.fillRect(sx-1,pu.y+bob-1,2,2);gctx.fillRect(sx+13,pu.y+bob+13,2,2);
    }
  }

  // Rings (golden rings with glow)
  for(const r of rings){
    if(r.collected) continue;
    const sx=Math.floor(r.x-camX);
    if(sx<-12||sx>CW+12) continue;
    const rw=Math.floor(Math.abs(Math.cos(r.anim))*11)+2;
    // Glow
    gctx.fillStyle='rgba(255,214,10,0.08)';gctx.fillRect(sx+5-rw/2-3,r.y-3,rw+6,18);
    // Outer ring
    gctx.fillStyle='#daa520';gctx.fillRect(sx+5-rw/2,r.y,rw,13);
    const iw=Math.max(rw-4,1);
    gctx.fillStyle='#8b6914';gctx.fillRect(sx+5-iw/2,r.y+3,iw,7);
    // Shine
    gctx.fillStyle='#ffe066';gctx.fillRect(sx+5-rw/2,r.y,Math.max(rw/2,1),3);
    gctx.fillStyle='#fff8cc';gctx.fillRect(sx+5-rw/2+1,r.y+1,2,2);
  }

  // Enemies v3.0 (ground badniks + flying drones)
  for(const e of enemies){
    if(!e.alive) continue;
    const sx=Math.floor(e.x-camX);
    if(sx<-25||sx>CW+25) continue;
    if(e.type==='flying'){
      // Flying drone — hovering enemy
      const ey=Math.floor(e.y);
      // Propeller
      const propW=Math.sin(frameCount*0.5)*8;
      gctx.fillStyle='#8b9bb4';gctx.fillRect(sx+4-Math.abs(propW/2),ey-3,Math.abs(propW)+6,2);
      // Body
      gctx.fillStyle='#7b1fa2';gctx.fillRect(sx+2,ey,16,10);
      gctx.fillStyle='#9c27b0';gctx.fillRect(sx+3,ey+1,14,4);
      // Eye
      gctx.fillStyle='#ff0';gctx.fillRect(sx+7,ey+3,6,4);
      gctx.fillStyle='#f00';gctx.fillRect(sx+9,ey+4,2,2);
      // Glow
      gctx.fillStyle='rgba(156,39,176,0.1)';gctx.fillRect(sx-2,ey+10,24,4);
    }else{
      // Ground badnik
      const bob=Math.sin(frameCount*0.1+e.x)*2;
      const ey=Math.floor(e.y+bob);
      gctx.fillStyle='#c0392b';gctx.fillRect(sx+1,ey+2,16,12);
      gctx.fillStyle='#e74c3c';gctx.fillRect(sx+2,ey+1,14,3);
      gctx.fillStyle='#8b9bb4';gctx.fillRect(sx+3,ey-1,12,3);
      gctx.fillStyle='#d0e0f0';gctx.fillRect(sx+4,ey-1,10,1);
      gctx.fillStyle='#1a1c2c';gctx.fillRect(sx+3,ey+5,4,3);gctx.fillRect(sx+11,ey+5,4,3);
      gctx.fillStyle='#ff0';gctx.fillRect(sx+4,ey+6,2,2);gctx.fillRect(sx+12,ey+6,2,2);
      gctx.fillStyle='#8b9bb4';gctx.fillRect(sx-1,ey+5,2,4);gctx.fillRect(sx+17,ey+5,2,4);
      gctx.fillRect(sx+3,ey+14,5,2);gctx.fillRect(sx+10,ey+14,5,2);
      gctx.fillStyle='#2c3e50';gctx.fillRect(sx+6,ey+10,6,2);
      gctx.fillStyle='#7f8c8d';gctx.fillRect(sx+7,ey+10,1,2);gctx.fillRect(sx+9,ey+10,1,2);gctx.fillRect(sx+11,ey+10,1,2);
    }
  }

  // Particles
  updateDrawParticles(camX);

  // Player trail (afterimages when boosting)
  for(const t of player.trail){
    const tsx=Math.floor(t.x-camX);
    const tsy=Math.floor(t.y);
    gctx.globalAlpha=t.alpha*0.3;
    drawMonster(gctx,charIdx,tsx,tsy-(28*2-30),2,'run1');
    gctx.globalAlpha=1;
  }

  // Player with squash/stretch
  const psx=Math.floor(player.x-camX);
  const psy=Math.floor(player.y);
  const scale=2;
  const charW=22*scale,charH=28*scale;

  // Invincibility flash
  if(player.invincible>0&&frameCount%6<3){gctx.globalAlpha=0.5}

  if(player.curled&&!player.grounded){
    // Spin ball
    const bodyCol=M_BODY[charIdx].find(p=>p[2]>10)?.[4]||'#4488cc';
    const accentCol=ML[charIdx][4];
    const rr=frameCount*0.35;
    for(let dy=0;dy<22;dy+=2)for(let dx=0;dx<22;dx+=2){
      if(((dx-11)*(dx-11)+(dy-11)*(dy-11))<121){
        gctx.fillStyle=((dx+dy+Math.floor(rr))%6<3)?bodyCol:accentCol;
        gctx.fillRect(psx+dx,psy+dx%2,2,2);
      }
    }
    // Spin glow
    gctx.fillStyle='rgba(255,214,10,0.1)';gctx.fillRect(psx-3,psy-3,28,28);
  }else{
    let state='idle';
    if(!player.grounded) state=player.vy<0?'jump':'fall';
    else if(Math.abs(player.vx)>0.5) state=(Math.floor(animTimer/6)%2===0)?'run1':'run2';
    if(landTimer>0) state='land';

    const flip=player.facing<0;
    // Apply squash/stretch
    gctx.save();
    const cx=psx+charW/2,cy=psy+30;
    gctx.translate(cx,cy);
    gctx.scale(player.scaleX*(flip?-1:1),player.scaleY);
    gctx.translate(-cx,-cy);
    drawMonster(gctx,charIdx,flip?psx:psx,psy-(charH-30),scale,state);
    gctx.restore();
  }
  gctx.globalAlpha=1;

  // Score popups
  for(let i=scorePopups.length-1;i>=0;i--){
    const sp=scorePopups[i];
    sp.life--;
    if(sp.life<=0){scorePopups.splice(i,1);continue}
    const prog=1-sp.life/sp.maxLife;
    gctx.globalAlpha=1-prog;
    gctx.fillStyle=sp.color;
    gctx.font='bold 9px "Press Start 2P"';
    gctx.fillText(sp.text,Math.floor(sp.x-camX)-10,Math.floor(sp.y-prog*35));
  }
  gctx.globalAlpha=1;

  gctx.restore(); // End camera shake transform

  // HUD (outside camera shake)
  gctx.fillStyle='rgba(0,0,0,0.3)';gctx.fillRect(0,0,CW,30);
  gctx.fillStyle='#ffd60a';gctx.font='9px "Press Start 2P"';
  gctx.fillText('SCORE:'+gameScore,8,14);
  gctx.fillStyle='#ffd60a';gctx.fillText('RINGS:'+ringCount,8,26);
  // Combo indicator
  if(player.combo>1){
    gctx.fillStyle=player.combo>4?'#ff006e':'#00f5ff';
    gctx.fillText('COMBO x'+player.combo,170,14);
  }
  if(player.boosting){gctx.fillStyle='#00ff87';gctx.fillText('BOOST!',CW-90,14)}
  if(player.invincible>0){gctx.fillStyle='#00f5ff';gctx.fillText('SHIELD',CW-90,26)}
  // Distance
  gctx.fillStyle='#8b9bb4';gctx.font='7px "Press Start 2P"';
  gctx.fillText(Math.floor(distance)+'m',CW-60,26);

  // Screen flash
  if(screenFlash>0){
    gctx.fillStyle=screenFlashColor;gctx.globalAlpha=screenFlash*0.08;
    gctx.fillRect(0,0,CW,CH);gctx.globalAlpha=1;
    screenFlash--;
  }

  // Game over
  if(gameOver){
    gctx.fillStyle='rgba(10,12,28,0.8)';gctx.fillRect(0,0,CW,CH);
    gctx.fillStyle='#f4b41b';gctx.font='18px "Press Start 2P"';
    gctx.fillText('GAME OVER',CW/2-90,CH/2-30);
    gctx.font='9px "Press Start 2P"';gctx.fillStyle='#f0f0e8';
    gctx.fillText('Score: '+gameScore+'  Rings: '+ringCount+'  Dist: '+Math.floor(distance)+'m',CW/2-150,CH/2);
    if(player.combo>1){gctx.fillStyle='#ff006e';gctx.fillText('Best Combo: x'+player.combo,CW/2-70,CH/2+18)}
    gctx.fillStyle='#00f5ff';gctx.font='10px "Press Start 2P"';
    gctx.fillText('Tap to restart',CW/2-70,CH/2+45);
  }
}

// ===== GAME LOOP v3.0 (delta-time, hitstop, slow-mo) =====
function endGame(){
  if(gameScore>hiScore){
    hiScore=gameScore;localStorage.setItem('taptoons_hiscore',hiScore);
    document.getElementById('hiscore').textContent=hiScore;
  }
  playSFX('game_over',0.5);
  stopBGM();
  document.getElementById('gameMsg').textContent=`GAME OVER! Score: ${gameScore} Rings: ${ringCount} Dist: ${Math.floor(distance)}m`;
}

function startGame(){
  initAudio();
  gameRunning=true;gameOver=false;gameScore=0;ringCount=0;frameCount=0;distance=0;MAX_VX=4.5;
  player={x:80,y:GROUND_Y-34,vx:0,vy:0,grounded:false,facing:1,curled:false,boosting:false,boostTimer:0,
    scaleX:1,scaleY:1,trail:[],combo:0,comboTimer:0,invincible:0,doubleJump:false,hasDoubleJump:true};
  camX=0;camShakeX=0;camShakeY=0;animTimer=0;breatheTimer=0;landTimer=0;wasAirborne=false;
  hitstopFrames=0;screenFlash=0;slowMo=1;scorePopups=[];
  particles.length=0;
  generateLevel();
  document.getElementById('score').textContent='0';
  document.getElementById('gameMsg').textContent='Collect rings! Double-jump! Stomp enemies for combos!';
  document.getElementById('gamePad').classList.add('visible');
  lastFrameTime=performance.now();
  playBGM();
  requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp){
  if(!gameRunning) return;

  // Delta time (capped at 50ms to prevent spiral of death)
  dt=Math.min((timestamp-lastFrameTime)/1000,0.05);
  lastFrameTime=timestamp;

  // Hitstop: freeze game updates but still draw
  if(hitstopFrames>0){
    hitstopFrames--;
    drawGame();
    requestAnimationFrame(gameLoop);
    return;
  }

  // Slow-mo recovery
  if(slowMo<1) slowMo=Math.min(slowMo+0.02,1);
  const effectiveDt=dt*slowMo;

  // Fixed timestep with accumulator for physics consistency
  accumulator+=effectiveDt;
  while(accumulator>=FIXED_DT){
    frameCount++;animTimer++;
    updatePlayer();updateRings();updateEnemies();updatePowerups();
    distance+=Math.max(player.vx*0.1,0.05);
    accumulator-=FIXED_DT;
  }

  // Camera smooth follow
  const targetCam=player.x-100;
  camX+=(targetCam-camX)*0.12;
  if(camX<0) camX=0;

  // Camera shake (perlin-like)
  if(shakeTrauma>0.01){
    shakeTrauma*=0.9;
    const inf=shakeTrauma*shakeTrauma;
    camShakeX=(Math.random()*2-1)*inf*10;
    camShakeY=(Math.random()*2-1)*inf*10;
  }else{shakeTrauma=0;camShakeX=0;camShakeY=0}

  // Level streaming
  if(player.x>nextSegX-700) appendSegment();
  platforms=platforms.filter(p=>p.x+p.w>camX-250);
  rings=rings.filter(r=>r.x>camX-120);
  enemies=enemies.filter(e=>e.x>camX-120);
  powerups=powerups.filter(p=>p.x>camX-120);

  // Progressive difficulty
  if(frameCount%900===0&&MAX_VX<7) MAX_VX+=0.12;

  drawGame();
  if(gameRunning) requestAnimationFrame(gameLoop);
}

function initGame(){
  const sel=document.getElementById('charSelect');

  gctx.fillStyle='#ffd60a';gctx.font='20px "Press Start 2P"';

  gctx.font='10px "Press Start 2P"';gctx.fillStyle='#00f5ff';
  gctx.fillText('ARCADE EDITION v3.0',CW/2-95,92);
  gctx.font='8px "Press Start 2P"';gctx.fillStyle='#73e88e';
  gctx.fillText('6 Monsters | Combos | Double Jump | Power-ups',CW/2-175,112);
  gctx.fillStyle='#f0f0e8';gctx.font='10px "Press Start 2P"';
  gctx.fillText('Tap to start!',CW/2-65,140);
  // Character preview
  drawMonster(gctx,charIdx,30,GROUND_Y-58,2,'idle');
  drawMonster(gctx,(charIdx+1)%6,CW-80,GROUND_Y-58,2,'run1');
}

});

// ===== SHAKE DETECTION =====
let lastShake=0;
function handleShake(e){
  if(!settings.shake) return;
  const a=e.accelerationIncludingGravity||e.acceleration;
  if(!a) return;
  const force=Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z);
  if(force>25&&Date.now()-lastShake>300){
    lastShake=Date.now();
    const ind=document.getElementById('shakeInd');
    ind.classList.add('active');setTimeout(()=>ind.classList.remove('active'),500);
    if(document.getElementById('tab-game').classList.contains('active')){
      if(!gameRunning||gameOver) startGame();
      else input.jumpPressed=true;
    }else{
      handleCharShake();
    }
  }
}
if(window.DeviceMotionEvent){
  if(typeof DeviceMotionEvent.requestPermission==='function'){
    document.addEventListener('click',()=>{
      DeviceMotionEvent.requestPermission().then(r=>{
        if(r==='granted') window.addEventListener('devicemotion',handleShake)
      }).catch(()=>{})
    },{once:true});
  }else{
    window.addEventListener('devicemotion',handleShake);
  }
}

// ===== STARFIELD BACKGROUND =====
const sfCanvas=document.getElementById('starfield');
const sfCtx=sfCanvas.getContext('2d');
let stars=[];
function initStarfield(){
  sfCanvas.width=window.innerWidth;sfCanvas.height=window.innerHeight;
  stars=[];
  for(let layer=0;layer<3;layer++){
    const count=layer===0?40:layer===1?25:15;
    const speed=layer===0?0.15:layer===1?0.35:0.6;
    const size=layer===0?1:layer===1?2:3;
    const alpha=layer===0?0.3:layer===1?0.6:1;
    for(let i=0;i<count;i++){
      stars.push({x:Math.random()*sfCanvas.width,y:Math.random()*sfCanvas.height,
        speed,size,alpha,twinkle:Math.random()*Math.PI*2,twinkleSpeed:0.02+Math.random()*0.03});
    }
  }
}
let sfFrame=0;
function drawStarfield(){
  sfFrame++;
  sfCtx.fillStyle='#0f0e1d';sfCtx.fillRect(0,0,sfCanvas.width,sfCanvas.height);
  const ng=sfCtx.createRadialGradient(sfCanvas.width*0.3,sfCanvas.height*0.4,0,sfCanvas.width*0.3,sfCanvas.height*0.4,sfCanvas.width*0.5);
  ng.addColorStop(0,'rgba(255,0,110,0.03)');ng.addColorStop(0.5,'rgba(0,245,255,0.02)');ng.addColorStop(1,'transparent');
  sfCtx.fillStyle=ng;sfCtx.fillRect(0,0,sfCanvas.width,sfCanvas.height);
  stars.forEach(s=>{
    s.y+=s.speed;
    if(s.y>sfCanvas.height){s.y=-2;s.x=Math.random()*sfCanvas.width}
    s.twinkle+=s.twinkleSpeed;
    const a=s.alpha*(0.7+0.3*Math.sin(s.twinkle));
    sfCtx.globalAlpha=a;
    sfCtx.fillStyle=s.size>2?'#ffd60a':'#f0f0ff';
    sfCtx.fillRect(Math.floor(s.x),Math.floor(s.y),s.size,s.size);
    if(s.size>2){sfCtx.globalAlpha=a*0.2;sfCtx.fillRect(s.x-1,s.y-1,s.size+2,s.size+2)}
  });
  sfCtx.globalAlpha=1;
  requestAnimationFrame(drawStarfield);
}
initStarfield();drawStarfield();
window.addEventListener('resize',initStarfield);

// ===== SCREEN SHAKE =====
let shakeTrauma=0;
const shakeNoise=Array.from({length:100},()=>Math.random()*2-1);
let shakeIdx=0;
function addShake(amount){shakeTrauma=Math.min(shakeTrauma+amount,1)}
function updateShake(){
  shakeTrauma*=0.92;shakeIdx=(shakeIdx+1)%100;
  if(shakeTrauma<0.01){shakeTrauma=0;document.querySelector('.app-wrap').style.transform='';return}
  const inf=shakeTrauma*shakeTrauma;
  const dx=shakeNoise[shakeIdx]*inf*8;
  const dy=shakeNoise[(shakeIdx+1)%100]*inf*8;
  document.querySelector('.app-wrap').style.transform=`translate(${dx}px,${dy}px)`;
  requestAnimationFrame(updateShake);
}

// ===== CONFETTI SYSTEM =====
const confCanvas=document.getElementById('confettiCanvas');
const confCtx=confCanvas.getContext('2d');
let confetti=[];
function resizeConfetti(){confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight}
resizeConfetti();window.addEventListener('resize',resizeConfetti);
function burstConfetti(x,y,count=40){
  const colors=['#ff006e','#00f5ff','#ffd60a','#00ff87','#f0f0ff','#f77622'];
  for(let i=0;i<count;i++){
    confetti.push({x,y,vx:(Math.random()-0.5)*14,vy:-Math.random()*16-6,
      gravity:0.25,rot:Math.random()*6.28,rotSpd:(Math.random()-0.5)*0.4,
      life:1,decay:Math.random()*0.008+0.005,
      color:colors[Math.floor(Math.random()*colors.length)],
      size:4+Math.random()*6});
  }
  animateConfetti();
}
let confAnimating=false;
function animateConfetti(){
  if(confAnimating) return;confAnimating=true;
  function loop(){
    confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
    confetti=confetti.filter(p=>p.life>0);
    confetti.forEach(p=>{
      p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotSpd;p.life-=p.decay;
      confCtx.save();confCtx.globalAlpha=p.life;confCtx.fillStyle=p.color;
      confCtx.translate(p.x,p.y);confCtx.rotate(p.rot);
      confCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size);confCtx.restore();
    });
    if(confetti.length>0) requestAnimationFrame(loop);
    else confAnimating=false;
  }
  loop();
}
