/* === PARTICLE SYSTEM (Pool-based, zero GC) === */
const MAX_P=120;
const particles=[];
for(let i=0;i<MAX_P;i++)particles.push({active:false,x:0,y:0,vx:0,vy:0,life:0,maxLife:0,
type:'spark',color:'#fff',size:3,gravity:0.3,friction:0.98,alpha:1,rotation:0,rotSpeed:0});
let pIdx=0;

function emitP(x,y,type,count,opts={}){
for(let i=0;i<count;i++){
const p=particles[pIdx];pIdx=(pIdx+1)%MAX_P;
p.active=true;p.x=x;p.y=y;p.life=0;p.rotation=0;
p.type=type;
const ang=(opts.angle||0)+(Math.random()-0.5)*(opts.spread||Math.PI*2);
const spd=(opts.speed||4)+Math.random()*(opts.speedVar||3);
p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;
p.maxLife=opts.life||30;p.color=opts.color||'#fff';
p.size=opts.size||3;p.gravity=opts.gravity??0.3;
p.friction=opts.friction||0.97;p.alpha=1;
p.rotSpeed=(Math.random()-0.5)*0.3;
}}

function updateParticles(){
for(let i=0;i<MAX_P;i++){const p=particles[i];if(!p.active)continue;
p.life++;if(p.life>=p.maxLife){p.active=false;continue;}
p.vx*=p.friction;p.vy*=p.friction;p.vy+=p.gravity;
p.x+=p.vx;p.y+=p.vy;p.rotation+=p.rotSpeed;
p.alpha=1-(p.life/p.maxLife);}}

function drawParticles(){
for(let i=0;i<MAX_P;i++){const p=particles[i];if(!p.active)continue;
cx.save();cx.globalAlpha=p.alpha;cx.translate(p.x*S,p.y*S);cx.rotate(p.rotation);
if(p.type==='spark'){
cx.fillStyle=p.color;
cx.fillRect(-p.size*S*0.5,-p.size*S*2,p.size*S,p.size*S*4);
}else if(p.type==='ring'){
cx.strokeStyle=p.color;cx.lineWidth=2*S;
const r=p.life*2.5*S;
cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.stroke();
}else if(p.type==='ink'){
// Ink splatter blob
const sz=p.size*(1+p.life*0.1)*S;
cx.fillStyle=p.color;cx.beginPath();
cx.ellipse(0,0,sz,sz*0.6,p.rotation,0,Math.PI*2);cx.fill();
}else if(p.type==='smoke'){
const sz=p.size*(1+p.life*0.15)*S;
const g=cx.createRadialGradient(0,0,0,0,0,sz);
g.addColorStop(0,p.color);g.addColorStop(1,'rgba(0,0,0,0)');
cx.fillStyle=g;cx.beginPath();cx.arc(0,0,sz,0,Math.PI*2);cx.fill();
}else if(p.type==='fire'){
const sz=p.size*(1-p.life/p.maxLife)*S;
cx.fillStyle=p.color;cx.beginPath();
cx.moveTo(0,-sz*2);cx.quadraticCurveTo(sz,0,0,sz);cx.quadraticCurveTo(-sz,0,0,-sz*2);cx.fill();
}else{
cx.fillStyle=p.color;cx.beginPath();cx.arc(0,0,p.size*S,0,Math.PI*2);cx.fill();
}
cx.restore();}}

/* === COMBO SYSTEM === */
const COMBO_WINDOW=14;
function ComboTracker(){return{hits:[],timer:0,count:0,damage:0,
add(mv,dm){this.hits.push(mv);this.count++;this.damage+=dm;this.timer=60;},
update(){if(this.timer>0){this.timer--;if(this.timer<=0)this.reset();}},
reset(){this.hits=[];this.count=0;this.damage=0;this.timer=0;}};}

let screenShake={x:0,y:0,intensity:0,decay:0.9};

/* === 3D VOLUMETRIC RENDERER === */
/* Core: Multi-pass rendering with volumetric gradients, rim lighting, AO, specular */

function vol3D(ctx,cx_,cy,rx,ry,skin,angle,isBack){
// Volumetric ellipse with 3D shading
ctx.save();
ctx.translate(cx_,cy);
if(angle)ctx.rotate(angle);

// Ambient Occlusion (contact shadow)
if(!isBack){
ctx.fillStyle='rgba(0,0,0,0.25)';
ctx.beginPath();ctx.ellipse(2*S,3*S,rx*1.05,ry*1.05,0,0,Math.PI*2);ctx.fill();}

// Base volumetric gradient - offset toward light source
const hlx=-rx*0.3*LIGHT.x;
const hly=-ry*0.3*LIGHT.y;
const g=ctx.createRadialGradient(hlx,hly,0,0,0,Math.max(rx,ry)*1.1);
g.addColorStop(0,skin[0]);   // Highlight
g.addColorStop(0.35,skin[1]); // Mid-light
g.addColorStop(0.7,skin[2]);  // Mid-shadow
g.addColorStop(1.0,skin[3]);  // Deep shadow

ctx.fillStyle=g;
ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);ctx.fill();

// Specular highlight (hot spot)
const sg=ctx.createRadialGradient(hlx*0.6,hly*0.6,0,hlx*0.6,hly*0.6,rx*0.35);
sg.addColorStop(0,'rgba(255,255,255,0.5)');
sg.addColorStop(1,'rgba(255,255,255,0)');
ctx.fillStyle=sg;
ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);ctx.fill();

// Rim light (back edge glow - blue tint)
if(!isBack){
ctx.strokeStyle='rgba(100,180,255,0.35)';
ctx.lineWidth=2.5*S;
ctx.beginPath();
ctx.ellipse(0,0,rx*0.95,ry*0.95,0,Math.PI*0.55+LIGHT.angle,Math.PI*1.45+LIGHT.angle);
ctx.stroke();}

ctx.restore();
}

function vol3DRect(ctx,x,y,w,h,colors,angle){
// Volumetric rectangle (for torso, limb segments) with 3D shading
ctx.save();
ctx.translate(x,y);
if(angle)ctx.rotate(angle);

// AO shadow
ctx.fillStyle='rgba(0,0,0,0.2)';
ctx.beginPath();
roundRect(ctx,-w/2+2*S,-h/2+2*S,w,h,w*0.2);ctx.fill();

// Volumetric gradient
const g=ctx.createLinearGradient(-w*0.5*LIGHT.x,-h*0.5*LIGHT.y,w*0.5*LIGHT.x,h*0.5*LIGHT.y);
g.addColorStop(0,colors[0]);
g.addColorStop(0.4,colors[1]);
g.addColorStop(0.75,colors[2]);
g.addColorStop(1,colors[3]);
ctx.fillStyle=g;
ctx.beginPath();roundRect(ctx,-w/2,-h/2,w,h,w*0.2);ctx.fill();

// Specular streak
ctx.fillStyle='rgba(255,255,255,0.2)';
ctx.beginPath();roundRect(ctx,-w/2+w*0.15,-h/2+h*0.1,w*0.25,h*0.4,w*0.1);ctx.fill();

// Rim
ctx.strokeStyle='rgba(100,180,255,0.25)';
ctx.lineWidth=1.5*S;
ctx.beginPath();roundRect(ctx,-w/2,-h/2,w,h,w*0.2);ctx.stroke();

ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
}

/* === DRAW FIGHTER 3D === */
function drawFighter3D(f){
const c=f.c;const fc=f.fc;const px=f.x*S;const py=f.y*S;
const sc=S*(c.height/180);// Scale based on character height

// Calculate limb positions based on animation state
const t=f.anim;const idle=Math.sin(t*2)*0.05;
let armF=f.armAngle,armB=f.backArmAngle,legF=f.legAngle,legB=f.backLegAngle;
let bodyT=f.bodyTilt;

// Animation poses
if(f.state==='idle'){
armF=Math.sin(t*1.5)*0.15;armB=-Math.sin(t*1.5)*0.1;
legF=Math.sin(t)*0.05;legB=-Math.sin(t)*0.05;bodyT=0;}
else if(f.state==='walk'){
armF=Math.sin(t*4)*0.6;armB=-Math.sin(t*4)*0.6;
legF=Math.sin(t*4)*0.5;legB=-Math.sin(t*4)*0.5;}
else if(f.state==='crouch'){armF=0.3;armB=-0.1;bodyT=0.2;}
else if(f.state==='jump'){armF=-0.8;armB=-0.5;legF=0.4;legB=-0.2;}
else if(f.attacking){
const progress=f.atkFrame/(MV[f.curAtk]?MV[f.curAtk].su+MV[f.curAtk].ac:10);
if(f.curAtk==='lp'||f.curAtk==='mp'||f.curAtk==='hp'){
armF=-1.2-progress*0.8;bodyT=-0.15*progress;}
else if(f.curAtk==='lk'||f.curAtk==='mk'||f.curAtk==='hk'){
legF=-1.0-progress*0.6;bodyT=0.1;}
else if(f.curAtk==='sweep'){legF=1.2;bodyT=0.4;}
else if(f.curAtk&&f.curAtk.startsWith('special')){
armF=-1.5;armB=-0.8;bodyT=-0.3;}}
else if(f.hit){bodyT=0.3;armF=0.5;armB=0.3;legF=0.1;}
else if(f.blocking){armF=0.8;armB=0.5;bodyT=0.1;}

cx.save();
cx.translate(px,py);
cx.scale(fc,1);// Mirror for facing direction

// === GROUND SHADOW (perspective) ===
const shadowScale=1.0-Math.max(0,(FLOOR_Y-f.y)/300);
cx.save();
cx.scale(1.2,0.3);cx.translate(0,0);
const shG=cx.createRadialGradient(0,10*sc,0,0,10*sc,40*sc);
shG.addColorStop(0,'rgba(0,0,0,0.5)');shG.addColorStop(1,'rgba(0,0,0,0)');
cx.fillStyle=shG;cx.beginPath();cx.ellipse(0,10*sc,35*sc*shadowScale,12*sc,0,0,Math.PI*2);cx.fill();
cx.restore();

// === BODY RENDERING (Back to Front) ===
cx.save();
cx.rotate(bodyT);

const skinC=c.skin;
const outC=c.outfit.primary;
const secC=c.outfit.secondary||c.outfit.primary;

// -- Back Leg --
cx.save();cx.globalAlpha=0.85;
const blx=8*sc,bly=-20*sc;
cx.translate(blx,bly);cx.rotate(legB);
// Thigh
vol3D(cx,0,20*sc,11*sc,22*sc,outC,0,true);
// Shin
cx.translate(0,40*sc);cx.rotate(legB*0.5);
vol3D(cx,0,15*sc,9*sc,20*sc,outC,0,true);
// Boot
vol3D(cx,3*sc,35*sc,11*sc,8*sc,['#1a1a1a','#111','#0a0a0a','#050505'],0,true);
cx.restore();cx.globalAlpha=1;

// -- Back Arm --
cx.save();cx.globalAlpha=0.85;
const bax=-5*sc,bay=-65*sc;
cx.translate(bax,bay);cx.rotate(armB);
// Upper arm
vol3D(cx,0,15*sc,9*sc,18*sc,skinC,0,true);
// Forearm
cx.translate(0,32*sc);cx.rotate(armB*0.5);
vol3D(cx,0,12*sc,8*sc,16*sc,skinC,0,true);
// Fist
vol3D(cx,0,28*sc,7*sc,7*sc,skinC,0,true);
cx.restore();cx.globalAlpha=1;

// -- Torso --
// Waist/Belt
vol3DRect(cx,0,-15*sc,30*sc,10*sc,
[c.outfit.belt||'#333','#222','#111','#050505'],0);
// Abdomen
vol3DRect(cx,0,-32*sc,28*sc,22*sc,outC,0);
// Chest
vol3DRect(cx,0,-56*sc,34*sc,26*sc,outC,0);
// Muscle definition (pectorals)
cx.fillStyle='rgba(0,0,0,0.1)';
cx.beginPath();cx.moveTo(0,-68*sc);cx.lineTo(-4*sc,-44*sc);cx.lineTo(4*sc,-44*sc);cx.closePath();cx.fill();

// Neck
vol3D(cx,0,-72*sc,7*sc,10*sc,skinC,0,false);

// -- Front Leg --
cx.save();
const flx=-8*sc,fly=-20*sc;
cx.translate(flx,fly);cx.rotate(legF);
// Thigh
vol3D(cx,0,20*sc,13*sc,24*sc,outC,0,false);
// Knee detail
vol3D(cx,0,38*sc,8*sc,8*sc,outC,0,false);
// Shin
cx.translate(0,42*sc);cx.rotate(legF*0.5);
vol3D(cx,0,15*sc,10*sc,22*sc,outC,0,false);
// Boot
vol3D(cx,3*sc,35*sc,12*sc,9*sc,['#1a1a1a','#111','#0a0a0a','#050505'],0,false);
cx.restore();

// -- Front Arm --
cx.save();
const fax=5*sc,fay=-65*sc;
cx.translate(fax,fay);cx.rotate(armF);
// Shoulder pad
vol3D(cx,0,-3*sc,12*sc,10*sc,outC,0,false);
// Upper arm (bicep)
vol3D(cx,0,15*sc,11*sc,20*sc,skinC,0,false);
// Elbow
vol3D(cx,0,30*sc,7*sc,7*sc,skinC,0,false);
// Forearm
cx.translate(0,34*sc);cx.rotate(armF*0.6);
vol3D(cx,0,12*sc,9*sc,18*sc,skinC,0,false);
// Fist (larger when attacking)
const fistScale=f.attacking?1.3:1.0;
vol3D(cx,0,28*sc,8*sc*fistScale,8*sc*fistScale,skinC,0,false);
cx.restore();

cx.restore();// End body tilt

// === HEAD ===
drawHead3D(cx,0,-82*sc,c,sc,f);

// === CAPE (if applicable) ===
if(c.outfit.cape){drawCape3D(cx,0,-60*sc,c,sc,f);}

// === WEAPON/PROPS ===
if(c.outfit.cigar)drawCigar(cx,8*sc,-82*sc,sc);
if(c.outfit.hammer)drawHammer(cx,25*sc,-50*sc,sc,f);

// === CALLIGRAPHIC OUTLINE (SF4 ink style) ===
drawFighterOutline(cx,c,sc,f);

cx.restore();// End main transform
}

function drawHead3D(ctx,hx,hy,c,sc,f){
ctx.save();ctx.translate(hx,hy);

// Head shape (volumetric sphere)
const headR=16*sc;
vol3D(ctx,0,0,headR,headR*1.1,c.skin,0,false);

// Jaw definition
ctx.fillStyle='rgba(0,0,0,0.08)';
ctx.beginPath();ctx.ellipse(0,headR*0.5,headR*0.7,headR*0.4,0,0,Math.PI);ctx.fill();

// === EYES ===
const eyeY=-3*sc;const eyeSpacing=7*sc;
// Eye whites
ctx.fillStyle='#FFFFFF';
ctx.beginPath();ctx.ellipse(-eyeSpacing,eyeY,5*sc,3.5*sc,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(eyeSpacing,eyeY,5*sc,3.5*sc,0,0,Math.PI*2);ctx.fill();
// Iris
ctx.fillStyle=c.eye;
ctx.beginPath();ctx.arc(-eyeSpacing,eyeY,2.5*sc,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(eyeSpacing,eyeY,2.5*sc,0,Math.PI*2);ctx.fill();
// Pupil
ctx.fillStyle='#000';
ctx.beginPath();ctx.arc(-eyeSpacing,eyeY,1.2*sc,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(eyeSpacing,eyeY,1.2*sc,0,Math.PI*2);ctx.fill();
// Eye shine
ctx.fillStyle='rgba(255,255,255,0.8)';
ctx.beginPath();ctx.arc(-eyeSpacing-1*sc,eyeY-1*sc,0.8*sc,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(eyeSpacing-1*sc,eyeY-1*sc,0.8*sc,0,Math.PI*2);ctx.fill();

// Eyebrows (angry)
ctx.strokeStyle='rgba(0,0,0,0.8)';ctx.lineWidth=2.5*sc;ctx.lineCap='round';
ctx.beginPath();ctx.moveTo(-eyeSpacing-5*sc,eyeY-5*sc);ctx.lineTo(-eyeSpacing+3*sc,eyeY-6.5*sc);ctx.stroke();
ctx.beginPath();ctx.moveTo(eyeSpacing+5*sc,eyeY-5*sc);ctx.lineTo(eyeSpacing-3*sc,eyeY-6.5*sc);ctx.stroke();

// Nose
ctx.fillStyle=c.skin[2];
ctx.beginPath();ctx.moveTo(0,eyeY+1*sc);ctx.lineTo(-2.5*sc,eyeY+7*sc);
ctx.lineTo(2.5*sc,eyeY+7*sc);ctx.closePath();ctx.fill();

// Mouth
const mouthY=eyeY+11*sc;
if(f.hit||f.state==='attack'){
// Open mouth (yelling)
ctx.fillStyle='#300';ctx.beginPath();
ctx.ellipse(0,mouthY,5*sc,3*sc,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#FFF';ctx.fillRect(-4*sc,mouthY-1.5*sc,8*sc,1.5*sc);// teeth
}else{
ctx.strokeStyle=c.skin[3];ctx.lineWidth=1.5*sc;
ctx.beginPath();ctx.moveTo(-4*sc,mouthY);ctx.quadraticCurveTo(0,mouthY+2*sc,4*sc,mouthY);ctx.stroke();
}

// === HAIR ===
drawHair3D(ctx,c,sc);

ctx.restore();
}

function drawHair3D(ctx,c,sc){
const colors=[c.hair,shadeColor(c.hair,-30),shadeColor(c.hair,-60)];
const headR=16*sc;

switch(c.hairStyle){
case 'slick':
ctx.fillStyle=c.hair;ctx.beginPath();
ctx.ellipse(0,-headR*0.3,headR*1.05,headR*0.8,0,Math.PI,Math.PI*2);ctx.fill();
ctx.fillStyle=shadeColor(c.hair,30);
ctx.beginPath();ctx.ellipse(-3*sc,-headR*0.5,headR*0.3,headR*0.2,0,Math.PI,Math.PI*2);ctx.fill();
break;
case 'wild':
ctx.fillStyle=c.hair;
for(let i=-5;i<=5;i++){
const ang=-Math.PI*0.5+i*0.15;const len=headR*(1.3+Math.random()*0.4);
ctx.beginPath();ctx.moveTo(0,-headR*0.2);
ctx.quadraticCurveTo(Math.cos(ang)*len*0.6,-headR+Math.sin(ang)*len*0.3,
Math.cos(ang)*len,-headR*0.2+Math.sin(ang)*len*0.5);
ctx.lineWidth=3*sc;ctx.strokeStyle=c.hair;ctx.stroke();}
break;
case 'short':case 'short_neat':case 'slick_short':
ctx.fillStyle=c.hair;ctx.beginPath();
ctx.ellipse(0,-headR*0.35,headR*0.95,headR*0.7,0,Math.PI,Math.PI*2);ctx.fill();
break;
case 'beret':
ctx.fillStyle=c.outfit.beret?c.outfit.beret[0]:'#2F4F2F';
ctx.beginPath();ctx.ellipse(0,-headR*0.6,headR*1.2,headR*0.5,0.1,Math.PI,Math.PI*2);ctx.fill();
ctx.fillStyle=c.outfit.beret?c.outfit.beret[1]:'#1F3F1F';
ctx.beginPath();ctx.ellipse(0,-headR*0.3,headR*1.1,headR*0.15,0,0,Math.PI*2);ctx.fill();
break;
case 'beard':case 'bald_beard':
if(c.hairStyle!=='bald_beard'){
ctx.fillStyle=c.hair;ctx.beginPath();
ctx.ellipse(0,-headR*0.35,headR*0.95,headR*0.7,0,Math.PI,Math.PI*2);ctx.fill();}
// Beard
ctx.fillStyle=c.hair;ctx.beginPath();
ctx.ellipse(0,headR*0.4,headR*0.7,headR*0.6,0,0,Math.PI);ctx.fill();
break;
case 'bob':
ctx.fillStyle=c.hair;ctx.beginPath();
ctx.ellipse(0,-headR*0.1,headR*1.1,headR*1.0,0,Math.PI,Math.PI*2);ctx.fill();
ctx.fillRect(-headR*1.05,-headR*0.1,headR*2.1,headR*0.8);
break;
case 'judicial':
ctx.fillStyle=c.hair;ctx.beginPath();
ctx.ellipse(0,-headR*0.35,headR*0.95,headR*0.7,0,Math.PI,Math.PI*2);ctx.fill();
// Gray temples
ctx.fillStyle='#888';
ctx.fillRect(-headR,-headR*0.1,4*sc,headR*0.5);
ctx.fillRect(headR-4*sc,-headR*0.1,4*sc,headR*0.5);
break;
case 'perfect':
ctx.fillStyle=c.hair;ctx.beginPath();
ctx.ellipse(0,-headR*0.4,headR*1.0,headR*0.75,0,Math.PI,Math.PI*2);ctx.fill();
// Perfect wave
ctx.fillStyle=shadeColor(c.hair,20);ctx.beginPath();
ctx.ellipse(-2*sc,-headR*0.55,headR*0.4,headR*0.25,-0.2,Math.PI,Math.PI*2);ctx.fill();
break;
case 'bald_cap':
// Military cap
ctx.fillStyle=c.outfit.primary[0];ctx.beginPath();
ctx.ellipse(0,-headR*0.5,headR*1.15,headR*0.5,0,Math.PI,Math.PI*2);ctx.fill();
ctx.fillStyle=c.outfit.primary[1];
ctx.fillRect(-headR*1.1,-headR*0.25,headR*2.2,4*sc);
// Visor
ctx.fillStyle='#111';ctx.beginPath();
ctx.ellipse(headR*0.3,-headR*0.25,headR*0.6,headR*0.15,0,0,Math.PI);ctx.fill();
break;
default:
ctx.fillStyle=c.hair;ctx.beginPath();
ctx.ellipse(0,-headR*0.35,headR*0.95,headR*0.7,0,Math.PI,Math.PI*2);ctx.fill();
}}

function drawCape3D(ctx,cx_,cy,c,sc,f){
const cape=c.outfit.cape;if(!cape)return;
ctx.save();ctx.translate(cx_,cy);
const wave=Math.sin(f.anim*2)*5*sc;
const pts=[[-12*sc,-5*sc],[-15*sc,20*sc+wave],[-10*sc,50*sc-wave],
[10*sc,50*sc+wave],[15*sc,20*sc-wave],[12*sc,-5*sc]];
// Cape gradient
const g=ctx.createLinearGradient(0,-5*sc,0,50*sc);
g.addColorStop(0,cape[0]);g.addColorStop(0.4,cape[1]);g.addColorStop(0.7,cape[2]);g.addColorStop(1,cape[3]);

function shadeColor(color,percent){
const num=parseInt(color.replace('#',''),16);
const amt=Math.round(2.55*percent);
const R=Math.min(255,Math.max(0,(num>>16)+amt));
const G=Math.min(255,Math.max(0,((num>>8)&0xFF)+amt));
const B=Math.min(255,Math.max(0,(num&0xFF)+amt));
return'#'+(0x1000000+R*0x10000+G*0x100+B).toString(16).slice(1);}


/* === 5 STAGES — PARALLAX 3D BACKGROUNDS === */
function drawStage(stageIdx,camX){
cx.save();

switch(stageIdx){
case 0: drawStageCongresso(camX);break;
case 1: drawStagePaulista(camX);break;
case 2: drawStageCopacabana(camX);break;
case 3: drawStagePentagon(camX);break;
case 4: drawStageRedSquare(camX);break;
}

// Perspective floor (3D ground plane)
drawPerspectiveFloor(stageIdx,camX);

// Atmospheric vignette
const vig=cx.createRadialGradient(GW*S/2,GH*S/2,GW*S*0.3,GW*S/2,GH*S/2,GW*S*0.7);
vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.4)');
cx.fillStyle=vig;cx.fillRect(0,0,GW*S,GH*S);

cx.restore();
}

function drawPerspectiveFloor(stageIdx,camX){
const horizon=FLOOR_Y*S;
const floorColors=[[40,35,50],[30,35,45],[50,50,40],[25,30,40],[40,45,55]];
const fc=floorColors[stageIdx]||[40,40,40];

for(let y=Math.floor(horizon);y<GH*S;y+=2){
const depth=(y-horizon)/(GH*S-horizon);
const scale=0.3+depth*0.7;
const tileW=60*scale*S;
const brightness=0.3+depth*0.7;
const r=Math.floor(fc[0]*brightness);const g=Math.floor(fc[1]*brightness);const b=Math.floor(fc[2]*brightness);

// Floor tiles with perspective
const offset=(camX*scale*0.5)%tileW;
cx.fillStyle=`rgb(${r},${g},${b})`;
for(let x=-tileW+offset;x<GW*S;x+=tileW){
cx.fillRect(x,y,tileW-1,2);}

// Grid lines (fading with distance)
if(Math.floor(y)%Math.floor(20*S)===0){
cx.fillStyle=`rgba(255,255,255,${0.05*depth})`;
cx.fillRect(0,y,GW*S,1);}
}
}

function drawHPBar(x,y,w,h,hp,maxHp,isLeft){
const pct=Math.max(0,hp/maxHp);

// Metallic frame (3D border)
const fg=cx.createLinearGradient(x,y,x,y+h);
fg.addColorStop(0,'#666');fg.addColorStop(0.3,'#999');fg.addColorStop(0.7,'#444');fg.addColorStop(1,'#222');
cx.fillStyle=fg;
cx.beginPath();roundRect(cx,x-barPad(),y-barPad(),w+barPad()*2,h+barPad()*2,4*S);cx.fill();

// Background
cx.fillStyle='#1a0000';
cx.beginPath();roundRect(cx,x,y,w,h,2*S);cx.fill();

// HP fill with gradient
const hpW=w*pct;
const hpX=isLeft?x:x+w-hpW;
const hg=cx.createLinearGradient(hpX,y,hpX,y+h);
if(pct>0.5){hg.addColorStop(0,'#4f4');hg.addColorStop(0.5,'#2a2');hg.addColorStop(1,'#181');}
else if(pct>0.25){hg.addColorStop(0,'#ff4');hg.addColorStop(0.5,'#aa2');hg.addColorStop(1,'#661');}
else{hg.addColorStop(0,'#f44');hg.addColorStop(0.5,'#a22');hg.addColorStop(1,'#611');}
cx.fillStyle=hg;
cx.beginPath();roundRect(cx,hpX,y,hpW,h,2*S);cx.fill();

// Shine on bar
cx.fillStyle='rgba(255,255,255,0.15)';
cx.beginPath();roundRect(cx,hpX,y,hpW,h*0.4,2*S);cx.fill();

function barPad(){return 3*S;}
}

function drawSuperMeter(x,y,w,h,meter,maxMeter,color){
const pct=meter/maxMeter;
const segs=4;const segW=w/segs;

cx.fillStyle='#111';cx.fillRect(x,y,w,h);

for(let i=0;i<segs;i++){
const segPct=Math.min(1,Math.max(0,(pct*segs)-i));
if(segPct>0){
const sg=cx.createLinearGradient(x+i*segW,y,x+i*segW,y+h);
sg.addColorStop(0,color);sg.addColorStop(1,shadeColor(color,-40));
cx.fillStyle=sg;cx.fillRect(x+i*segW+1,y+1,segW*segPct-2,h-2);
}
cx.strokeStyle='#333';cx.lineWidth=1;
cx.strokeRect(x+i*segW,y,segW,h);
}

// Full meter glow
if(pct>=1){
cx.shadowColor=color;cx.shadowBlur=10*S;
cx.strokeStyle=color;cx.lineWidth=1.5*S;cx.strokeRect(x,y,w,h);
cx.shadowBlur=0;}
}

function drawCombo(x,y,combo){
const scale=1+Math.min(combo.count*0.05,0.5);
cx.save();cx.translate(x,y);cx.scale(scale,scale);
cx.font=`bold ${22*S}px monospace`;cx.textAlign='center';
const color=combo.count<5?'#fff':combo.count<10?'#ff4':'#f44';
cx.fillStyle=color;cx.strokeStyle='#000';cx.lineWidth=3*S;
cx.strokeText(`${combo.count} HITS`,0,0);cx.fillText(`${combo.count} HITS`,0,0);
cx.font=`bold ${12*S}px monospace`;
cx.strokeText(`${combo.damage} DMG`,0,18*S);cx.fillText(`${combo.damage} DMG`,0,18*S);
cx.restore();
}

function drawRounds(x,y,wins){
for(let i=0;i<2;i++){
cx.beginPath();cx.arc(x+i*18*S,y,5*S,0,Math.PI*2);
if(i<wins){cx.fillStyle='#DAA520';cx.fill();}
else{cx.strokeStyle='#555';cx.lineWidth=1.5*S;cx.stroke();}}}

/* === AI SYSTEM === */
function aiUpdate(f,opp){
if(!f.ai)return;
f.aiTimer--;if(f.aiTimer>0)return;
f.aiTimer=10+Math.floor(Math.random()*15);

const dist=Math.abs(f.x-opp.x);
const hpPct=f.hp/f.maxHp;

// Decision making
if(opp.attacking&&dist<80&&Math.random()<0.5){
// Block
f.blocking=true;f.aiAction='block';f.aiTimer=20;return;}
f.blocking=false;

if(dist>200){
// Approach
f.vx=(opp.x>f.x?1:-1)*f.c.spd;f.aiAction='approach';
// Sometimes use projectile
if(Math.random()<0.15&&f.meter>=50){doSpecial(f,opp,'special1');}
}else if(dist>100){
// Mid range — poke or special
const r=Math.random();
if(r<0.3)doAttack(f,'mk');
else if(r<0.5)doAttack(f,'hk');
else if(r<0.7&&f.meter>=100)doSpecial(f,opp,'special2');
else f.vx=(opp.x>f.x?1:-1)*f.c.spd*0.5;
}else{
// Close range — combo or throw
const r=Math.random();
if(r<0.25){doComboString(f,opp);}
else if(r<0.4)doAttack(f,'lp');
else if(r<0.55)doAttack(f,'hp');
else if(r<0.7)doAttack(f,'lk');
else if(r<0.8&&f.meter>=f.maxMeter)doSpecial(f,opp,'super');
else doAttack(f,'throw_f');
}

// Jump sometimes
if(Math.random()<0.08&&!f.airborne){f.vy=-f.c.jmp;f.airborne=true;}

// Use super when available and close
if(f.meter>=f.maxMeter&&dist<120&&Math.random()<0.2){doSpecial(f,opp,'super');}
}

function doAttack(f,move){
if(f.attacking||f.hit)return;
f.attacking=true;f.curAtk=move;f.atkFrame=0;f.state='attack';
}
function doSpecial(f,opp,type){
if(f.attacking||f.hit)return;
f.attacking=true;f.curAtk=type;f.atkFrame=0;f.state='attack';
if(type==='special1'){
f.projActive=true;f.projX=f.x+f.fc*30;f.projY=f.y-50;f.projVx=f.fc*8;
snd('special');}
else if(type==='super'){
f.superActive=true;f.superTimer=60;f.meter=0;
snd('super');triggerSlowMo(20,0.3);triggerHitZoom(1.2);flashScreen('#fff',0.5);}
else snd('special');
}
function doComboString(f,opp){
const strings=f.c.combos;if(!strings||!strings.length)return;
const combo=strings[Math.floor(Math.random()*strings.length)];
f.inputBuf=combo.slice();f.comboIdx=0;f.comboTimer=0;
doAttack(f,combo[0]);
}


/* === GAME CLASS === */
const G={st:'TITLE',f1:null,f2:null,stage:0,round:1,maxRounds:3,timer:5400,
sel1:0,sel2:3,frameCount:0,announceText:'',announceTimer:0,announceColor:'#fff',
mode:'vs',arcadeWins:0,continueTimer:0,pauseTimer:0,
screenShakeX:0,screenShakeY:0};

G.init=function(p1i,p2i,stg){
this.f1=new Fighter(p1i,250,1);this.f2=new Fighter(p2i,710,-1);
this.f2.ai=true;this.stage=stg;this.round=1;this.timer=5400;
this.st='VS';this.pauseTimer=120;
snd('round');
};

G.update=function(){
if(this.st!=='FIGHT'&&this.st!=='FINISH')return;
this.frameCount++;

// Slow motion
let speed=1;
if(slowMo.active){speed=slowMo.factor;slowMo.frames--;if(slowMo.frames<=0)slowMo.active=false;}

// Timer
if(this.st==='FIGHT'){this.timer-=speed;if(this.timer<=0){this.timer=0;this.timeUp();}}

// Update fighters
this.updateFighter(this.f1,this.f2,speed);
this.updateFighter(this.f2,this.f1,speed);

// Projectile collision
this.checkProjectiles();

// Combat resolution
this.checkHits(this.f1,this.f2);
this.checkHits(this.f2,this.f1);

// Combo trackers
this.f1.combo.update();this.f2.combo.update();

// Check win
if(this.st==='FIGHT'){
if(this.f1.hp<=0){this.f1.hp=0;this.roundEnd(this.f2,this.f1);}
else if(this.f2.hp<=0){this.f2.hp=0;this.roundEnd(this.f1,this.f2);}}

// Finish Him state
if(this.st==='FINISH'){
this.pauseTimer--;
if(this.pauseTimer<=0)this.finishTimeout();}

// AI
aiUpdate(this.f2,this.f1);

// Screen effects
if(screenShake.intensity>0.5){
this.screenShakeX=(Math.random()-0.5)*screenShake.intensity;
this.screenShakeY=(Math.random()-0.5)*screenShake.intensity;
screenShake.intensity*=screenShake.decay;
}else{this.screenShakeX=0;this.screenShakeY=0;screenShake.intensity=0;}

if(screenFlash.alpha>0.01)screenFlash.alpha*=(1-screenFlash.decay);else screenFlash.alpha=0;
if(hitZoom.active){
hitZoom.current+=(hitZoom.target-hitZoom.current)*hitZoom.speed;
if(Math.abs(hitZoom.current-hitZoom.target)<0.01){hitZoom.target=1.0;}
if(Math.abs(hitZoom.current-1.0)<0.005&&hitZoom.target===1.0){hitZoom.active=false;hitZoom.current=1.0;}}
if(chromatic.active){chromatic.frames--;if(chromatic.frames<=0)chromatic.active=false;}

// Particles
updateParticles();

// Animation
this.f1.anim+=this.f1.animSpeed*speed;this.f2.anim+=this.f2.animSpeed*speed;

// Announcements
if(this.announceTimer>0)this.announceTimer--;
};

G.updateFighter=function(f,opp,speed){
if(f.hit){
f.hitTimer--;
if(f.hitTimer<=0){f.hit=false;f.state='idle';}
return;}
if(f.blocking){f.blockTimer--;if(f.blockTimer<=0)f.blocking=false;}

// Gravity
if(f.airborne||f.y<FLOOR_Y){
f.vy+=0.7*speed;f.y+=f.vy*speed;
if(f.y>=FLOOR_Y){f.y=FLOOR_Y;f.vy=0;f.airborne=false;f.juggle=0;f.state='idle';}}

// Movement (if not attacking/hit)
if(!f.attacking&&!f.hit&&!f.blocking){
if(!f.ai){
const moveDir=(I.r?1:0)-(I.l?1:0);
f.vx=moveDir*f.c.spd*speed;
if(I.d){f.crouching=true;f.state='crouch';f.vx*=0.3;}
else{f.crouching=false;if(moveDir)f.state='walk';else f.state='idle';}
// Jump
if(I.u&&!f.airborne){f.vy=-f.c.jmp;f.airborne=true;f.state='jump';snd('whoosh');}
}
f.x+=f.vx;
}

// Facing
if(!f.attacking){f.fc=opp.x>f.x?1:-1;}

// Boundaries
f.x=Math.max(40,Math.min(GW-40,f.x));

// Attack logic
if(f.attacking){
f.atkFrame+=speed;
const mv=MV[f.curAtk];
if(mv&&f.atkFrame>=mv.su+mv.ac+mv.rc){
f.attacking=false;f.curAtk=null;f.atkFrame=0;f.state='idle';
// Advance combo string
if(f.inputBuf.length>0&&f.comboIdx<f.inputBuf.length-1){
f.comboIdx++;f.comboTimer=COMBO_WINDOW;
doAttack(f,f.inputBuf[f.comboIdx]);}
else{f.inputBuf=[];f.comboIdx=0;}}}

// Projectile
if(f.projActive){
f.projX+=f.projVx*speed;
if(f.projX<0||f.projX>GW)f.projActive=false;}

// Super animation
if(f.superActive){
f.superTimer-=speed;
if(f.superTimer<=0){f.superActive=false;}}
};

G.checkHits=function(atk,def){
if(!atk.attacking)return;
const mv=MV[atk.curAtk];if(!mv)return;
if(atk.atkFrame<mv.su||atk.atkFrame>mv.su+mv.ac)return;

const dist=Math.abs(atk.x-def.x);
if(dist>mv.rg)return;

// Already hit this attack?
if(atk.atkFrame>mv.su+2)return;// Simple hit-once check

// Blocking?
if(def.blocking||def.bl||(def.ai&&Math.random()<0.1)){
snd('block');def.blockTimer=mv.bs;
emitP(def.x-def.fc*20,def.y-50,'spark',5,{color:'#88f',speed:3,life:10});
shakeScreen(2);return;}

// HIT!
const dm=Math.floor(mv.dm*(1-def.c.def*0.05));
def.hp-=dm;def.hit=true;def.hitTimer=mv.hs;def.state='hit';
def.vx=atk.fc*mv.kb;
if(def.airborne)def.juggle++;

// Effects
const hitX=def.x-def.fc*15;const hitY=def.y-50;
const heavy=mv.dm>=70;
emitP(hitX,hitY,'spark',heavy?20:10,{color:heavy?'#ff4':'#fff',speed:heavy?6:4,
angle:atk.fc>0?0:Math.PI,spread:1.2,life:heavy?20:12});
emitP(hitX,hitY,'ring',1,{color:heavy?'#f80':'#fff',size:5,life:15,speed:0,gravity:0});
if(heavy){emitP(hitX,hitY,'ink',5,{color:'rgba(20,0,0,0.7)',size:4,speed:3,life:25});}

snd(heavy?'hit_h':'hit_l');
shakeScreen(heavy?8:3);
if(heavy){flashScreen('#fff',0.3);triggerChromatic(5);}
if(mv.dm>=100){triggerHitZoom(1.15);triggerSlowMo(8,0.3);}

// Meter
atk.meter=Math.min(atk.maxMeter,atk.meter+dm*0.5);
def.meter=Math.min(def.maxMeter,def.meter+dm*0.3);

// Combo
atk.combo.add(atk.curAtk,dm);

// Floating damage number
emitP(hitX,hitY-20,'smoke',1,{color:`rgba(255,${255-dm},0,0.9)`,size:2,life:40,gravity:-0.5,speed:0.5});
};

G.checkProjectiles=function(){
[this.f1,this.f2].forEach((f,idx)=>{
if(!f.projActive)return;
const opp=idx===0?this.f2:this.f1;
if(Math.abs(f.projX-opp.x)<40&&Math.abs(f.projY-(opp.y-50))<50){
f.projActive=false;
opp.hp-=60;opp.hit=true;opp.hitTimer=15;
emitP(f.projX,f.projY,'spark',15,{color:'#4af',speed:5,life:15});
emitP(f.projX,f.projY,'ring',2,{color:'#4af',size:8,life:12,speed:0,gravity:0});
snd('hit_m');shakeScreen(5);
f.meter=Math.min(f.maxMeter,f.meter+30);}});
};

G.roundEnd=function(winner,loser){
if(loser.hp<=0){
winner.wins++;
if(winner.wins>=2){
this.st='FINISH';this.pauseTimer=300;
this.announce('FINISH HIM!','#f00',180);
loser.finishHim=true;snd('finish');
triggerSlowMo(30,0.2);

this.f1.meter=0;this.f2.meter=0;
this.f1.x=250;this.f2.x=710;this.f1.state='idle';this.f2.state='idle';

snd('victory');

G.timeUp=function(){

G.announce=function(text,color,timer){this.announceText=text;this.announceColor=color;this.announceTimer=timer;};


/* === PLAYER INPUT COMBAT === */
G.playerInput=function(){
if(this.st!=='FIGHT'||!this.f1||this.f1.hit)return;
const f=this.f1;const opp=this.f2;

logDir();// Record directional input for motion detection

// Block
if(I.bl){f.blocking=true;f.state='block';return;}
f.blocking=false;

// Special moves (motion inputs)
if(!f.attacking&&!f.airborne){
// QCF + Punch = Special 1 (Projectile)
if((jp('lp')||jp('hp'))&&isQCF(f.fc)){
doSpecial(f,opp,'special1');f.meter=Math.max(0,f.meter-50);return;}
// QCB + Kick = Special 2 (Anti-air)
if((jp('lk')||jp('hk'))&&isQCB(f.fc)){
doSpecial(f,opp,'special2');f.meter=Math.max(0,f.meter-50);return;}
// DP + Punch = Special 3 (Uppercut)
if((jp('lp')||jp('hp'))&&isDP(f.fc)){
doSpecial(f,opp,'special3');f.meter=Math.max(0,f.meter-80);return;}
// QCF+QCF + Any = Super
if((jp('lp')||jp('hp')||jp('lk')||jp('hk'))&&f.meter>=f.maxMeter&&isQCF(f.fc)){
doSpecial(f,opp,'super');return;}
}

// Fatality check
if(opp.finishHim&&!f.attacking){
const fatInput=f.c.fatInput;
if(checkFatInput(fatInput)){
performFatality(f,opp);return;}}

// Normal attacks
if(!f.attacking){
if(f.crouching){
if(jp('lp'))doAttack(f,'clp');
else if(jp('lk')||jp('hk'))doAttack(f,jp('hk')?'chk':'cmk');
else if(jp('hp'))doAttack(f,'sweep');
}else if(f.airborne){
if(jp('lp'))doAttack(f,'jlp');
else if(jp('hk'))doAttack(f,'jhk');
else if(jp('lk')&&I.d)doAttack(f,'jdive');
}else{
if(jp('lp'))doAttack(f,'lp');
else if(jp('hp'))doAttack(f,'hp');
else if(jp('lk'))doAttack(f,'lk');
else if(jp('hk'))doAttack(f,'hk');
}
// Throw
if(jp('lp')&&jp('lk')&&!f.airborne){
const dist=Math.abs(f.x-opp.x);
if(dist<50){doAttack(f,I.r?'throw_f':'throw_b');snd('throw');}}
}
};

function checkFatInput(input){
// Simplified fatality input check from recent key presses
// In a real game this would track the actual directional sequence
return jp('hk')&&I.d;// Simplified: Down+HK triggers fatality for demo
}

function performFatality(f,opp){
f.fatState=true;f.fatTimer=180;opp.dead=true;
G.st='END';
snd('fatality');shakeScreen(20);flashScreen('#f00',0.8);
triggerSlowMo(60,0.15);triggerChromatic(30);
G.announce('FATALITY!','#f00',180);

// Massive particle effects
for(let i=0;i<5;i++){
setTimeout(()=>{
emitP(opp.x,opp.y-50,'spark',25,{color:'#f00',speed:8,life:30,spread:Math.PI*2});
emitP(opp.x,opp.y-50,'ink',10,{color:'rgba(150,0,0,0.8)',size:6,speed:5,life:40});
emitP(opp.x,opp.y-30,'fire',8,{color:'#f80',size:5,speed:3,life:25,gravity:-0.5});
shakeScreen(12);},i*200);}
}

G.mInput=function(key){

G.sInput=function(key){
const cols=4;const total=CHARS.length;
if(key==='arrowright'||key==='d'){this.sel1=(this.sel1+1)%total;snd('sel');}
else if(key==='arrowleft'||key==='a'){this.sel1=(this.sel1-1+total)%total;snd('sel');}
else if(key==='arrowdown'||key==='s'){this.sel1=(this.sel1+cols)%total;snd('sel');}
else if(key==='arrowup'||key==='w'){this.sel1=(this.sel1-cols+total)%total;snd('sel');}
else if(key==='enter'||key===' '||key==='j'){
const c=CHARS[this.sel1];
if(!c.free&&!UL()){this.showPaywall();return;}
// Random opponent for now
this.sel2=Math.floor(Math.random()*total);
if(this.sel2===this.sel1)this.sel2=(this.sel2+1)%total;
this.stage=Math.floor(Math.random()*5);
this.init(this.sel1,this.sel2,this.stage);snd('fight');}
};

G.eInput=function(key){
if(key==='enter'||key===' '){
if(this.mode==='arcade'&&this.f1&&this.f1.wins>=2){
this.arcadeWins++;
if(this.arcadeWins>=6){this.st='TITLE';this.arcadeWins=0;}
else{this.sel2=Math.floor(Math.random()*CHARS.length);
this.stage=Math.floor(Math.random()*5);
this.init(this.sel1,this.sel2,this.stage);}}
else{this.st='TITLE';}}
};

G.showPaywall=function(){
this.announce('LOCKED — $0.99','#DAA520',120);
// Show payment options after delay
setTimeout(()=>{
if(confirm('Desbloquear todos os lutadores por $0.99?\n\nStripe (Cartão) ou PayPal disponíveis.')){
window.open(STRIPE,'_blank');}},500);
};

/* === DRAW MENUS === */
G.drawTitle=function(){
cx.fillStyle='#050508';cx.fillRect(0,0,GW*S,GH*S);

// Animated background energy
for(let i=0;i<20;i++){
const t=this.frameCount*0.02+i;
const x=(GW/2+Math.cos(t+i)*200)*S;const y=(GH/2+Math.sin(t*0.7+i)*150)*S;
const g=cx.createRadialGradient(x,y,0,x,y,60*S);
g.addColorStop(0,`rgba(${100+i*8},${20+i*5},0,0.1)`);g.addColorStop(1,'rgba(0,0,0,0)');
cx.fillStyle=g;cx.beginPath();cx.arc(x,y,60*S,0,Math.PI*2);cx.fill();}

// Logo
cx.font=`bold ${56*S}px 'Impact',sans-serif`;cx.textAlign='center';
// Shadow
cx.fillStyle='rgba(0,0,0,0.8)';cx.fillText('PATRIOTA FIGHTER',GW*S/2+3*S,180*S+3*S);
// Main text with metallic gradient
const lg=cx.createLinearGradient(GW*S/2-200*S,160*S,GW*S/2+200*S,200*S);
lg.addColorStop(0,'#FFD700');lg.addColorStop(0.3,'#FFF8DC');lg.addColorStop(0.5,'#FFD700');
lg.addColorStop(0.7,'#B8860B');lg.addColorStop(1,'#DAA520');
cx.strokeStyle='#000';cx.lineWidth=4*S;cx.strokeText('PATRIOTA FIGHTER',GW*S/2,180*S);
cx.fillStyle=lg;cx.fillText('PATRIOTA FIGHTER',GW*S/2,180*S);

// Subtitle
cx.font=`bold ${18*S}px 'Segoe UI',system-ui`;
cx.fillStyle='#888';cx.fillText('3D VOLUMETRIC ENGINE v5.0',GW*S/2,215*S);

// Version badge
cx.font=`${12*S}px monospace`;
cx.fillStyle='#555';cx.fillText('MUGEN | MKX | INJUSTICE | THE BOYS',GW*S/2,240*S);

// Prompt
const blink=Math.sin(this.frameCount*0.08)>0;
if(blink){cx.font=`bold ${20*S}px 'Segoe UI'`;cx.fillStyle='#DAA520';
cx.fillText('PRESS ANY KEY TO START',GW*S/2,380*S);}

// Fighter silhouettes
this.drawTitleFighters();
};

G.drawTitleFighters=function(){
// Two fighters in heroic poses (silhouettes)
cx.save();
cx.globalAlpha=0.3;
// Left fighter
cx.translate(200*S,350*S);cx.scale(1.5,1.5);
const fakeF1={c:CHARS[0],fc:1,x:0,y:0,anim:this.frameCount*0.03,state:'idle',
attacking:false,hit:false,blocking:false,armAngle:0,backArmAngle:0,
legAngle:0,backLegAngle:0,bodyTilt:0};
cx.restore();
cx.save();cx.globalAlpha=0.3;
cx.translate(760*S,350*S);cx.scale(1.5,1.5);
cx.restore();
};

G.drawMode=function(){
cx.fillStyle='#050508';cx.fillRect(0,0,GW*S,GH*S);
cx.font=`bold ${36*S}px 'Impact'`;cx.textAlign='center';
cx.fillStyle='#DAA520';cx.fillText('SELECT MODE',GW*S/2,100*S);

const modes=[{n:'VERSUS',k:'1',d:'Fight against AI'},{n:'ARCADE',k:'2',d:'6 fights to the top'},
{n:'TRAINING',k:'3',d:'Practice combos & moves'}];
for(let i=0;i<modes.length;i++){
const y=(200+i*90)*S;
cx.font=`bold ${28*S}px 'Impact'`;
cx.fillStyle='#fff';cx.fillText(`[${modes[i].k}] ${modes[i].n}`,GW*S/2,y);
cx.font=`${14*S}px 'Segoe UI'`;cx.fillStyle='#888';cx.fillText(modes[i].d,GW*S/2,y+25*S);}
};

G.drawSelect=function(){
cx.fillStyle='#0a0a15';cx.fillRect(0,0,GW*S,GH*S);

// Title
cx.font=`bold ${24*S}px 'Impact'`;cx.textAlign='center';
cx.fillStyle='#DAA520';cx.fillText('SELECT YOUR FIGHTER',GW*S/2,40*S);

// Grid 4x3
const cols=4,rows=3;const cellW=90*S,cellH=100*S;
const gridX=(GW*S-cols*cellW)/2;const gridY=60*S;

for(let i=0;i<CHARS.length;i++){
const col=i%cols,row=Math.floor(i/cols);
const x=gridX+col*cellW,y=gridY+row*cellH;
const selected=i===this.sel1;
const locked=!CHARS[i].free&&!UL();

// Cell background
const bg=selected?'rgba(218,165,32,0.3)':'rgba(30,30,50,0.5)';
cx.fillStyle=bg;cx.fillRect(x+2,y+2,cellW-4,cellH-4);
if(selected){cx.strokeStyle='#DAA520';cx.lineWidth=2*S;cx.strokeRect(x+2,y+2,cellW-4,cellH-4);}

// Character mini portrait (colored circle with initial)
const portraitG=cx.createRadialGradient(x+cellW/2,y+40*S,0,x+cellW/2,y+40*S,25*S);
portraitG.addColorStop(0,CHARS[i].skin[0]);portraitG.addColorStop(1,CHARS[i].skin[3]);
cx.fillStyle=portraitG;cx.beginPath();cx.arc(x+cellW/2,y+40*S,25*S,0,Math.PI*2);cx.fill();

// Lock icon
if(locked){
cx.fillStyle='rgba(0,0,0,0.6)';cx.beginPath();cx.arc(x+cellW/2,y+40*S,25*S,0,Math.PI*2);cx.fill();
cx.font=`${20*S}px serif`;cx.fillStyle='#DAA520';cx.fillText('🔒',x+cellW/2,y+46*S);}

// Name
cx.font=`bold ${9*S}px 'Segoe UI'`;cx.fillStyle='#fff';cx.fillText(CHARS[i].name,x+cellW/2,y+75*S);
}

// Selected character details (right panel)
const sel=CHARS[this.sel1];
const panelX=GW*S-220*S;
cx.fillStyle='rgba(20,20,40,0.8)';cx.fillRect(panelX,gridY,210*S,300*S);
cx.strokeStyle='#DAA520';cx.lineWidth=1*S;cx.strokeRect(panelX,gridY,210*S,300*S);

// Portrait large
const pg=cx.createRadialGradient(panelX+105*S,gridY+80*S,0,panelX+105*S,gridY+80*S,50*S);
pg.addColorStop(0,sel.skin[0]);pg.addColorStop(1,sel.skin[3]);
cx.fillStyle=pg;cx.beginPath();cx.arc(panelX+105*S,gridY+80*S,50*S,0,Math.PI*2);cx.fill();

cx.font=`bold ${14*S}px 'Impact'`;cx.fillStyle='#fff';cx.textAlign='center';
cx.fillText(sel.name,panelX+105*S,gridY+145*S);

// Stats
const stats=[['POW',sel.hp/11],['SPD',sel.spd/6],['DEF',sel.def/1.1],['SPE',0.8]];
cx.textAlign='left';cx.font=`${10*S}px monospace`;
for(let i=0;i<stats.length;i++){
const sy=gridY+165*S+i*22*S;
cx.fillStyle='#888';cx.fillText(stats[i][0],panelX+15*S,sy);
cx.fillStyle='#333';cx.fillRect(panelX+50*S,sy-8*S,130*S,10*S);
const sg=cx.createLinearGradient(panelX+50*S,0,panelX+50*S+130*S*stats[i][1],0);
sg.addColorStop(0,'#4af');sg.addColorStop(1,'#48f');
cx.fillStyle=sg;cx.fillRect(panelX+50*S,sy-8*S,130*S*stats[i][1],10*S);}

// Specials list
cx.textAlign='left';cx.font=`${9*S}px 'Segoe UI'`;cx.fillStyle='#aaa';
cx.fillText('SPECIALS:',panelX+15*S,gridY+260*S);
for(let i=0;i<sel.specials.length;i++){
cx.fillText(`• ${sel.specials[i]}`,panelX+15*S,gridY+275*S+i*13*S);}
cx.textAlign='center';
};

G.drawVS=function(){
cx.fillStyle='#050508';cx.fillRect(0,0,GW*S,GH*S);

// Diagonal split
cx.save();
cx.beginPath();cx.moveTo(0,0);cx.lineTo(GW*S*0.55,0);cx.lineTo(GW*S*0.45,GH*S);cx.lineTo(0,GH*S);cx.clip();
cx.fillStyle='rgba(0,50,100,0.3)';cx.fillRect(0,0,GW*S,GH*S);cx.restore();

cx.save();
cx.beginPath();cx.moveTo(GW*S*0.55,0);cx.lineTo(GW*S,0);cx.lineTo(GW*S,GH*S);cx.lineTo(GW*S*0.45,GH*S);cx.clip();
cx.fillStyle='rgba(100,0,0,0.3)';cx.fillRect(0,0,GW*S,GH*S);cx.restore();

// VS text
cx.font=`bold ${72*S}px 'Impact'`;cx.textAlign='center';
cx.strokeStyle='#000';cx.lineWidth=5*S;cx.strokeText('VS',GW*S/2,GH*S/2+20*S);
const vg=cx.createLinearGradient(GW*S/2-40*S,GH*S/2-40*S,GW*S/2+40*S,GH*S/2+40*S);
vg.addColorStop(0,'#FFD700');vg.addColorStop(1,'#FF4500');
cx.fillStyle=vg;cx.fillText('VS',GW*S/2,GH*S/2+20*S);

// Names
cx.font=`bold ${28*S}px 'Impact'`;
cx.fillStyle='#4af';cx.textAlign='left';cx.fillText(CHARS[this.sel1].name,50*S,GH*S-60*S);
cx.fillStyle='#f84';cx.textAlign='right';cx.fillText(CHARS[this.sel2].name,GW*S-50*S,GH*S-60*S);

// Stage name
cx.textAlign='center';cx.font=`${14*S}px 'Segoe UI'`;cx.fillStyle='#888';
const stageNames=['CONGRESSO NACIONAL','AVENIDA PAULISTA','COPACABANA','THE PENTAGON','RED SQUARE'];
cx.fillText(stageNames[this.stage],GW*S/2,GH*S-20*S);
};

G.drawEnd=function(){
cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(0,0,GW*S,GH*S);
cx.font=`bold ${36*S}px 'Impact'`;cx.textAlign='center';
cx.fillStyle='#DAA520';cx.fillText(this.announceText,GW*S/2,GH*S/2);
cx.font=`${16*S}px 'Segoe UI'`;cx.fillStyle='#888';
cx.fillText('Press ENTER to continue',GW*S/2,GH*S/2+50*S);
};


/* === MAIN GAME LOOP === */
let lastTime=0;
function gameLoop(time){
requestAnimationFrame(gameLoop);
const dt=time-lastTime;lastTime=time;
if(dt>100)return;// Skip if tab was hidden

G.frameCount++;
uI();// Update input

switch(G.st){
case 'TITLE':G.drawTitle();break;
case 'MODE':G.drawMode();break;
case 'SEL':G.drawSelect();break;
case 'VS':G.tInput();G.drawVS();break;
case 'FIGHT':case 'FINISH':
G.playerInput();G.update();G.draw();break;
case 'END':G.draw();G.drawEnd();break;
}
}

// Paper texture cache (generated once)
let paperCanvas=null;
function genPaperTexture(){
paperCanvas=document.createElement('canvas');
paperCanvas.width=GW;paperCanvas.height=GH;
const pc=paperCanvas.getContext('2d');
const imgData=pc.createImageData(GW,GH);
for(let i=0;i<imgData.data.length;i+=4){
const n=128+(Math.random()-0.5)*25;
imgData.data[i]=n;imgData.data[i+1]=n;imgData.data[i+2]=n;imgData.data[i+3]=8;}
pc.putImageData(imgData,0,0);}
genPaperTexture();

// Start
requestAnimationFrame(gameLoop);

// Click handler for title
cv.addEventListener('click',()=>{ia();
if(G.st==='TITLE')G.st='MODE';
else if(G.st==='VS'){G.pauseTimer=0;G.tInput();}
else if(G.st==='END')G.eInput('enter');});
cv.addEventListener('touchstart',()=>{ia();},{passive:true});

// Keyboard shortcuts for menus
addEventListener('keydown',e=>{
if(e.key==='Escape'&&G.st==='FIGHT'){G.st='TITLE';}
if(e.key==='p'&&G.st==='FIGHT'){/* pause */}
});

// Gamepad menu navigation
setInterval(()=>{
pollGP();
if(G.st==='TITLE'&&(gpJP('start')||gpJP('lp'))){ia();G.st='MODE';}
else if(G.st==='MODE'){
if(gpJP('lp'))G.mInput('1');
else if(gpJP('hp'))G.mInput('2');
else if(gpJP('lk'))G.mInput('3');}
else if(G.st==='SEL'){
if(gpJP('r'))G.sInput('arrowright');
else if(gpJP('l'))G.sInput('arrowleft');
else if(gpJP('u'))G.sInput('arrowup');
else if(gpJP('d'))G.sInput('arrowdown');
else if(gpJP('lp'))G.sInput('enter');}
else if(G.st==='END'&&gpJP('start'))G.eInput('enter');
},100);

</script>
