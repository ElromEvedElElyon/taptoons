/* Particle Pool */
const MAX_P=100;const particles=[];
for(let i=0;i<MAX_P;i++)particles.push({active:false,x:0,y:0,vx:0,vy:0,life:0,maxLife:0,
type:'spark',color:'#fff',size:3,gravity:0.3,friction:0.97,alpha:1,rot:0,rs:0});
let pIdx=0;
function emitP(x,y,type,count,o={}){
for(let i=0;i<count;i++){const p=particles[pIdx];pIdx=(pIdx+1)%MAX_P;
p.active=true;p.x=x;p.y=y;p.life=0;p.rot=0;p.type=type;
const ang=(o.angle||0)+(Math.random()-0.5)*(o.spread||Math.PI*2);
const spd=(o.speed||4)+Math.random()*(o.speedVar||3);
p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;
p.maxLife=o.life||30;p.color=o.color||'#fff';p.size=o.size||3;
p.gravity=o.gravity??0.3;p.friction=o.friction||0.97;p.alpha=1;p.rs=(Math.random()-0.5)*0.2;}}
function updateParticles(){for(let i=0;i<MAX_P;i++){const p=particles[i];if(!p.active)continue;
p.life++;if(p.life>=p.maxLife){p.active=false;continue;}
p.vx*=p.friction;p.vy*=p.friction;p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;
p.rot+=p.rs;p.alpha=1-(p.life/p.maxLife);}}
function drawParticles(){for(let i=0;i<MAX_P;i++){const p=particles[i];if(!p.active)continue;
cx.save();cx.globalAlpha=p.alpha;cx.translate(p.x*S,p.y*S);cx.rotate(p.rot);
const sz=p.size*S;
if(p.type==='spark'){// MKX orange directional spark
const g=cx.createRadialGradient(0,0,0,0,0,sz*2);
g.addColorStop(0,'#fff');g.addColorStop(0.3,p.color);g.addColorStop(1,'rgba(0,0,0,0)');
cx.fillStyle=g;cx.fillRect(-sz,-sz*3,sz*2,sz*6);}
else if(p.type==='blood'){// Dark red blood droplet
cx.fillStyle=p.color;cx.beginPath();
cx.ellipse(0,0,sz*0.7,sz*1.2,p.rot,0,Math.PI*2);cx.fill();}
else if(p.type==='ring'){cx.strokeStyle=p.color;cx.lineWidth=2*S;
const r=p.life*3*S;cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.stroke();}
else if(p.type==='smoke'){const g=cx.createRadialGradient(0,0,0,0,0,sz*(1+p.life*0.1));
g.addColorStop(0,p.color);g.addColorStop(1,'rgba(0,0,0,0)');
cx.fillStyle=g;cx.beginPath();cx.arc(0,0,sz*(1+p.life*0.1),0,Math.PI*2);cx.fill();}
else{cx.fillStyle=p.color;cx.beginPath();cx.arc(0,0,sz,0,Math.PI*2);cx.fill();}
cx.restore();}}

function ComboTracker(){return{hits:[],timer:0,count:0,damage:0,

/* === MKX REALISTIC BODY RENDERER === */
/* Uses bezier curves for anatomically correct body contours */
/* Multi-layer shading: shadow > base > light > specular > rim */

function drawFighterMKX(f){
const c=f.c;const fc=f.fc;const px=f.x*S;const py=f.y*S;
const sc=S*(c.body.height/180);
const t=f.anim;

// Pose calculation
let bodyLean=0,armFront=0,armBack=0,legFront=0,legBack=0;
let fistExtend=0,kickExtend=0;

if(f.state==='idle'){
bodyLean=Math.sin(t*1.8)*0.02;
armFront=0.3+Math.sin(t*1.5)*0.08;// Guard up, slight bob
armBack=0.5+Math.sin(t*1.5+1)*0.06;
legFront=Math.sin(t*0.8)*0.03;legBack=-Math.sin(t*0.8)*0.03;}
else if(f.state==='walk'){
armFront=Math.sin(t*5)*0.5;armBack=-Math.sin(t*5)*0.4;
legFront=Math.sin(t*5)*0.4;legBack=-Math.sin(t*5)*0.4;}
else if(f.state==='crouch'){bodyLean=0.3;armFront=0.5;armBack=0.6;legFront=0.8;legBack=-0.2;}
else if(f.state==='jump'){armFront=-0.6;armBack=-0.4;legFront=0.3;legBack=-0.3;}
else if(f.attacking){
const mv=MV[f.curAtk];const prog=mv?f.atkFrame/(mv.su+mv.ac+mv.rc):0;
if(f.curAtk==='lp'||f.curAtk==='hp'){fistExtend=Math.sin(prog*Math.PI)*1.5;bodyLean=-0.1*prog;}
else if(f.curAtk==='lk'||f.curAtk==='hk'){kickExtend=Math.sin(prog*Math.PI)*1.3;bodyLean=0.05;}
else if(f.curAtk==='sweep'){legFront=1.2;bodyLean=0.4;}
else if(f.curAtk&&f.curAtk.startsWith('special')){fistExtend=1.0;bodyLean=-0.2;armBack=-0.5;}}
else if(f.hit){bodyLean=0.25;armFront=0.4;armBack=0.3;}
else if(f.blocking){armFront=0.7;armBack=0.8;bodyLean=0.05;}

cx.save();
cx.translate(px,py);cx.scale(fc,1);

// Ground shadow (perspective ellipse)
const shadAlpha=0.5-Math.max(0,(FLOOR_Y-f.y)/500);
cx.fillStyle=`rgba(0,0,0,${shadAlpha})`;
cx.beginPath();cx.ellipse(0,8*sc,30*sc,6*sc,0,0,Math.PI*2);cx.fill();

// === BODY PARTS (back to front, MKX anatomy) ===
cx.save();cx.rotate(bodyLean);

const skin=c.skin;const outfit=c.outfit;
const sw=c.body.shoulder*sc*0.5;// shoulder half-width
const ch=c.body.chest*sc;// chest height factor

// -- CAPE (behind everything) --
if(outfit.cape)drawCape(outfit.cape,sc,f);

// -- BACK LEG --
cx.save();cx.globalAlpha=0.88;
drawLeg(8*sc,-5*sc,legBack,sc,skin,outfit,true);
cx.restore();

// -- BACK ARM --
cx.save();cx.globalAlpha=0.88;
drawArm(-2*sc,-58*sc,armBack,0,sc,skin,outfit,c,true);
cx.restore();

// -- TORSO --
drawTorso(0,-30*sc,sc,skin,outfit,c);

// -- FRONT LEG --
drawLeg(-8*sc,-5*sc,legFront+kickExtend,sc,skin,outfit,false);

// -- FRONT ARM --
drawArm(4*sc,-58*sc,armFront,fistExtend,sc,skin,outfit,c,false);

cx.restore();// end body lean

// -- HEAD --
drawHeadMKX(0,-78*sc,sc,c,f);

cx.restore();// end main transform
}

/* === LIMB RENDERING WITH REALISTIC SHADING === */
function skinGrad(ctx,x,y,r,skin,angle){
// 5-stop radial gradient simulating subsurface scattering
const ox=r*0.3*LIGHT.x;const oy=r*0.3*LIGHT.y;
const g=ctx.createRadialGradient(x+ox,y+oy,0,x,y,r);
g.addColorStop(0,skin.light);
g.addColorStop(0.3,skin.base);
g.addColorStop(0.6,skin.mid);
g.addColorStop(0.85,skin.dark);
g.addColorStop(1,skin.shadow);
return g;
}

function outfitGrad(ctx,x,y,w,h,colors,vertical){
const g=vertical?ctx.createLinearGradient(x,y,x,y+h):
ctx.createLinearGradient(x-w/2,y,x+w/2,y);
g.addColorStop(0,colors[0]);g.addColorStop(0.3,colors[1]);
g.addColorStop(0.6,colors[2]);g.addColorStop(0.85,colors[3]);
g.addColorStop(1,colors[4]||colors[3]);
return g;
}

function drawLeg(ox,oy,angle,sc,skin,outfit,isBack){
cx.save();cx.translate(ox,oy);cx.rotate(angle*0.7);
const thighW=12*sc,thighH=28*sc;
const shinW=10*sc,shinH=26*sc;

// Thigh (outfit)
cx.fillStyle=outfitGrad(cx,0,0,thighW*2,thighH,outfit.bottom,true);
cx.beginPath();
cx.moveTo(-thighW,0);cx.quadraticCurveTo(-thighW-2*sc,thighH*0.5,-thighW+2*sc,thighH);
cx.lineTo(thighW-2*sc,thighH);cx.quadraticCurveTo(thighW+2*sc,thighH*0.5,thighW,0);
cx.closePath();cx.fill();

// Knee
cx.translate(0,thighH);cx.rotate(angle*0.3);

// Shin (outfit)
cx.fillStyle=outfitGrad(cx,0,0,shinW*2,shinH,outfit.bottom,true);
cx.beginPath();
cx.moveTo(-shinW,0);cx.quadraticCurveTo(-shinW-1*sc,shinH*0.5,-shinW+3*sc,shinH);
cx.lineTo(shinW-3*sc,shinH);cx.quadraticCurveTo(shinW+1*sc,shinH*0.5,shinW,0);
cx.closePath();cx.fill();

// Boot
cx.fillStyle=outfitGrad(cx,0,shinH,12*sc,10*sc,outfit.boots,true);
cx.beginPath();
cx.ellipse(2*sc,shinH+4*sc,12*sc,6*sc,0,0,Math.PI*2);cx.fill();

// Rim light on leg
if(!isBack){cx.strokeStyle=LIGHT.rimColor;cx.lineWidth=1.5*sc;
cx.beginPath();cx.moveTo(thighW,-thighH);cx.lineTo(shinW,shinH);cx.stroke();}

cx.restore();
}

function drawArm(ox,oy,angle,extend,sc,skin,outfit,c,isBack){
cx.save();cx.translate(ox,oy);cx.rotate(angle*0.6);
const upperW=c.body.arm*sc*0.55;const upperH=22*sc;
const foreW=upperW*0.85;const foreH=20*sc;

// Upper arm (skin or sleeve)
const hasSleeve=!c.outfit.details.includes('open_chest')&&!c.outfit.details.includes('rolled_sleeves');
if(hasSleeve){
cx.fillStyle=outfitGrad(cx,0,0,upperW*2,upperH,outfit.top,true);
}else{
cx.fillStyle=skinGrad(cx,0,upperH/2,upperW*1.5,skin,0);
}
cx.beginPath();
cx.moveTo(-upperW,0);cx.quadraticCurveTo(-upperW*1.2,upperH*0.5,-upperW*0.9,upperH);
cx.lineTo(upperW*0.9,upperH);cx.quadraticCurveTo(upperW*1.2,upperH*0.5,upperW,0);
cx.closePath();cx.fill();

// Bicep definition (if skin showing)
if(!hasSleeve){
cx.strokeStyle='rgba(0,0,0,0.15)';cx.lineWidth=1*sc;
cx.beginPath();cx.moveTo(-upperW*0.3,upperH*0.2);
cx.quadraticCurveTo(0,upperH*0.5,upperW*0.3,upperH*0.2);cx.stroke();}

// Elbow joint
cx.translate(0,upperH);cx.rotate((angle+extend)*0.5);

// Forearm (skin)
cx.fillStyle=skinGrad(cx,0,foreH/2,foreW*1.3,skin,0);
cx.beginPath();
cx.moveTo(-foreW,0);cx.quadraticCurveTo(-foreW*1.1,foreH*0.5,-foreW*0.7,foreH);
cx.lineTo(foreW*0.7,foreH);cx.quadraticCurveTo(foreW*1.1,foreH*0.5,foreW,0);
cx.closePath();cx.fill();

// Fist
const fistSz=(7+extend*3)*sc;
if(outfit.gloves){
cx.fillStyle=outfitGrad(cx,0,foreH+fistSz,fistSz*2,fistSz*2,
[outfit.gloves[0],outfit.gloves[0],outfit.gloves[1],outfit.gloves[1],'#000'],false);
}else{cx.fillStyle=skinGrad(cx,0,foreH+fistSz,fistSz,skin,0);}
cx.beginPath();cx.arc(0,foreH+fistSz,fistSz,0,Math.PI*2);cx.fill();

// Rim light
if(!isBack){cx.strokeStyle=LIGHT.rimColor;cx.lineWidth=1.2*sc;
cx.beginPath();cx.moveTo(upperW,0);cx.lineTo(foreW,foreH+fistSz*2);cx.stroke();}

cx.restore();
}

function drawTorso(ox,oy,sc,skin,outfit,c){
cx.save();cx.translate(ox,oy);
const sw=c.body.shoulder*sc*0.5;
const cw=c.body.chest*sc*0.5;
const ww=c.body.waist*sc*0.5;
const h=50*sc;// torso height

// Torso shape with bezier curves (anatomically correct V-taper)
cx.fillStyle=outfitGrad(cx,0,0,sw*2,h,outfit.top,true);
cx.beginPath();
cx.moveTo(-sw,-10*sc);// Left shoulder
cx.bezierCurveTo(-sw-3*sc,h*0.2,-cw,h*0.4,-ww,h);// Left side taper
cx.lineTo(ww,h);// Bottom
cx.bezierCurveTo(cw,h*0.4,sw+3*sc,h*0.2,sw,-10*sc);// Right side
cx.closePath();cx.fill();

// Chest muscle definition (subtle lines)
cx.strokeStyle='rgba(0,0,0,0.12)';cx.lineWidth=1.2*sc;
// Pectoral separation
cx.beginPath();cx.moveTo(0,-5*sc);cx.lineTo(0,h*0.35);cx.stroke();
// Pec curves
cx.beginPath();cx.moveTo(-sw*0.8,0);cx.quadraticCurveTo(-sw*0.3,h*0.15,0,h*0.1);cx.stroke();
cx.beginPath();cx.moveTo(sw*0.8,0);cx.quadraticCurveTo(sw*0.3,h*0.15,0,h*0.1);cx.stroke();

// Abdominal lines (if tight clothing)
cx.strokeStyle='rgba(0,0,0,0.08)';
for(let i=1;i<=3;i++){const ay=h*0.3+i*h*0.12;
cx.beginPath();cx.moveTo(-ww*0.5,ay);cx.lineTo(ww*0.5,ay);cx.stroke();}

// Belt
cx.fillStyle=outfit.belt||'#333';
cx.fillRect(-ww-2*sc,h-3*sc,(ww+2*sc)*2,6*sc);

// Details
if(outfit.details.includes('red_tie')){
cx.fillStyle='#8B0000';cx.beginPath();
cx.moveTo(-3*sc,-8*sc);cx.lineTo(3*sc,-8*sc);cx.lineTo(2*sc,h*0.5);cx.lineTo(-2*sc,h*0.5);
cx.closePath();cx.fill();}

if(outfit.details.includes('medals_gold_silver')||outfit.details.includes('medals_chest')){
const medals=['#FFD700','#C0C0C0','#CD7F32'];
for(let i=0;i<3;i++){cx.fillStyle=medals[i];
cx.beginPath();cx.arc(-sw*0.4+i*8*sc,5*sc,3*sc,0,Math.PI*2);cx.fill();}}

// Rim lighting on torso edge
cx.strokeStyle=LIGHT.rimColor;cx.lineWidth=1.5*sc;
cx.beginPath();cx.moveTo(sw,-10*sc);cx.bezierCurveTo(sw+3*sc,h*0.2,cw,h*0.4,ww,h);cx.stroke();

// Subsurface scattering hint (warm glow on light-facing side)
cx.fillStyle=skin.sss;
cx.beginPath();cx.ellipse(-sw*0.3,h*0.3,sw*0.5,h*0.3,0,0,Math.PI*2);cx.fill();

cx.restore();
}

function drawCape(cape,sc,f){
cx.save();
const wave=Math.sin(f.anim*2.5)*4*sc;
const len=cape.length*sc;
const g=cx.createLinearGradient(0,-10*sc,0,len);
g.addColorStop(0,cape.colors[0]);g.addColorStop(0.4,cape.colors[1]);
g.addColorStop(0.7,cape.colors[2]);g.addColorStop(1,cape.colors[3]);
cx.fillStyle=g;cx.beginPath();
cx.moveTo(-14*sc,-55*sc);cx.quadraticCurveTo(-18*sc,0,-12*sc+wave,len*0.7);
cx.lineTo(12*sc-wave,len*0.7);cx.quadraticCurveTo(18*sc,0,14*sc,-55*sc);
cx.closePath();cx.fill();
// Cape inner shadow
cx.fillStyle='rgba(0,0,0,0.3)';
cx.beginPath();cx.ellipse(0,len*0.3,8*sc,len*0.25,0,0,Math.PI*2);cx.fill();
cx.restore();
}

function drawHeadMKX(hx,hy,sc,c,f){
cx.save();cx.translate(hx,hy);
const skin=c.skin;const headR=14*sc;

// Head shape (skull-like, not perfect circle)
cx.fillStyle=skinGrad(cx,0,0,headR*1.2,skin,0);
cx.beginPath();
cx.moveTo(0,-headR);// Top of head
cx.bezierCurveTo(headR*1.1,-headR*0.8,headR*1.2,0,headR*0.9,headR*0.6);// Right
cx.bezierCurveTo(headR*0.7,headR*1.1,0,headR*1.2,-headR*0.1,headR);// Jaw right
cx.lineTo(headR*0.1,headR);// Chin
cx.bezierCurveTo(0,headR*1.2,-headR*0.7,headR*1.1,-headR*0.9,headR*0.6);// Jaw left
cx.bezierCurveTo(-headR*1.2,0,-headR*1.1,-headR*0.8,0,-headR);// Left
cx.closePath();cx.fill();

// Jaw shadow / definition
cx.fillStyle='rgba(0,0,0,0.1)';
cx.beginPath();cx.ellipse(0,headR*0.7,headR*0.8,headR*0.4,0,0,Math.PI);cx.fill();

// === EYES (realistic) ===
const eyeY=-2*sc;const eyeX=5*sc;
for(let side=-1;side<=1;side+=2){
// Eye socket shadow
cx.fillStyle='rgba(0,0,0,0.15)';
cx.beginPath();cx.ellipse(side*eyeX,eyeY,5*sc,4*sc,0,0,Math.PI*2);cx.fill();
// White
cx.fillStyle='#F0F0F0';
cx.beginPath();cx.ellipse(side*eyeX,eyeY,4.5*sc,3*sc,0,0,Math.PI*2);cx.fill();
// Iris
cx.fillStyle=c.face.eyes;
cx.beginPath();cx.arc(side*eyeX,eyeY,2.2*sc,0,Math.PI*2);cx.fill();
// Pupil
cx.fillStyle='#000';
cx.beginPath();cx.arc(side*eyeX,eyeY,1.2*sc,0,Math.PI*2);cx.fill();
// Specular (eye shine)
cx.fillStyle='rgba(255,255,255,0.8)';
cx.beginPath();cx.arc(side*eyeX-0.8*sc,eyeY-0.8*sc,0.7*sc,0,Math.PI*2);cx.fill();
// Eyelid
cx.strokeStyle=skin.dark;cx.lineWidth=1.5*sc;
cx.beginPath();cx.ellipse(side*eyeX,eyeY-1*sc,4.5*sc,2.5*sc,0,Math.PI,Math.PI*2);cx.stroke();
}

// Eyebrows (thick, angry — MKX style)
cx.strokeStyle=c.hair.color;cx.lineWidth=2.5*sc;cx.lineCap='round';
cx.beginPath();cx.moveTo(-eyeX-4*sc,eyeY-5*sc);
cx.quadraticCurveTo(-eyeX,eyeY-7*sc,-eyeX+4*sc,eyeY-5.5*sc);cx.stroke();
cx.beginPath();cx.moveTo(eyeX+4*sc,eyeY-5*sc);
cx.quadraticCurveTo(eyeX,eyeY-7*sc,eyeX-4*sc,eyeY-5.5*sc);cx.stroke();

// Nose (3D with bridge shadow)
cx.fillStyle=skin.mid;cx.beginPath();
cx.moveTo(0,eyeY+1*sc);cx.lineTo(-2.5*sc,eyeY+8*sc);
cx.quadraticCurveTo(0,eyeY+9*sc,2.5*sc,eyeY+8*sc);cx.closePath();cx.fill();
cx.strokeStyle=skin.dark;cx.lineWidth=0.8*sc;cx.stroke();

// Mouth
const mouthY=eyeY+12*sc;
if(f.hit||f.attacking){
// Open mouth (yelling/pain)
cx.fillStyle='#200';cx.beginPath();
cx.ellipse(0,mouthY,4*sc,2.5*sc,0,0,Math.PI*2);cx.fill();
// Teeth
cx.fillStyle='#EEE';cx.fillRect(-3*sc,mouthY-1.5*sc,6*sc,1.5*sc);
}else{
// Closed, stern
cx.strokeStyle=skin.dark;cx.lineWidth=1.5*sc;
cx.beginPath();cx.moveTo(-3.5*sc,mouthY);cx.lineTo(3.5*sc,mouthY);cx.stroke();
// Lower lip highlight
cx.strokeStyle=skin.sss;cx.lineWidth=1*sc;
cx.beginPath();cx.moveTo(-2*sc,mouthY+1.5*sc);cx.quadraticCurveTo(0,mouthY+2.5*sc,2*sc,mouthY+1.5*sc);cx.stroke();
}

// === HAIR ===
drawHairMKX(c,sc,headR);

// Beard
if(c.face.beard){drawBeard(c,sc,headR);}

// Scar
if(c.face.scar){
cx.strokeStyle='rgba(180,60,60,0.6)';cx.lineWidth=1.5*sc;
if(c.face.scar==='right_cheek'){cx.beginPath();cx.moveTo(6*sc,0);cx.lineTo(9*sc,8*sc);cx.stroke();}
else if(c.face.scar==='left_brow'){cx.beginPath();cx.moveTo(-8*sc,-6*sc);cx.lineTo(-5*sc,-3*sc);cx.stroke();}
else if(c.face.scar==='nose_bridge'){cx.beginPath();cx.moveTo(-2*sc,1*sc);cx.lineTo(2*sc,3*sc);cx.stroke();}
}

// Rim light on head (MKX signature look)
cx.strokeStyle=LIGHT.rimColor;cx.lineWidth=2*sc;
cx.beginPath();cx.arc(0,0,headR*0.95,Math.PI*0.6,Math.PI*1.4);cx.stroke();

// Damage accumulation (bruises)
if(f.dmgAccum>200){
cx.fillStyle='rgba(80,0,80,0.15)';
cx.beginPath();cx.ellipse(eyeX+2*sc,eyeY+2*sc,4*sc,3*sc,0.3,0,Math.PI*2);cx.fill();}

cx.restore();
}

function drawHairMKX(c,sc,headR){
const hc=c.hair.color;
switch(c.hair.style){
case 'slick':case 'short_neat':case 'short_professional':case 'receding':
cx.fillStyle=hc;cx.beginPath();
cx.ellipse(0,-headR*0.4,headR*0.95,headR*0.65,0,Math.PI,Math.PI*2);cx.fill();
if(c.hair.style==='receding'){// Receding hairline
cx.fillStyle=c.skin.base;
cx.beginPath();cx.ellipse(-headR*0.4,-headR*0.6,4*sc,3*sc,-0.3,0,Math.PI*2);cx.fill();
cx.beginPath();cx.ellipse(headR*0.4,-headR*0.6,4*sc,3*sc,0.3,0,Math.PI*2);cx.fill();}
break;
case 'wild_mane':
cx.fillStyle=hc;
for(let i=-6;i<=6;i++){
const ang=-Math.PI*0.5+i*0.12;const len=headR*(1.4+Math.abs(i)*0.05);
cx.beginPath();cx.moveTo(Math.cos(ang)*headR*0.5,Math.sin(ang)*headR*0.5-headR*0.2);
cx.quadraticCurveTo(Math.cos(ang)*len*0.7,Math.sin(ang)*len*0.7-headR*0.2,
Math.cos(ang)*len,Math.sin(ang)*len-headR*0.1);
cx.lineWidth=(3-Math.abs(i)*0.2)*sc;cx.strokeStyle=hc;cx.stroke();}
break;
case 'perfect_wave':
cx.fillStyle=hc;cx.beginPath();
cx.ellipse(0,-headR*0.4,headR*1.0,headR*0.7,0,Math.PI,Math.PI*2);cx.fill();
// Wave detail
cx.strokeStyle=shadeC(hc,20);cx.lineWidth=2*sc;
cx.beginPath();cx.moveTo(-headR*0.5,-headR*0.7);
cx.quadraticCurveTo(0,-headR*0.9,headR*0.5,-headR*0.7);cx.stroke();
break;
case 'beret':case 'beret_beard':
// Military beret
cx.fillStyle='#2F4F2F';cx.beginPath();
cx.ellipse(0,-headR*0.5,headR*1.15,headR*0.55,0.1,Math.PI,Math.PI*2);cx.fill();
cx.fillStyle='#1F3F1F';
cx.beginPath();cx.ellipse(0,-headR*0.25,headR*1.1,headR*0.12,0,0,Math.PI*2);cx.fill();
break;
case 'bob_styled':
cx.fillStyle=hc;cx.beginPath();
cx.ellipse(0,-headR*0.2,headR*1.1,headR*0.9,0,Math.PI,Math.PI*2);cx.fill();
cx.fillRect(-headR*1.05,-headR*0.2,headR*2.1,headR*0.7);
// Shine
cx.fillStyle=shadeC(hc,25);
cx.beginPath();cx.ellipse(-headR*0.3,-headR*0.5,headR*0.25,headR*0.15,0,0,Math.PI*2);cx.fill();
break;
case 'bald_top':case 'buzz_cut':
cx.fillStyle=c.skin.mid;// Show scalp
cx.beginPath();cx.ellipse(0,-headR*0.3,headR*0.9,headR*0.6,0,Math.PI,Math.PI*2);cx.fill();
if(c.hair.style==='buzz_cut'){// Stubble dots
cx.fillStyle='rgba(0,0,0,0.2)';
for(let i=0;i<20;i++){const a=Math.random()*Math.PI;const r2=headR*0.4+Math.random()*headR*0.4;
cx.fillRect(Math.cos(a)*r2,-headR*0.3+Math.sin(a)*r2*0.5,1.5*sc,1.5*sc);}}
break;
case 'bald_military_cap':
cx.fillStyle='#2F4F2F';cx.beginPath();
cx.ellipse(0,-headR*0.5,headR*1.15,headR*0.5,0,Math.PI,Math.PI*2);cx.fill();
// Visor
cx.fillStyle='#111';cx.beginPath();
cx.ellipse(headR*0.3,-headR*0.25,headR*0.7,headR*0.15,0,0,Math.PI);cx.fill();
// Badge
cx.fillStyle='#DAA520';cx.beginPath();cx.arc(0,-headR*0.6,3*sc,0,Math.PI*2);cx.fill();
break;
default:
cx.fillStyle=hc;cx.beginPath();
cx.ellipse(0,-headR*0.4,headR*0.95,headR*0.65,0,Math.PI,Math.PI*2);cx.fill();
}}

function drawBeard(c,sc,headR){
const bc=c.hair.color;
if(c.face.beard==='full_dark'||c.face.beard==='full_gray'){
cx.fillStyle=bc;cx.beginPath();
cx.ellipse(0,headR*0.5,headR*0.75,headR*0.55,0,0,Math.PI);cx.fill();
cx.fillStyle=shadeC(bc,15);// Beard texture
for(let i=0;i<10;i++){const bx=(Math.random()-0.5)*headR;const by=headR*0.3+Math.random()*headR*0.5;
cx.fillRect(bx,by,1*sc,2*sc);}
}else if(c.face.beard==='stubble'){
cx.fillStyle='rgba(0,0,0,0.15)';
for(let i=0;i<25;i++){const bx=(Math.random()-0.5)*headR*1.2;const by=headR*0.2+Math.random()*headR*0.7;
cx.fillRect(bx,by,1*sc,1*sc);}
}else if(c.face.beard==='goatee'){
cx.fillStyle=bc;cx.beginPath();
cx.ellipse(0,headR*0.7,headR*0.3,headR*0.35,0,0,Math.PI);cx.fill();
}else if(c.face.beard==='mustache'){
cx.strokeStyle=bc;cx.lineWidth=2.5*sc;
cx.beginPath();cx.moveTo(-5*sc,headR*0.15);cx.quadraticCurveTo(-2*sc,headR*0.25,0,headR*0.15);
cx.quadraticCurveTo(2*sc,headR*0.25,5*sc,headR*0.15);cx.stroke();}
}

function shadeC(color,pct){
try{const n=parseInt(color.replace('#',''),16);const a=Math.round(2.55*pct);
const R=Math.min(255,Math.max(0,(n>>16)+a));
const G2=Math.min(255,Math.max(0,((n>>8)&0xFF)+a));
const B=Math.min(255,Math.max(0,(n&0xFF)+a));
return'#'+(0x1000000+R*0x10000+G2*0x100+B).toString(16).slice(1);}
catch(e){return color;}}


/* ================================================================
   PART 5: STAGES — MKX DARK/GRITTY ENVIRONMENTS (5 stages)
   ================================================================ */
const STAGES=[
{name:'Congresso Nacional',id:'congresso'},
{name:'Avenida Paulista',id:'paulista'},
{name:'Copacabana',id:'copacabana'},
{name:'The Pentagon',id:'pentagon'},
{name:'Red Square',id:'redsquare'}
];
let stageCache=null,stageCacheId=-1;

function renderStageToCache(si){
const oc=document.createElement('canvas');oc.width=cv.width;oc.height=cv.height;

if(si===0){// Congresso Nacional - Sunset

c.fillStyle=sky;c.fillRect(0,0,w,fy);
// Sun glow
const sg=c.createRadialGradient(w*0.5,fy*0.85,0,w*0.5,fy*0.85,w*0.3);
sg.addColorStop(0,'rgba(255,100,0,0.5)');sg.addColorStop(0.5,'rgba(200,50,0,0.2)');sg.addColorStop(1,'rgba(0,0,0,0)');
c.fillStyle=sg;c.fillRect(0,0,w,fy);
// Building silhouettes
c.fillStyle='#050208';
c.fillRect(w*0.35,fy*0.4,w*0.08,fy*0.6);c.fillRect(w*0.57,fy*0.4,w*0.08,fy*0.6);
// Dome
c.beginPath();c.arc(w*0.5,fy*0.45,w*0.08,Math.PI,0);c.fill();
c.fillRect(w*0.42,fy*0.45,w*0.16,fy*0.05);
// Ramp
c.beginPath();c.moveTo(w*0.2,fy);c.lineTo(w*0.4,fy*0.55);c.lineTo(w*0.6,fy*0.55);c.lineTo(w*0.8,fy);c.fill();
// Flags
for(let i=0;i<5;i++){const fx=w*0.15+i*w*0.17;c.fillStyle='#1a4d1a';c.fillRect(fx,fy*0.5,2*S,25*S);
c.fillStyle='#006600';c.fillRect(fx-4*S,fy*0.5,10*S,6*S);}
// Floor
const fl=c.createLinearGradient(0,fy,0,h);fl.addColorStop(0,'#1a1008');fl.addColorStop(1,'#0a0804');
c.fillStyle=fl;c.fillRect(0,fy,w,h-fy);
// Floor tiles
c.strokeStyle='rgba(60,30,10,0.3)';c.lineWidth=1;
for(let i=0;i<20;i++){c.beginPath();c.moveTo(i*w/20,fy);c.lineTo(w*0.5+(i-10)*w*0.08,h);c.stroke();}
}
else if(si===1){// Paulista - Night Rain
const sky=c.createLinearGradient(0,0,0,fy);
sky.addColorStop(0,'#020208');sky.addColorStop(0.5,'#050510');sky.addColorStop(1,'#0a0a18');
c.fillStyle=sky;c.fillRect(0,0,w,fy);
// Buildings
for(let i=0;i<8;i++){const bx=i*w/8;const bh=fy*0.3+Math.random()*fy*0.4;const bw=w/8-4*S;
c.fillStyle=`rgba(8,8,15,0.95)`;c.fillRect(bx,fy-bh,bw,bh);
// Windows
for(let wy=fy-bh+10*S;wy<fy-10*S;wy+=15*S){
for(let wx=bx+5*S;wx<bx+bw-5*S;wx+=12*S){
if(Math.random()>0.4){c.fillStyle=`rgba(${180+Math.random()*75},${150+Math.random()*60},${50+Math.random()*50},${0.3+Math.random()*0.4})`;
c.fillRect(wx,wy,6*S,8*S);}}}}
// MASP structure
c.fillStyle='#0a0a0a';c.fillRect(w*0.3,fy*0.65,w*0.4,4*S);
c.fillRect(w*0.33,fy*0.65,5*S,fy*0.35);c.fillRect(w*0.65,fy*0.65,5*S,fy*0.35);
// Neon signs
c.fillStyle='rgba(255,0,80,0.7)';c.fillRect(w*0.15,fy*0.3,30*S,8*S);
c.fillStyle='rgba(0,180,255,0.6)';c.fillRect(w*0.7,fy*0.4,25*S,6*S);
// Wet floor
const fl=c.createLinearGradient(0,fy,0,h);fl.addColorStop(0,'#0a0a12');fl.addColorStop(1,'#050508');
c.fillStyle=fl;c.fillRect(0,fy,w,h-fy);
// Reflections
c.globalAlpha=0.15;c.scale(1,-1);c.translate(0,-2*fy);
c.fillStyle='rgba(255,0,80,0.3)';c.fillRect(w*0.15,fy*0.3,30*S,8*S);
c.fillStyle='rgba(0,180,255,0.2)';c.fillRect(w*0.7,fy*0.4,25*S,6*S);
c.setTransform(1,0,0,1,0,0);c.globalAlpha=1;
}
else if(si===2){// Copacabana - Storm
const sky=c.createLinearGradient(0,0,0,fy);
sky.addColorStop(0,'#020210');sky.addColorStop(0.4,'#0a0820');sky.addColorStop(0.7,'#1a1530');sky.addColorStop(1,'#1a2040');
c.fillStyle=sky;c.fillRect(0,0,w,fy);
// Storm clouds
for(let i=0;i<6;i++){const cx2=w*0.1+Math.random()*w*0.8;const cy=fy*0.1+Math.random()*fy*0.25;
const cg=c.createRadialGradient(cx2,cy,0,cx2,cy,w*0.15);
cg.addColorStop(0,'rgba(30,20,40,0.8)');cg.addColorStop(1,'rgba(0,0,0,0)');
c.fillStyle=cg;c.fillRect(cx2-w*0.15,cy-50*S,w*0.3,100*S);}
// Ocean
const ocean=c.createLinearGradient(0,fy*0.7,0,fy);
ocean.addColorStop(0,'#0a1530');ocean.addColorStop(0.5,'#0a2040');ocean.addColorStop(1,'#0a1828');
c.fillStyle=ocean;c.fillRect(0,fy*0.7,w,fy*0.3);
// Waves
c.strokeStyle='rgba(100,150,200,0.3)';c.lineWidth=2*S;
for(let i=0;i<4;i++){c.beginPath();const wy=fy*0.75+i*fy*0.06;
for(let x=0;x<w;x+=20*S){c.lineTo(x,wy+Math.sin(x*0.01+i)*5*S);}c.stroke();}
// Sand/beach floor
const fl=c.createLinearGradient(0,fy,0,h);fl.addColorStop(0,'#1a1510');fl.addColorStop(1,'#0d0a08');
c.fillStyle=fl;c.fillRect(0,fy,w,h-fy);
// Palm trees
for(let i=0;i<3;i++){const tx=w*0.1+i*w*0.35;c.strokeStyle='#1a0f08';c.lineWidth=4*S;
c.beginPath();c.moveTo(tx,fy);c.quadraticCurveTo(tx+10*S,fy*0.6,tx+5*S,fy*0.45);c.stroke();
c.fillStyle='#0a1a08';
for(let j=0;j<5;j++){c.save();c.translate(tx+5*S,fy*0.45);c.rotate(-1.5+j*0.75);
c.beginPath();c.moveTo(0,0);c.quadraticCurveTo(20*S,-8*S,40*S,5*S);
c.quadraticCurveTo(20*S,-3*S,0,0);c.fill();c.restore();}}
}
else if(si===3){// Pentagon - Dark Interior
const bg=c.createLinearGradient(0,0,0,h);
bg.addColorStop(0,'#050508');bg.addColorStop(0.5,'#0a0a10');bg.addColorStop(1,'#050508');
c.fillStyle=bg;c.fillRect(0,0,w,h);
// Columns
for(let i=0;i<6;i++){const cx2=w*0.1+i*w*0.16;
c.fillStyle='#0d0d12';c.fillRect(cx2,0,12*S,fy);
c.fillStyle='rgba(40,40,60,0.3)';c.fillRect(cx2+2*S,0,2*S,fy);// highlight
}
// Flags
c.fillStyle='#1a0000';c.fillRect(w*0.2,fy*0.1,20*S,30*S);
c.fillStyle='#00001a';c.fillRect(w*0.7,fy*0.1,20*S,30*S);
// Monitors glow
for(let i=0;i<4;i++){const mx=w*0.25+i*w*0.15;
c.fillStyle=`rgba(0,${60+i*20},${100+i*15},0.3)`;c.fillRect(mx,fy*0.3,15*S,10*S);}
// Polished floor
const fl=c.createLinearGradient(0,fy,0,h);fl.addColorStop(0,'#0a0a12');fl.addColorStop(0.5,'#0d0d18');fl.addColorStop(1,'#050508');
c.fillStyle=fl;c.fillRect(0,fy,w,h-fy);
// Pentagon seal (simplified)
c.strokeStyle='rgba(80,70,40,0.3)';c.lineWidth=2*S;
c.beginPath();const pcx=w*0.5,pcy=fy*0.55,pr=30*S;
for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5;

}
else if(si===4){// Red Square - Snow
const sky=c.createLinearGradient(0,0,0,fy);
sky.addColorStop(0,'#0a0a10');sky.addColorStop(0.5,'#151520');sky.addColorStop(1,'#1a1a28');
c.fillStyle=sky;c.fillRect(0,0,w,fy);
// Cathedral silhouette (colorful onion domes)
const colors=['#8B0000','#006400','#00008B','#8B8B00','#4B0082'];
for(let i=0;i<5;i++){const dx=w*0.3+i*w*0.1;const dh=fy*0.3+i*5*S;
c.fillStyle='#0a0a0a';c.fillRect(dx-5*S,dh,12*S,fy-dh);
c.fillStyle=colors[i];c.beginPath();c.arc(dx+1*S,dh,9*S,Math.PI,0);c.fill();
c.beginPath();c.moveTo(dx-5*S,dh);c.quadraticCurveTo(dx+1*S,dh-18*S,dx+7*S,dh);c.fill();}
// Kremlin wall
c.fillStyle='#1a0808';c.fillRect(0,fy*0.7,w,fy*0.3);
c.fillStyle='#0d0404';// Battlements
for(let i=0;i<15;i++){c.fillRect(i*w/15,fy*0.67,w/15-3*S,fy*0.03);}
// Floor (snow covered cobblestone)
const fl=c.createLinearGradient(0,fy,0,h);fl.addColorStop(0,'#1a1a20');fl.addColorStop(1,'#0d0d12');
c.fillStyle=fl;c.fillRect(0,fy,w,h-fy);
// Snow patches
c.fillStyle='rgba(200,200,220,0.1)';
for(let i=0;i<10;i++){c.beginPath();c.ellipse(Math.random()*w,fy+Math.random()*(h-fy),20*S,5*S,0,0,Math.PI*2);c.fill();}
}

// Vignette (all stages)
const vig=c.createRadialGradient(w/2,h/2,w*0.3,w/2,h/2,w*0.75);
vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.6)');
c.fillStyle=vig;c.fillRect(0,0,w,h);

stageCache=oc;stageCacheId=si;
}

function drawStage(si,time){
if(stageCacheId!==si||!stageCache||stageCache.width!==cv.width)renderStageToCache(si);
cx.drawImage(stageCache,0,0);
// Atmospheric effects
if(si===1){// Rain on Paulista
cx.strokeStyle='rgba(150,180,220,0.3)';cx.lineWidth=1;
for(let i=0;i<30;i++){const rx=(time*3+i*47)%GW;const ry=(time*12+i*31)%FLOOR_Y;
cx.beginPath();cx.moveTo(rx*S,ry*S);cx.lineTo((rx-2)*S,(ry+12)*S);cx.stroke();}}
else if(si===2){// Lightning flashes
if(Math.random()<0.003){doFlash('#aaccff',0.4);}}
else if(si===4){// Snow
cx.fillStyle='rgba(220,220,240,0.6)';
for(let i=0;i<20;i++){const sx=(time*0.5+i*53)%GW;const sy=(time*1.5+i*37)%(GH);
cx.beginPath();cx.arc(sx*S,sy*S,1.5*S,0,Math.PI*2);cx.fill();}}
}


/* ================================================================
   PART 6: HUD — MKX TRAPEZOIDAL HEALTH BARS + SUPER METER
   ================================================================ */
function drawHUD(p1,p2,round,timer){
const bw=300*S,bh=20*S,by=22*S,mx=GW/2*S;
// Left HP bar (P1)
drawHPBarMKX(mx-20*S,by,bw,bh,p1.hp/p1.maxHp,true,p1.c.name);
// Right HP bar (P2)
drawHPBarMKX(mx+20*S,by,bw,bh,p2.hp/p2.maxHp,false,p2.c.name);
// Round indicator
cx.fillStyle='#ccc';cx.font=`bold ${12*S}px 'Segoe UI',sans-serif`;cx.textAlign='center';
cx.fillText(`ROUND ${round}`,mx,by+bh+16*S);
// Timer
if(timer>0){cx.font=`bold ${24*S}px 'Segoe UI',sans-serif`;cx.fillStyle=timer<=10?'#ff3333':'#ddd';
cx.fillText(Math.ceil(timer).toString(),mx,by-4*S);}
// Super meters
drawSuperMeter(mx-bw-10*S,by+bh+8*S,p1.meter/p1.maxMeter,true);
drawSuperMeter(mx+10*S,by+bh+8*S,p2.meter/p2.maxMeter,false);
// Combo counters
if(p1.combo.count>1)drawCombo(80*S,GH*0.4*S,p1.combo);
if(p2.combo.count>1)drawCombo((GW-80)*S,GH*0.4*S,p2.combo);
}

function drawHPBarMKX(x,y,w,h,pct,isLeft,name){
pct=Math.max(0,Math.min(1,pct));
// MKX trapezoid bar: angled ends
cx.save();
cx.beginPath();
if(isLeft){cx.moveTo(x-w,y);cx.lineTo(x,y);cx.lineTo(x-6*S,y+h);cx.lineTo(x-w-4*S,y+h);}
else{cx.moveTo(x,y);cx.lineTo(x+w,y);cx.lineTo(x+w+4*S,y+h);cx.lineTo(x+6*S,y+h);}
cx.closePath();cx.clip();
// Dark BG
cx.fillStyle='#0a0a0a';cx.fillRect(x-w-10*S,y-2*S,w+20*S,h+4*S);
// HP fill gradient
const hpGrad=cx.createLinearGradient(0,y,0,y+h);
if(pct>0.5){hpGrad.addColorStop(0,'#00cc44');hpGrad.addColorStop(1,'#008828');}
else if(pct>0.25){hpGrad.addColorStop(0,'#ccaa00');hpGrad.addColorStop(1,'#886600');}
else{hpGrad.addColorStop(0,'#cc2200');hpGrad.addColorStop(1,'#881100');}
cx.fillStyle=hpGrad;
if(isLeft){cx.fillRect(x-w,y,w*pct,h);}
else{cx.fillRect(x+w*(1-pct),y,w*pct,h);}
// Border
cx.restore();
cx.strokeStyle='rgba(120,100,60,0.8)';cx.lineWidth=2*S;
cx.beginPath();
if(isLeft){cx.moveTo(x-w,y);cx.lineTo(x,y);cx.lineTo(x-6*S,y+h);cx.lineTo(x-w-4*S,y+h);cx.closePath();}
else{cx.moveTo(x,y);cx.lineTo(x+w,y);cx.lineTo(x+w+4*S,y+h);cx.lineTo(x+6*S,y+h);cx.closePath();}
cx.stroke();
// Name
cx.fillStyle='#aaa';cx.font=`bold ${10*S}px 'Segoe UI',sans-serif`;
cx.textAlign=isLeft?'left':'right';
cx.fillText(name,isLeft?x-w+5*S:x+w-5*S,y+h+14*S);
}

function drawSuperMeter(x,y,pct,isLeft){
const w=120*S,h=6*S,segs=3;
cx.fillStyle='#0a0808';cx.fillRect(x,y,w,h);
for(let i=0;i<segs;i++){const segW=w/segs-2*S;const sx=x+i*(w/segs)+1*S;
const filled=Math.min(1,Math.max(0,(pct*segs)-i));
if(filled>0){
const g=cx.createLinearGradient(sx,y,sx,y+h);
g.addColorStop(0,'#ffd700');g.addColorStop(1,'#cc8800');
cx.fillStyle=g;cx.fillRect(sx,y+1*S,segW*filled,h-2*S);}
cx.strokeStyle='rgba(100,80,30,0.6)';cx.lineWidth=1;cx.strokeRect(sx,y,segW,h);
}}

function drawCombo(x,y,combo){
const cnt=combo.count;
const sz=Math.min(36,18+cnt*2)*S;
cx.font=`bold ${sz}px 'Segoe UI',sans-serif`;cx.textAlign='center';
const col=cnt>=10?'#ff2200':cnt>=5?'#ffaa00':'#ffffff';
cx.fillStyle=col;cx.globalAlpha=0.9;
cx.fillText(`${cnt} HITS`,x,y);
cx.font=`bold ${12*S}px 'Segoe UI',sans-serif`;
cx.fillStyle='#ccc';cx.fillText(`${combo.damage} DMG`,x,y+16*S);
cx.globalAlpha=1;
}


/* ================================================================
   PART 7: AI SYSTEM — MKX-STYLE OPPONENT
   ================================================================ */
function aiUpdate(f,opp,diff){
f.aiTimer--;if(f.aiTimer>0)return;
const dx=opp.x-f.x;const dist=Math.abs(dx);const facing=dx>0?1:-1;
f.fc=facing;
// Difficulty: 0=easy, 1=medium, 2=hard
const react=diff===2?8:diff===1?15:25;
const aggro=diff===2?0.7:diff===1?0.5:0.3;
const blockChance=diff===2?0.6:diff===1?0.35:0.15;

// Block if opponent attacking and close
if(opp.attacking&&dist<100&&Math.random()<blockChance){
f.blocking=true;f.blockTimer=opp.curAtk?MV[opp.curAtk].ac+MV[opp.curAtk].rc:20;
f.aiTimer=react;return;}
f.blocking=false;

if(dist>200){// Approach
f.x+=facing*f.c.spd*0.7;f.state='walk';f.aiTimer=3;}
else if(dist>120){// Mid range - specials or approach
if(Math.random()<aggro*0.4&&f.meter>=100){// Special
doAttack(f,'special1');f.aiTimer=40;}
else if(Math.random()<aggro*0.5){doAttack(f,'hp');f.aiTimer=react;}
else{f.x+=facing*f.c.spd;f.state='walk';f.aiTimer=5;}}
else if(dist>60){// Close range
const r=Math.random();
if(r<aggro*0.3){doAttack(f,'lp');f.aiTimer=react*0.6;}
else if(r<aggro*0.5){doAttack(f,'mk');f.aiTimer=react*0.8;}
else if(r<aggro*0.7){doAttack(f,'hk');f.aiTimer=react;}
else if(Math.random()<0.2){doAttack(f,'sweep');f.aiTimer=react*1.2;}
else{f.aiTimer=react*0.5;}}
else{// Point blank
const r=Math.random();
if(r<0.3){doAttack(f,'lp');f.aiTimer=react*0.5;}
else if(r<0.5){doAttack(f,'throw_f');f.aiTimer=react*1.5;}
else if(r<0.7){// Back off
f.x-=facing*f.c.spd*2;f.aiTimer=10;}
else{doAttack(f,'hp');f.aiTimer=react*0.7;}}

// Super when meter full
if(f.meter>=f.maxMeter&&dist<150&&Math.random()<aggro*0.8){
doAttack(f,'super');f.aiTimer=50;}
}


/* ================================================================
   PART 8: GAME CLASS — COMBAT, ROUNDS, MENUS, FLOW
   ================================================================ */
const G={
st:'TITLE',// TITLE,MODE,SEL,VS,FIGHT,KO,FINISH,FATALITY,END,CONTINUE,TRAIN
p1:null,p2:null,
stage:0,round:1,maxRounds:2,timer:99,timerActive:false,
mode:'versus',// versus, arcade, training
arcadeWins:0,arcadeFights:6,difficulty:1,
selP1:0,selP2:1,selSide:0,
menuSel:0,endTimer:0,
vsTimer:0,koTimer:0,finishTimer:0,fatTimer:0,
frameCount:0,time:0,paused:false,
dmgNums:[],// floating damage numbers {x,y,val,timer,color}

init(){this.st='TITLE';this.frameCount=0;},

startFight(){
this.p1=new Fighter(this.selP1,GW*0.3,1);
this.p2=new Fighter(this.selP2,GW*0.7,-1);
if(this.mode==='arcade'||this.mode==='training')this.p2.ai=true;
this.round=1;this.timer=99;this.timerActive=true;
bloodPools.length=0;this.dmgNums=[];
this.st='FIGHT';snd('fight');
renderStageToCache(this.stage);
},

tInput(){ia();this.st='MODE';this.menuSel=0;snd('sel');},
mInput(k){
if(k==='arrowup'||k==='w'){this.menuSel=(this.menuSel+2)%3;snd('sel');}
else if(k==='arrowdown'||k==='s'){this.menuSel=(this.menuSel+1)%3;snd('sel');}
else if(k==='enter'||k==='j'||k===' '){
if(this.menuSel===0)this.mode='versus';
else if(this.menuSel===1){this.mode='arcade';this.arcadeWins=0;}
else this.mode='training';
this.st='SEL';this.selSide=0;snd('fight');}
},
sInput(k){
const max=CHARS.length;
if(k==='arrowleft'||k==='a'){
if(this.selSide===0)this.selP1=(this.selP1+max-1)%max;
else this.selP2=(this.selP2+max-1)%max;snd('sel');}
else if(k==='arrowright'||k==='d'){
if(this.selSide===0)this.selP1=(this.selP1+1)%max;
else this.selP2=(this.selP2+1)%max;snd('sel');}
else if(k==='arrowup'||k==='w'){
if(this.selSide===0)this.selP1=(this.selP1+max-4)%max;
else this.selP2=(this.selP2+max-4)%max;snd('sel');}
else if(k==='arrowdown'||k==='s'){
if(this.selSide===0)this.selP1=(this.selP1+4)%max;
else this.selP2=(this.selP2+4)%max;snd('sel');}
else if(k==='enter'||k==='j'||k===' '){
// Check if paid character
const ci=this.selSide===0?this.selP1:this.selP2;
if(!CHARS[ci].free&&!UL()){return;}// locked
if(this.selSide===0){this.selSide=1;snd('sel');}
else{this.stage=Math.floor(Math.random()*STAGES.length);
this.st='VS';this.vsTimer=120;snd('fight');}}
else if(k==='escape'||k==='backspace'){
if(this.selSide===1){this.selSide=0;snd('sel');}
else{this.st='MODE';snd('sel');}}
},
eInput(k){
if(k==='enter'||k==='j'||k===' '){
if(this.st==='CONTINUE'){
this.startFight();
}else{this.st='MODE';this.menuSel=0;snd('sel');}}
},

update(){
this.frameCount++;this.time=this.frameCount/60;
uI();logDir();

// Screen effects update
if(shake.i>0){shake.x=(Math.random()-0.5)*shake.i*2;shake.y=(Math.random()-0.5)*shake.i*2;shake.i*=0.85;if(shake.i<0.5)shake.i=0;}
if(flash.a>0)flash.a*=0.88;
if(slowMo.on){slowMo.f--;if(slowMo.f<=0)slowMo.on=false;}
if(hitZoom.on){hitZoom.c+=(hitZoom.t-hitZoom.c)*0.15;if(Math.abs(hitZoom.c-hitZoom.t)<0.01){hitZoom.on=false;hitZoom.c=1;hitZoom.t=1;}}
if(hitStop.on){hitStop.f--;if(hitStop.f<=0)hitStop.on=false;return;}

if(this.st==='VS'){this.vsTimer--;if(this.vsTimer<=0)this.startFight();return;}
if(this.st==='KO'){this.koTimer--;if(this.koTimer<=0){
const winner=this.p1.hp>0?this.p1:this.p2;winner.wins++;
if(winner.wins>=this.maxRounds){
if(this.mode==='arcade'&&winner===this.p1){this.arcadeWins++;
if(this.arcadeWins>=this.arcadeFights){this.st='END';this.endTimer=180;}
else{this.st='CONTINUE';}}
else{this.st='END';this.endTimer=180;}}
else{this.round++;this.resetRound();}}return;}
if(this.st==='FINISH'){this.finishTimer--;if(this.finishTimer<=0){this.st='KO';this.koTimer=120;snd('ko');}return;}
if(this.st==='FATALITY'){this.fatTimer--;if(this.fatTimer<=0){this.st='KO';this.koTimer=90;}return;}
if(this.st==='END'){return;}

if(this.st!=='FIGHT'&&this.st!=='TRAIN')return;

// Timer
if(this.timerActive&&this.st==='FIGHT'){this.timer-=1/60;
if(this.timer<=0){this.timer=0;// Time out - whoever has more HP wins
this.st='KO';this.koTimer=120;snd('ko');}}

const p1=this.p1,p2=this.p2;
// AI
if(p2.ai)aiUpdate(p2,p1,this.difficulty);
if(this.mode==='training'&&p1.hp<p1.maxHp*0.3){p1.hp=p1.maxHp;p2.hp=p2.maxHp;}

// Player input
if(!p1.ai)playerInput(p1,p2);

// Update fighters
updateFighter(p1,p2);
updateFighter(p2,p1);

// Projectiles
if(p1.projActive)updateProj(p1,p2);
if(p2.projActive)updateProj(p2,p1);

// Check KO
if(p1.hp<=0||p2.hp<=0){
const dead=p1.hp<=0?p1:p2;
dead.hp=0;dead.state='ko';dead.dead=true;
if(this.st==='FIGHT'){this.st='FINISH';this.finishTimer=180;snd('finish');}}

// Particles & damage numbers
updateParticles();
this.dmgNums=this.dmgNums.filter(d=>{d.timer--;d.y-=1;return d.timer>0;});
// Combo trackers
p1.combo.update();p2.combo.update();
},

resetRound(){
this.p1.x=GW*0.3;this.p1.y=FLOOR_Y;this.p1.hp=this.p1.maxHp;
this.p1.state='idle';this.p1.attacking=false;this.p1.dead=false;this.p1.meter=0;
this.p2.x=GW*0.7;this.p2.y=FLOOR_Y;this.p2.hp=this.p2.maxHp;
this.p2.state='idle';this.p2.attacking=false;this.p2.dead=false;this.p2.meter=0;
this.timer=99;bloodPools.length=0;this.dmgNums=[];snd('round');
},

draw(){
cx.save();
// Camera zoom
const zm=hitZoom.c||1;
if(zm!==1){cx.translate(cv.width/2,cv.height/2);cx.scale(zm,zm);cx.translate(-cv.width/2,-cv.height/2);}
// Shake
if(shake.i>0){cx.translate(shake.x*S,shake.y*S);}

if(this.st==='TITLE')this.drawTitle();
else if(this.st==='MODE')this.drawMode();
else if(this.st==='SEL')this.drawSelect();
else if(this.st==='VS')this.drawVS();
else if(this.st==='FIGHT'||this.st==='KO'||this.st==='FINISH'||this.st==='FATALITY'||this.st==='TRAIN'){
drawStage(this.stage,this.time);drawBloodPools();
drawFighterMKX(this.p1);drawFighterMKX(this.p2);
drawParticles();drawHUD(this.p1,this.p2,this.round,this.timer);
// Damage numbers
for(const d of this.dmgNums){cx.fillStyle=d.color;cx.globalAlpha=d.timer/40;
cx.font=`bold ${14*S}px 'Segoe UI',sans-serif`;cx.textAlign='center';
cx.fillText(d.val,d.x*S,d.y*S);cx.globalAlpha=1;}
// FINISH HIM text
if(this.st==='FINISH'){cx.fillStyle='#ff0000';cx.font=`bold ${32*S}px 'Segoe UI',sans-serif`;
cx.textAlign='center';const blink=Math.sin(this.time*8)>0;
if(blink)cx.fillText('FINISH HIM!',GW/2*S,GH*0.35*S);}
if(this.st==='KO'){cx.fillStyle='#fff';cx.font=`bold ${40*S}px 'Segoe UI',sans-serif`;
cx.textAlign='center';cx.fillText(this.p1.hp>0?this.p1.c.name+' WINS':this.p2.c.name+' WINS',GW/2*S,GH*0.4*S);}
}
else if(this.st==='END')this.drawEnd();
else if(this.st==='CONTINUE')this.drawContinue();

// Flash overlay
if(flash.a>0){cx.fillStyle=flash.color;cx.globalAlpha=flash.a;cx.fillRect(0,0,cv.width,cv.height);cx.globalAlpha=1;}
cx.restore();
}
};

cx.font=`${12*S}px 'Segoe UI',sans-serif`;cx.fillStyle='#666';
cx.fillText(STAGES[this.stage].name,cv.width/2,cv.height*0.7);
};

/* === END SCREEN === */
G.drawEnd=function(){
cx.fillStyle='#050505';cx.fillRect(0,0,cv.width,cv.height);
cx.textAlign='center';
const winner=this.p1.hp>0||this.p1.wins>=this.maxRounds?this.p1.c:this.p2.c;
cx.font=`bold ${32*S}px 'Segoe UI',sans-serif`;
cx.fillStyle='#DAA520';cx.fillText(winner.name,cv.width/2,cv.height*0.35);
cx.font=`bold ${20*S}px 'Segoe UI',sans-serif`;
cx.fillStyle='#fff';cx.fillText('VICTORY',cv.width/2,cv.height*0.5);
if(this.mode==='arcade'){cx.font=`${14*S}px 'Segoe UI',sans-serif`;
cx.fillStyle='#aaa';cx.fillText(`Arcade Complete: ${this.arcadeWins}/${this.arcadeFights}`,cv.width/2,cv.height*0.62);}
cx.font=`${12*S}px 'Segoe UI',sans-serif`;cx.fillStyle='#666';
cx.fillText('PRESS ENTER',cv.width/2,cv.height*0.78);
};

/* === CONTINUE SCREEN (ARCADE) === */
G.drawContinue=function(){
cx.fillStyle='#050505';cx.fillRect(0,0,cv.width,cv.height);
cx.textAlign='center';cx.font=`bold ${24*S}px 'Segoe UI',sans-serif`;
cx.fillStyle='#cc0000';cx.fillText('NEXT OPPONENT',cv.width/2,cv.height*0.3);
cx.font=`bold ${18*S}px 'Segoe UI',sans-serif`;cx.fillStyle='#fff';
cx.fillText(`Fight ${this.arcadeWins+1}/${this.arcadeFights}`,cv.width/2,cv.height*0.45);
const nextOpp=(this.selP2+1)%CHARS.length;
if(nextOpp===this.selP1)this.selP2=(nextOpp+1)%CHARS.length;else this.selP2=nextOpp;
cx.fillStyle='#aaa';cx.font=`${14*S}px 'Segoe UI',sans-serif`;
cx.fillText(CHARS[this.selP2].name,cv.width/2,cv.height*0.58);
cx.fillStyle='#666';cx.font=`${12*S}px 'Segoe UI',sans-serif`;
cx.fillText('PRESS ENTER TO FIGHT',cv.width/2,cv.height*0.75);
};


/* ================================================================
   PART 9: PLAYER INPUT + COMBAT RESOLUTION + MAIN LOOP
   ================================================================ */

function playerInput(f,opp){
const dx=opp.x-f.x;f.fc=dx>0?1:-1;

// Block
f.blocking=I.bl?true:false;
if(f.blocking){f.state='block';return;}

// Movement
if(!f.attacking&&!f.hit){
if(I.u&&!IP.u&&f.y>=FLOOR_Y){f.vy=-f.c.jmp;f.airborne=true;snd('dash');}
f.crouching=!!I.d;
if(I.l){f.x-=f.c.spd;f.state=f.crouching?'crouch':'walk';}
else if(I.r){f.x+=f.c.spd;f.state=f.crouching?'crouch':'walk';}
else{f.state=f.crouching?'crouch':'idle';}
}

if(f.attacking)return;

// Check motion inputs for specials (priority)
if(f.meter>=f.maxMeter&&isQCF(f.fc)&&isQCF(f.fc)&&(jp('lp')||jp('hp'))&&(jp('lk')||jp('hk'))){
doAttack(f,'super');f.meter=0;snd('super');doSlowMo(20,0.3);doHitZoom(1.3);return;}
if(isQCF(f.fc)&&(jp('lp')||jp('hp'))){doAttack(f,'special1');snd('special');return;}
if(isQCB(f.fc)&&(jp('lk')||jp('hk'))){doAttack(f,'special2');snd('special');return;}
if(isDP(f.fc)&&(jp('lp')||jp('hp'))){doAttack(f,'special3');snd('special');return;}

// Normal attacks
if(f.crouching){
if(jp('lp'))doAttack(f,'clp');
else if(jp('hp')||jp('lk'))doAttack(f,'cmk');
else if(jp('hk'))doAttack(f,Math.random()<0.5?'chk':'sweep');
}else if(f.airborne){
if(jp('lp'))doAttack(f,'jlp');
else if(jp('hk'))doAttack(f,'jhk');
else if(jp('lk')&&I.d)doAttack(f,'jdive');
}else{
if(jp('lp'))doAttack(f,'lp');
else if(jp('hp'))doAttack(f,'hp');
else if(jp('lk'))doAttack(f,'lk');
else if(jp('hk'))doAttack(f,'hk');
}

// Throw (close + forward+lp)
if(!f.attacking&&Math.abs(dx)<50){
if(jp('lp')&&I.r&&f.fc===1)doAttack(f,'throw_f');
else if(jp('lp')&&I.l&&f.fc===-1)doAttack(f,'throw_f');}

// Fatality check (FINISH state)
if(G.st==='FINISH'&&opp.dead){
const fi=f.c.fatInput;
if(checkFatInput(fi)){G.st='FATALITY';G.fatTimer=180;snd('fatality');
doSlowMo(30,0.15);doShake(15);doFlash('#ff0000',0.6);
opp.hp=-500;// Overkill for effect
emitP(opp.x,opp.y-40,'blood',20,{color:'#880000',speed:6,spread:Math.PI*2,life:50,gravity:0.4});
}}
}

function checkFatInput(seq){
// Check if recent inputs match fatality sequence (simplified)
if(!seq)return false;
const recent=IBUF.slice(-10);const now=performance.now();
let si=0;
for(const ib of recent){if(now-ib.t>2000)continue;
const ch=seq.charAt(si);
if((ch==='L'&&ib.d.includes('L'))||(ch==='R'&&ib.d.includes('R'))||
(ch==='U'&&ib.d.includes('U'))||(ch==='D'&&ib.d.includes('D')))si++;
if(si>=seq.length-2)break;}// Last 2 chars are button
if(si>=seq.length-2){
const btn=seq.slice(-2).toLowerCase();
if(jp(btn))return true;}
return false;
}

function doAttack(f,mv){
f.attacking=true;f.curAtk=mv;f.atkFrame=0;f.state='attack';
if(mv==='lp'||mv==='clp'||mv==='jlp')snd('hit_l');
else if(mv==='hp'||mv==='hk'||mv==='special1'||mv==='special2'||mv==='special3')snd('hit_h');
else snd('hit_m');
}

function updateFighter(f,opp){
f.anim+=f.animSpd;
// Gravity
if(f.y<FLOOR_Y){f.vy+=0.8;f.y+=f.vy;if(f.y>=FLOOR_Y){f.y=FLOOR_Y;f.vy=0;f.airborne=false;}}
// Boundaries
f.x=Math.max(40,Math.min(GW-40,f.x));
// Attack frames
if(f.attacking){
const mv=MV[f.curAtk];if(!mv){f.attacking=false;return;}
f.atkFrame++;
// Hit detection during active frames
if(f.atkFrame>=mv.su&&f.atkFrame<=mv.su+mv.ac){
const dx=opp.x-f.x;const dist=Math.abs(dx);
if(dist<mv.rg&&!opp.hit&&!opp.blocking){
// HIT!
applyHit(f,opp,f.curAtk,mv);}
else if(dist<mv.rg&&opp.blocking){
// Blocked
snd('block');opp.blockTimer=10;opp.meter+=5;
doShake(2);emitP(opp.x-f.fc*20,opp.y-50,'spark',3,{color:'#88ccff',speed:3,life:10});}}
// End attack
if(f.atkFrame>=mv.su+mv.ac+mv.rc){f.attacking=false;f.curAtk=null;f.atkFrame=0;f.state='idle';}
}
// Hit stun recovery
if(f.hit){f.hitTimer--;if(f.hitTimer<=0){f.hit=false;f.state='idle';}}
// Block recovery
if(f.blocking){f.blockTimer--;if(f.blockTimer<=0)f.blocking=false;}
// Dash timer
if(f.dashTimer>0)f.dashTimer--;
// Projectile
if(f.projActive){f.projX+=f.projVx;
if(f.projX<0||f.projX>GW)f.projActive=false;}
}

function applyHit(atk,def,mvName,mv){
let dm=mv.dm;
// Juggle scaling
if(def.airborne||def.juggle>0){dm*=Math.max(0.3,1-def.juggle*0.15);def.juggle++;}
else{def.juggle=0;}
def.hp-=dm;def.hit=true;def.hitTimer=mv.hs;def.state='hit';
def.x+=atk.fc*mv.kb;
if(mvName==='sweep'){def.vy=-5;def.y-=5;}
if(def.airborne){def.vy=-4;}// Keep juggling
// Attacker meter gain
atk.meter=Math.min(atk.maxMeter,atk.meter+dm*0.3);
def.meter=Math.min(def.maxMeter,def.meter+dm*0.15);
// Combo
atk.combo.add(mvName,dm);
// Visual effects
const hitX=def.x-atk.fc*15;const hitY=def.y-50;
emitP(hitX,hitY,'spark',8,{color:'#ff8800',speed:5,spread:Math.PI*0.6,
angle:atk.fc===-1?Math.PI:0,life:15,gravity:0.2});
emitP(hitX,hitY,'ring',1,{color:'rgba(255,200,100,0.5)',speed:0,life:12,size:5});
// Blood on heavy hits
if(dm>=70){emitP(hitX,hitY-10,'blood',5,{color:'#660000',speed:4,spread:Math.PI*0.8,
angle:atk.fc===-1?Math.PI:0,life:30,gravity:0.5,size:2});
addBloodPool(def.x,FLOOR_Y);def.dmgAccum=Math.min(1,def.dmgAccum+0.1);}
// Screen effects
if(dm>=150){doShake(8);doFlash('#ff4400',0.3);doSlowMo(8,0.3);doHitStop(4);}
else if(dm>=80){doShake(4);doHitStop(2);}
else{doShake(2);}
// Damage number
G.dmgNums.push({x:hitX,y:hitY-20,val:Math.round(dm),timer:40,
color:dm>=100?'#ff0000':dm>=60?'#ff8800':'#ffffff'});
// Sound
if(dm>=150)snd('boom');else if(dm>=80)snd('crunch');
}

function updateProj(f,opp){
if(!f.projActive)return;
const dx=Math.abs(f.projX-opp.x);
if(dx<35&&Math.abs(f.y-opp.y)<60){
if(opp.blocking){snd('block');f.projActive=false;return;}
applyHit(f,opp,'special1',{dm:80,kb:10,hs:15,bs:12,rg:999,su:0,ac:1,rc:0});
f.projActive=false;}
// Draw projectile
cx.save();cx.translate(f.projX*S,(f.y-40)*S);
const pg=cx.createRadialGradient(0,0,0,0,0,12*S);
pg.addColorStop(0,'#fff');pg.addColorStop(0.3,f.c.outfit.top[0]);pg.addColorStop(1,'rgba(0,0,0,0)');
cx.fillStyle=pg;cx.beginPath();cx.arc(0,0,12*S,0,Math.PI*2);cx.fill();
// Trail
for(let i=1;i<=4;i++){cx.globalAlpha=0.5-i*0.1;
cx.beginPath();cx.arc(-f.fc*i*10*S,0,(12-i*2)*S,0,Math.PI*2);cx.fill();}
cx.restore();
}


/* === MAIN GAME LOOP === */
G.init();

function gameLoop(){
requestAnimationFrame(gameLoop);
if(slowMo.on&&G.st==='FIGHT'){if(G.frameCount%Math.round(1/slowMo.factor)!==0)return;}
G.update();
cx.clearRect(0,0,cv.width,cv.height);
G.draw();
}
gameLoop();

</script>
