/* === CANVAS === */
const cv=document.getElementById('gc'),cx=cv.getContext('2d');
const GW=960,GH=540;
let S=1;
function rsz(){
const dw=innerWidth,dh=innerHeight,r=GW/GH;
let w,h;if(dw/dh>r){h=dh;w=h*r}else{w=dw;h=w/r}
S=w/GW;cv.width=w;cv.height=h;
cv.style.left=((dw-w)/2)+'px';cv.style.top=((dh-h)/2)+'px';
cx.imageSmoothingEnabled=true;cx.imageSmoothingQuality='high';
}

/* === AUDIO === */
let ac=null;
function ia(){if(!ac)ac=new(AudioContext||webkitAudioContext)()}
function snd(t){if(!ac)return;const n=ac.currentTime,g=ac.createGain(),o=ac.createOscillator();
o.connect(g);g.connect(ac.destination);
const P={hit_l:[180,'square',.15,.1],hit_h:[100,'sawtooth',.22,.16],
block:[700,'triangle',.08,.07],ko:[90,'sawtooth',.28,.9],
special:[350,'square',.15,.22],super:[250,'sawtooth',.22,.5],
round:[523,'square',.1,.3],fight:[400,'sawtooth',.16,.4],sel:[660,'triangle',.07,.1]};
const p=P[t];if(!p)return;
o.frequency.value=p[0];o.type=p[1];g.gain.setValueAtTime(p[2],n);
g.gain.exponentialRampToValueAtTime(.001,n+p[3]);o.start(n);o.stop(n+p[3]);
if(t==='super'){const o2=ac.createOscillator();o2.connect(g);o2.type='square';
o2.frequency.value=600;o2.start(n+.08);o2.stop(n+.35);}
if(t==='fight'){o.frequency.linearRampToValueAtTime(900,n+.2);}}

/* === INPUT === */
const K={},I={u:0,d:0,l:0,r:0,lp:0,hp:0,lk:0,hk:0,bl:0};
const IP={...I};
const KM={'arrowup':'u','arrowdown':'d','arrowleft':'l','arrowright':'r',
'w':'u','s':'d','a':'l','d':'r','j':'lp','k':'hp','u':'lk','i':'hk','l':'bl',' ':'lp'};
addEventListener('keydown',e=>{K[e.key.toLowerCase()]=1;e.preventDefault();
if(G.st==='TITLE')G.tInput();else if(G.st==='SEL')G.sInput(e.key.toLowerCase());
else if(G.st==='END')G.eInput();});
addEventListener('keyup',e=>{K[e.key.toLowerCase()]=0;e.preventDefault();});
function uI(){Object.assign(IP,I);
I.u=K.arrowup||K.w||0;I.d=K.arrowdown||K.s||0;
I.l=K.arrowleft||K.a||0;I.r=K.arrowright||K.d||0;
I.lp=K.j||K[' ']||0;I.hp=K.k||0;I.lk=K.u||0;I.hk=K.i||0;I.bl=K.l||0;}
function jp(b){return I[b]&&!IP[b]}
// mobile
document.querySelectorAll('#mu button').forEach(b=>{const k=b.dataset.k;
const mk={up:'u',down:'d',left:'l',right:'r',lp:'lp',hp:'hp',lk:'lk',hk:'hk',block:'bl'};
b.addEventListener('touchstart',e=>{e.preventDefault();ia();K[mk[k]||k]=1},{passive:false});
b.addEventListener('touchend',e=>{e.preventDefault();K[mk[k]||k]=0},{passive:false});
b.addEventListener('touchcancel',()=>{K[mk[k]||k]=0});});

/* === CHARACTERS === */
const CH=[
{id:'mito',nm:'O MITO',tt:'Capitao Coragem',side:1,

{id:'deputado',nm:'O DEPUTADO',tt:'Voz da Verdade',side:1,

sk:'#EDBE8C',sk2:'#D4A070',hr:'#1A0A00',hr2:'#2A1A10',
o1:'#1565C0',o2:'#1976D2',o3:'#FFF',sh:'#111',

{id:'leon',nm:'EL LEON',tt:'O Libertario',side:1,

{id:'barba',nm:'BARBUDO',tt:'O Nove Dedos',side:0,

sp1D:78,sp2D:98,suD:240,proj:1,

{id:'togado',nm:'O TOGADO',tt:'Juiz Supremo',side:0,
hp:1220,spd:2.9,jmp:-11.5,
sk:'#C8A070',sk2:'#A88050',hr:'#444',hr2:'#333',
o1:'#111',o2:'#1A1A1A',o3:'#8B7355',sh:'#0A0A0A',
hair:'short',beard:0,glass:1,bulk:1.28,tall:1.12,
sp1N:'Censura',sp2N:'Inquerito',suN:'PRISAO ILEGAL',
sp1D:105,sp2D:135,suD:290,proj:0,
desc:'Pesado e devastador. Cada golpe esmaga.'},
{id:'presidanta',nm:'PRESIDANTA',tt:'A Estocadora',side:0,
hp:960,spd:3.7,jmp:-12.5,
sk:'#DEBB90',sk2:'#C09A70',hr:'#7A3A18',hr2:'#5A2A10',
o1:'#C62828',o2:'#D32F2F',o3:'#E53935',sh:'#444',
hair:'bob',beard:0,glass:0,bulk:1,tall:.93,
sp1N:'Estocada',sp2N:'Mandioca',suN:'PEDALADA FISCAL',
sp1D:88,sp2D:82,suD:210,proj:1,
desc:'Imprevisivel. Nunca sabe o que vem.'},
];

/* === MOVE DATA === */
const MV={
lp:{su:3,ac:3,rc:5,dm:32,kb:2,hs:8,bs:4,rg:58},
hp:{su:6,ac:4,rc:10,dm:72,kb:5,hs:14,bs:8,rg:68},
lk:{su:4,ac:3,rc:6,dm:36,kb:3,hs:9,bs:5,rg:62},
hk:{su:8,ac:5,rc:12,dm:82,kb:8,hs:16,bs:10,rg:72},
clp:{su:3,ac:3,rc:5,dm:26,kb:1,hs:7,bs:3,rg:52},
chk:{su:7,ac:6,rc:14,dm:68,kb:12,hs:18,bs:8,rg:82},
jlp:{su:3,ac:4,rc:3,dm:38,kb:2,hs:10,bs:5,rg:52},
jhk:{su:5,ac:5,rc:4,dm:62,kb:6,hs:14,bs:8,rg:62},
};

/* === PARTICLES === */
const PT=[];
function spP(x,y,c,n,s,life){for(let i=0;i<n;i++){
const a=Math.random()*6.28;PT.push({x,y,vx:Math.cos(a)*s*(.4+Math.random()*.8),
vy:Math.sin(a)*s*(.4+Math.random()*.8)-1.5,l:life||1,dc:.02+Math.random()*.03,
sz:2+Math.random()*5,c});}}
function uPT(){for(let i=PT.length-1;i>=0;i--){const p=PT[i];
p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l-=p.dc;if(p.l<=0)PT.splice(i,1);}}
function dPT(){for(const p of PT){cx.globalAlpha=p.l*.8;cx.fillStyle=p.c;
cx.beginPath();cx.arc(p.x*S,p.y*S,p.sz*S,0,6.28);cx.fill();}cx.globalAlpha=1;}

/* === FIGHTER === */
class F{
constructor(ch,x,fc,ai){
this.ch=ch;this.x=x;this.y=460;this.vx=0;this.vy=0;this.fc=fc;
this.hp=ch.hp;this.mhp=ch.hp;this.sp=0;this.st='idle';this.stT=0;
this.af=0;this.at=0;this.hs=0;this.bks=0;this.atk=0;
this.cm=null;this.mf=0;this.hc=0;this.combo=0;this.mxc=0;
this.ai=ai;this.cr=0;this.bl=0;this.inv=0;this.fl=0;
this.rw=0;this.w=44;this.h=130*ch.tall;this.sa=0;this.ko=0;
this.px=0;this.py=0;this.pvx=0;this.pl=0;this.pa=0;
this.ait=0;this.aic=0;
}
get gd(){return this.y>=460}
reset(x,f){this.x=x;this.y=460;this.vx=0;this.vy=0;this.hp=this.mhp;
this.sp=0;this.st='idle';this.hs=0;this.bks=0;this.atk=0;
this.cm=null;this.mf=0;this.hc=0;this.combo=0;this.cr=0;this.bl=0;
this.inv=0;this.fl=0;this.fc=f;this.pa=0;this.sa=0;this.ko=0;}
upd(inp,opp){
if(this.st==='ko'){this.ko++;return}
if(this.inv>0)this.inv--;
if(this.fl>0)this.fl--;
if(this.hs>0){this.hs--;this.vx*=.9;if(!this.hs){this.st='idle';this.atk=0;}this.phy();return;}
if(this.bks>0){this.bks--;this.vx*=.9;if(!this.bks){this.st='idle';this.bl=0;}this.phy();return;}
if(!this.atk&&this.gd){if(opp.x>this.x+8)this.fc=1;else if(opp.x<this.x-8)this.fc=-1;}
if(this.atk&&this.cm){this.mf++;
if(this.mf>=this.cm.su+this.cm.ac+this.cm.rc){this.atk=0;this.cm=null;this.mf=0;
this.st=this.gd?'idle':'jump';this.hc=0;}this.phy();return;}
if(this.sa>0){this.sa--;if(!this.sa){this.atk=0;this.st='idle';}this.phy();return;}
this.cr=0;this.bl=0;
if(this.gd){
this.vx=0;
if(inp.bl){this.bl=1;this.st='block';}
else if(inp.d){this.cr=1;this.st='crouch';
if(inp._lp)this.doA('clp');else if(inp._hk)this.doA('chk');}
else{
if(inp.l)this.vx=-this.ch.spd;if(inp.r)this.vx=this.ch.spd;
if(inp.u){this.vy=this.ch.jmp;this.st='jump';snd('sel');}
if(inp._lp)this.doA('lp');else if(inp._hp)this.doA('hp');
else if(inp._lk)this.doA('lk');else if(inp._hk)this.doA('hk');
else if(inp._sp1)this.doSp1();else if(inp._sp2)this.doSp2();
else if(inp._su&&this.sp>=100)this.doSu();
if(this.vx&&!this.atk)this.st='walk';else if(!this.atk)this.st='idle';
}}else{
if(inp.l)this.vx=Math.max(-this.ch.spd,this.vx-.3);
if(inp.r)this.vx=Math.min(this.ch.spd,this.vx+.3);
if(inp._lp)this.doA('jlp');else if(inp._hk)this.doA('jhk');}
this.phy();this.at++;if(this.at>7){this.at=0;this.af=(this.af+1)%4;}
if(this.pa){this.px+=this.pvx;this.pl--;if(this.pl<=0||this.px<0||this.px>GW)this.pa=0;}
}
phy(){this.x+=this.vx;if(!this.gd){this.vy+=.55;this.y+=this.vy;}
if(this.y>=460){this.y=460;this.vy=0;}this.x=Math.max(35,Math.min(GW-35,this.x));}
doA(t){if(this.atk)return;const m=MV[t];if(!m)return;
this.atk=1;this.cm={...m,tp:t};this.mf=0;this.hc=0;this.st='attack';
snd(t.includes('h')?'hit_h':'sel');}
doSp1(){if(this.atk)return;this.atk=1;this.mf=0;this.hc=0;this.st='sp1';
this.cm={su:5,ac:6,rc:12,dm:this.ch.sp1D,kb:10,hs:18,bs:10,rg:95,tp:'sp1'};
if(this.ch.proj){this.pa=1;this.px=this.x+this.fc*35;this.py=this.y-60;
this.pvx=this.fc*8;this.pl=55;}
this.sp=Math.min(100,this.sp+15);snd('special');}
doSp2(){if(this.atk)return;this.atk=1;this.mf=0;this.hc=0;this.st='sp2';
this.cm={su:4,ac:8,rc:10,dm:this.ch.sp2D,kb:12,hs:20,bs:10,rg:75,tp:'sp2'};
if(this.ch.id==='leon'||this.ch.id==='togado')this.vx=this.fc*7;
else this.vy=-9;
this.sp=Math.min(100,this.sp+15);snd('special');}
doSu(){if(this.sp<100||this.atk)return;this.atk=1;this.mf=0;this.hc=0;this.st='super';
this.sa=45;this.sp=0;this.inv=45;
this.cm={su:8,ac:22,rc:12,dm:this.ch.suD,kb:22,hs:30,bs:15,rg:105,tp:'super'};
spP(this.x,this.y-70,this.ch.o3,35,7,1.2);snd('super');}
ghb(){if(!this.atk||!this.cm)return null;
if(this.mf<this.cm.su||this.mf>=this.cm.su+this.cm.ac)return null;
return{x:this.x+this.fc*(this.w/2),y:this.cr?this.y-35:this.y-65,w:this.cm.rg,h:45,fc:this.fc};}
gub(){const h=this.cr?this.h*.6:this.h;return{x:this.x-this.w/2,y:this.y-h,w:this.w,h};}
hit(dm,kb,atk){
if(this.inv>0)return 0;
const fb=(atk.x>this.x&&this.fc===-1)||(atk.x<this.x&&this.fc===1);
if(this.bl||fb&&this.st==='block'){
this.bks=atk.cm?atk.cm.bs:8;this.vx=-this.fc*kb*.3;this.st='block';this.bl=1;
this.hp=Math.max(0,this.hp-Math.floor(dm*.08));snd('block');
spP(this.x+this.fc*20,this.y-65,'#FFF',6,3,.6);return 0;}
this.hp=Math.max(0,this.hp-dm);this.hs=atk.cm?atk.cm.hs:12;
this.vx=-this.fc*kb;this.atk=0;this.cm=null;this.mf=0;
this.st='hit';this.fl=8;this.combo=0;
atk.combo++;if(atk.combo>atk.mxc)atk.mxc=atk.combo;
atk.sp=Math.min(100,atk.sp+dm/8);
spP(this.x,this.y-55,'#FF3333',10,5,.8);
spP(this.x,this.y-55,'#FFAA00',6,3,.6);
if(this.hp<=0){this.st='ko';this.ko=0;snd('ko');}else snd(dm>60?'hit_h':'hit_l');
return 1;}
cpj(o){if(!this.pa)return;const h=o.gub();
if(this.px>h.x&&this.px<h.x+h.w&&this.py>h.y&&this.py<h.y+h.h){
this.pa=0;o.hit(Math.floor(this.ch.sp1D*.55),5,this);spP(this.px,this.py,'#FFD700',12,4,.7);}}
}

/* ================================================================
   REALISTIC CHARACTER RENDERER
   Uses gradients, bezier curves, detailed anatomy
   ================================================================ */
function dF(f){
const s=S,c=f.ch,bx=f.x*s,by=f.y*s,fc=f.fc;
if(f.fl>0&&f.fl%2===0)return;
// ground shadow
cx.save();cx.fillStyle='rgba(0,0,0,0.35)';
cx.beginPath();cx.ellipse(bx,by+4*s,28*c.bulk*s,6*s,0,0,6.28);cx.fill();cx.restore();
cx.save();cx.translate(bx,by);cx.scale(fc,1);
const B=c.bulk,T=c.tall;
// proportions (realistic ~7.5 heads)
const hd=14*T*s;// head radius
const nkH=6*T*s;
const trW=28*B*s,trH=42*T*s;
const armU=24*T*s,armL=22*T*s,armW=9*B*s;
const legU=28*T*s,legL=26*T*s,legW=11*B*s;
// anim vars
let bOff=0,aAng=0,a2Ang=0,lAng=0,l2Ang=0,pExt=0,kExt=0;
const af=f.af;
switch(f.st){
case'idle':bOff=Math.sin(af*1.57)*.8*s;aAng=Math.sin(af*1.57)*.04;break;
case'walk':lAng=Math.sin(af*1.57)*.45;l2Ang=-lAng;aAng=-lAng*.4;a2Ang=lAng*.4;
bOff=Math.abs(Math.sin(af*1.57))*1.5*s;break;
case'jump':lAng=-.35;l2Ang=.35;aAng=-.4;a2Ang=.4;break;
case'crouch':bOff=18*s;lAng=.7;l2Ang=.7;break;
case'attack':case'sp1':case'sp2':case'super':
if(f.cm){const pr=f.mf/(f.cm.su+f.cm.ac+f.cm.rc);
const ia=f.mf>=f.cm.su&&f.mf<f.cm.su+f.cm.ac;
const tp=f.cm.tp;
if(tp==='lp'||tp==='hp'||tp==='clp'||tp==='jlp'){pExt=ia?1:pr<.3?pr/.3:Math.max(0,1-(pr-.3)/.7);aAng=-1.4*pExt;}
else if(tp==='lk'||tp==='hk'||tp==='chk'||tp==='jhk'){kExt=ia?1:pr*.5;lAng=-1.3*kExt;aAng=.25;}
else if(tp==='sp1'){aAng=-1.6;pExt=ia?1.3:0;a2Ang=.4;}
else if(tp==='sp2'){if(c.id==='leon'||c.id==='togado'){aAng=-.9;a2Ang=-.9;lAng=-.3;}
else{aAng=-1.1;lAng=-.4;bOff=-12*s;}}
else if(tp==='super'){const pu=Math.sin(f.mf*.5)*.3;aAng=-1.6+pu;a2Ang=-1.6-pu;lAng=.15+pu;}}break;
case'block':aAng=.7;a2Ang=.7;bOff=2*s;break;
case'hit':bOff=4*s;aAng=.4;a2Ang=.5;break;
case'ko':const kp=Math.min(1,f.ko/35);cx.rotate(kp*1.57*-fc);bOff=kp*50*s;break;
}
const baseY=-bOff;
// super glow
if(f.sa>0){cx.shadowColor=c.o3;cx.shadowBlur=25*s;}

// === LEGS ===

// mouth

else if(f.atk){cx.fillStyle='#333';cx.beginPath();cx.ellipse(0,hdY+hd*.35,hd*.2,hd*.15,0,0,6.28);cx.fill();

}else{// KO face
cx.strokeStyle='#333';cx.lineWidth=2*s;
cx.beginPath();cx.moveTo(-hd*.45,hdY-hd*.35);cx.lineTo(-hd*.2,hdY-hd*.1);cx.stroke();

cx.beginPath();cx.moveTo(hd*.2,hdY-hd*.35);cx.lineTo(hd*.45,hdY-hd*.1);cx.stroke();

}

function darken(hex,amt){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),
b=parseInt(hex.slice(5,7),16);return`rgb(${Math.max(0,r-r*amt)|0},${Math.max(0,g-g*amt)|0},${Math.max(0,b-b*amt)|0})`;}

b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,r+r*amt)|0},${Math.min(255,g+g*amt)|0},${Math.min(255,b+b*amt)|0})`;}

/* === AI === */
function aiUp(ai,opp){
ai.aic--;if(ai.aic>0)return{};
const d=Math.abs(ai.x-opp.x),r=Math.random();
const inp={u:0,d:0,l:0,r:0,bl:0,_lp:0,_hp:0,_lk:0,_hk:0,_sp1:0,_sp2:0,_su:0};
if(ai.hs>0||ai.bks>0||ai.atk)return inp;
if(d>140){inp.r=opp.x>ai.x?1:0;inp.l=opp.x<ai.x?1:0;
if(r<.03)inp.u=1;if(r<.07&&d>220){inp._sp1=1;ai.aic=45;return inp;}}
else if(d>65){if(r<.1){inp._hk=1;ai.aic=22;}else if(r<.2){inp._lp=1;ai.aic=14;}
else if(r<.26){inp._hp=1;ai.aic=20;}else if(r<.32){inp._lk=1;ai.aic=16;}
else if(r<.35&&ai.sp>=100){inp._su=1;ai.aic=55;}
else if(r<.4){inp[r<.37?'_sp1':'_sp2']=1;ai.aic=38;}
else{inp.r=opp.x>ai.x?1:0;inp.l=opp.x<ai.x?1:0;}}
else{if(r<.18){inp._lp=1;ai.aic=10;}else if(r<.28){inp.bl=1;ai.aic=18;}
else if(r<.36){inp.l=opp.x>ai.x?1:0;inp.r=opp.x<ai.x?1:0;ai.aic=12;}
else if(r<.42){inp.d=1;inp._hk=1;ai.aic=22;}
else if(r<.48){inp.u=1;inp._hk=1;ai.aic=18;}}
if(ai.hp/ai.mhp<.3&&r<.35){inp.bl=1;ai.aic=22;inp.l=inp.r=0;}
if(opp.atk&&d<110&&r<.45){inp.bl=1;ai.aic=12;}
return inp;}

this.tb=0;this.fst=0;this.sl=0;}

else if(k==='arrowright'||k==='d'){this.sc=(this.sc+1)%CH.length;snd('sel');}
else if(k==='arrowup'||k==='w'){this.sc=(this.sc-3+CH.length)%CH.length;snd('sel');}
else if(k==='arrowdown'||k==='s'){this.sc=(this.sc+3)%CH.length;snd('sel');}
else if(k==='enter'||k===' '||k==='j'){
const c=CH[this.sc];if(this.sc>=4&&!UL()){this.ann='DESBLOQUEIE POR $0.99!';this.anT=120;return;}
this.s2=this.sc;do{this.s2=Math.floor(Math.random()*CH.length)}while(this.s2===this.sc);

this.tm-=1/60;uI();
const pi={u:I.u,d:I.d,l:I.l,r:I.r,bl:I.bl,_lp:jp('lp'),_hp:jp('hp'),_lk:jp('lk'),_hk:jp('hk'),_sp1:0,_sp2:0,_su:0};
// special inputs (simplified: down+forward+punch = sp1, down+back+kick = sp2)
if(pi._lp&&I.d&&I.r){pi._sp1=1;pi._lp=0;}
if(pi._lk&&I.d&&I.l){pi._sp2=1;pi._lk=0;}
if(pi._lp&&pi._hp||(I.lp&&I.hp&&jp('lp'))){pi._su=1;pi._lp=0;pi._hp=0;}
const ai=aiUp(this.p2,this.p1);
this.p1.upd(pi,this.p2);this.p2.upd(ai,this.p1);
// push apart
if(Math.abs(this.p1.x-this.p2.x)<35){const push=this.p1.x<this.p2.x?-1.5:1.5;
this.p1.x+=push;this.p2.x-=push;}
// hit detect
this.chkHit(this.p1,this.p2);this.chkHit(this.p2,this.p1);
this.p1.cpj(this.p2);this.p2.cpj(this.p1);
this.sx*=.85;this.sy*=.85;uPT();

else if(this.tm<=0){this.tm=0;
if(this.p1.hp>=this.p2.hp){this.p1.rw++;this.endR(this.p1);}
else{this.p2.rw++;this.endR(this.p2);}}
}

const ub=b.gub();const hx=hb.fc===1?hb.x:hb.x-hb.w;
if(hx<ub.x+ub.w&&hx+hb.w>ub.x&&hb.y<ub.y+ub.h&&hb.y+hb.h>ub.y){
const hit=b.hit(a.cm.dm,a.cm.kb,a);a.hc=1;this.hs=hit?6:3;

spP(w.x,w.y-70,w.ch.o3,25,6,1);}
