<title>PATRIOTA FIGHTER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none}
canvas{display:block}
#loading{position:fixed;inset:0;z-index:100;background:#030308;display:flex;flex-direction:column;align-items:center;justify-content:center}
#loading h1{color:#c00;font-size:3em;letter-spacing:5px}
#loading h2{color:#fff;font-size:1.5em;letter-spacing:8px;margin-top:4px}
#load-bar-bg{width:300px;height:6px;background:#111;border-radius:3px;margin-top:40px;overflow:hidden}
#load-bar{width:0%;height:100%;background:linear-gradient(90deg,#c00,#f44);transition:width 0.3s}
#load-text{color:#555;font-size:0.8em;margin-top:12px}
#load-err{color:#f44;font-size:0.9em;margin-top:20px;display:none;text-align:center;max-width:400px}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:90;transition:opacity 0.05s}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:10px 20px}
.hb{position:absolute;top:12px;height:24px;background:rgba(0,0,0,0.85);border:2px solid #5a4a20;overflow:hidden}
.hb-l{left:40px;right:calc(50% + 35px);clip-path:polygon(0 0,100% 0,98% 100%,0 100%)}
.hb-r{right:40px;left:calc(50% + 35px);clip-path:polygon(2% 0,100% 0,100% 100%,0 100%)}
.hf{height:100%;transition:width 0.2s}
.hf-l{float:right;background:linear-gradient(180deg,#2d2,#070)}
.hf-r{float:left;background:linear-gradient(180deg,#2d2,#070)}
.hf.warn{background:linear-gradient(180deg,#dd0,#880)!important}
.hf.crit{background:linear-gradient(180deg,#d22,#800)!important}
.nm{position:absolute;top:40px;color:#999;font:bold 11px/1 'Segoe UI';text-transform:uppercase;letter-spacing:1px}
.nm-l{left:45px}.nm-r{right:45px}
#timer{position:absolute;top:8px;left:50%;transform:translateX(-50%);color:#eee;font:bold 28px/1 'Segoe UI'}
#round{position:absolute;top:38px;left:50%;transform:translateX(-50%);color:#666;font:bold 10px/1 'Segoe UI';letter-spacing:2px}
.mt{position:absolute;top:44px;height:5px;background:rgba(0,0,0,0.8);border:1px solid #3a3010}
.mt-l{left:45px;width:140px}.mt-r{right:45px;width:140px}
.mf{height:100%;background:linear-gradient(90deg,#a80,#fd0);width:0%;transition:width 0.3s}
#ann{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);color:#f00;font:bold 48px/1 'Segoe UI';
text-shadow:0 0 40px rgba(255,0,0,0.8),0 4px 8px rgba(0,0,0,0.9);z-index:20;display:none;letter-spacing:3px}
#combo-l,#combo-r{position:fixed;top:40%;font:bold 28px/1 'Segoe UI';color:#f80;
text-shadow:0 0 15px rgba(255,136,0,0.7);z-index:15;display:none}
#combo-l{left:60px}#combo-r{right:60px}
#overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;flex-direction:column;
background:rgba(2,2,5,0.95);backdrop-filter:blur(4px)}
#overlay.hidden{display:none}
#overlay h1{font-size:4em;color:#c00;text-shadow:0 0 60px rgba(200,0,0,0.4);letter-spacing:5px}
#overlay h2{font-size:2.2em;color:#fff;margin-top:5px;letter-spacing:8px}
#overlay .sub{color:#444;font-size:0.75em;margin-top:8px}
#overlay .prompt{color:#777;font-size:1em;margin-top:40px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.mi{color:#444;font-size:1.4em;margin:10px 0;cursor:pointer;transition:all 0.15s;letter-spacing:2px}
.mi.sel{color:#fff;transform:scale(1.1);text-shadow:0 0 20px rgba(255,255,255,0.3)}
.mi:hover{color:#ccc}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:15px;max-width:560px}
.gc{padding:12px 8px;background:rgba(15,15,20,0.95);border:2px solid #222;border-radius:6px;cursor:pointer;text-align:center;transition:all 0.15s}
.gc:hover{border-color:#666;transform:scale(1.05)}
.gc.s1{border-color:#48f;box-shadow:0 0 15px rgba(68,136,255,0.3)}
.gc.s2{border-color:#f44;box-shadow:0 0 15px rgba(255,68,68,0.3)}
.gc.locked{opacity:0.4}
.gc .dot{width:32px;height:32px;border-radius:50%;margin:0 auto 6px}
.gc .cn{font-size:8px;color:#888;letter-spacing:0.5px}
#mu{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;pointer-events:none}
#mu *{pointer-events:auto}
@media(hover:none)and(pointer:coarse){#mu{display:block}}
@media(min-width:769px){#mu{display:none!important}}
</style>
</head>

<script type="module">
import*as THREE from'three';
import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';
import*as SkeletonUtils from'three/addons/utils/SkeletonUtils.js';

// ===== PAYMENT =====
const STRIPE='https://buy.stripe.com/6oUdR80Vu5pm3S56uV0x20c';
const PAYPAL='https://www.paypal.com/paypalme/PadraoBitcoin/0.99';
(()=>{const p=new URLSearchParams(location.search);
if(p.get('paid')==='true'){localStorage.setItem('pf_unlocked','true');history.replaceState(null,'',location.pathname)}})();
const UL=()=>localStorage.getItem('pf_unlocked')==='true';

// ===== MODEL CACHE =====
let baseGLTF=null;

// ===== RENDERER (WebGL1 compatible — no post-processing, no shadows) =====
let W=window.innerWidth,H=window.innerHeight;
let renderer;
try{
renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'default',
failIfMajorPerformanceCaveat:false,preserveDrawingBuffer:false});
}catch(e){
document.getElementById('load-err').style.display='block';
document.getElementById('load-err').innerHTML='WebGL not available on this device.<br><small>'+e.message+'</small><br><br><button onclick="location.reload()" style="background:#c00;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer">RETRY</button>';
throw e;}
renderer.setSize(W,H);renderer.setPixelRatio(1.0);
renderer.shadowMap.enabled=false;
renderer.toneMapping=THREE.NoToneMapping;
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

// WebGL context loss recovery
renderer.domElement.addEventListener('webglcontextlost',e=>{e.preventDefault();
document.getElementById('load-err').style.display='block';
document.getElementById('load-err').innerHTML='WebGL crashed — <button onclick="location.reload()" style="background:#c00;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer">RELOAD</button>';});
renderer.domElement.addEventListener('webglcontextrestored',()=>location.reload());

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x050510);
scene.fog=new THREE.FogExp2(0x050510,0.05);

const camera=new THREE.PerspectiveCamera(40,W/H,0.1,100);
camera.position.set(0,1.8,6.5);camera.lookAt(0,1,0);

window.addEventListener('resize',()=>{W=innerWidth;H=innerHeight;
camera.aspect=W/H;camera.updateProjectionMatrix();
renderer.setSize(W,H);});

// ===== LIGHTING (3-point MKX cinematic) =====
scene.add(new THREE.AmbientLight(0x303050,0.5));

const keyLight=new THREE.DirectionalLight(0xfff0dd,1.4);
keyLight.position.set(-4,7,3);
scene.add(keyLight);

const rimLight=new THREE.DirectionalLight(0x6688cc,0.9);
rimLight.position.set(3,4,-5);scene.add(rimLight);

const fillLight=new THREE.DirectionalLight(0x332244,0.4);
fillLight.position.set(0,2,6);scene.add(fillLight);

// ===== TOON MATERIAL (Cel-Shading) =====
const toonGrad=(()=>{const d=new Uint8Array([40,100,180,255]);
const t=new THREE.DataTexture(d,4,1,THREE.LuminanceFormat);
t.minFilter=THREE.NearestFilter;t.magFilter=THREE.NearestFilter;t.needsUpdate=true;return t;})();

function makeToon(color,em=0x000000,emI=0){
return new THREE.MeshToonMaterial({color,gradientMap:toonGrad,emissive:em,emissiveIntensity:emI,side:THREE.DoubleSide});}

// ===== FLOOR =====
const floorGeo=new THREE.PlaneGeometry(16,8);
const floorMat=new THREE.MeshLambertMaterial({color:0x1a1a2e,roughness:0.6,metalness:0.3});
const floor=new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;floor;scene.add(floor);
const gridHelper=new THREE.GridHelper(16,32,0x111122,0x0a0a15);
gridHelper.position.y=0.001;scene.add(gridHelper);

// ===== BACKGROUND =====
for(let i=-3;i<=3;i+=2){
const pGeo=new THREE.CylinderGeometry(0.15,0.15,4,8);
const pMat=new THREE.MeshLambertMaterial({color:0x1a1a30,roughness:0.4,metalness:0.5});
const p=new THREE.Mesh(pGeo,pMat);p.position.set(i*1.5,2,-3);scene.add(p);}
const wallGeo=new THREE.PlaneGeometry(16,5);
const wallMat=new THREE.MeshLambertMaterial({color:0x141428,roughness:0.9});
const wall=new THREE.Mesh(wallGeo,wallMat);wall.position.set(0,2.5,-3.5);scene.add(wall);

// ===== 12 CHARACTERS =====
const CHARS=[
{id:'mito',name:'O MITO',hp:1000,spd:4.5,body:{height:185,shoulder:48},free:true,
color1:0x1a3d1a,color2:0xDAA520,skinTone:0xC68642,visorCol:0xDAA520,
specials:['Laser Patriota','Capa Dourada','Voo Soberano'],cape:true,padSize:1.2},
{id:'deputado',name:'O DEPUTADO',hp:900,spd:5.2,body:{height:178,shoulder:40},free:true,
color1:0x1a237e,color2:0xcc0000,skinTone:0xD4A574,visorCol:0xcc0000,
specials:['Tablet Strike','Fake News','Filibuster'],cape:false,padSize:0},
{id:'leon',name:'EL LEON',hp:950,spd:5.5,body:{height:188,shoulder:50},free:true,
color1:0x2F1B0E,color2:0x8B4513,skinTone:0xC68642,visorCol:0xDAA520,
specials:['Motosierra Fury','Anarco Tackle','Libertad Kick'],cape:false,padSize:0},
{id:'eagle',name:'THE EAGLE',hp:1050,spd:4,body:{height:193,shoulder:52},free:true,
color1:0x000088,color2:0xFFD700,skinTone:0xF5D0B0,visorCol:0xFFD700,
specials:['Freedom Laser','Star Shield','Eagle Dive'],cape:true,padSize:1.3},
{id:'general',name:'LE GENERAL',hp:1000,spd:3.8,body:{height:180,shoulder:46},free:true,
color1:0x2F4F2F,color2:0x2F2F2F,skinTone:0xD4A574,visorCol:0x556B2F,
specials:['Artillerie','Baton Strike','Strategie'],cape:false,padSize:1.1},
{id:'comandante',name:'EL COMANDANTE',hp:980,spd:4.2,body:{height:183,shoulder:44},free:true,
color1:0x3B5323,color2:0x5C4306,skinTone:0xA0704A,visorCol:0x2F4F4F,
specials:['Charuto Bomba','Guerrilla Rush','Revolucion Kick'],cape:false,padSize:0},
{id:'barbudo',name:'BARBUDO',hp:1020,spd:3.5,body:{height:178,shoulder:48},free:false,
color1:0x8B0000,color2:0x333333,skinTone:0xD4A87A,visorCol:0x2F4F4F,
specials:['Charuto Inferno','Dedo Crusher','Corrupcao Wave'],cape:false,padSize:0},
{id:'togado',name:'O TOGADO',hp:960,spd:3.8,body:{height:186,shoulder:44},free:false,
color1:0x080808,color2:0x4B0082,skinTone:0xD4B490,visorCol:0x4B0082,
specials:['Martelo Justica','Toga Whip','Sentenca Final'],cape:true,padSize:0},
{id:'presidanta',name:'PRESIDANTA',hp:920,spd:4.8,body:{height:172,shoulder:36},free:false,
color1:0xCC0000,color2:0xDAA520,skinTone:0xD4A880,visorCol:0x8B4513,
specials:['Estoque Fiscal','Pedalada','Power Smash'],cape:false,padSize:0},
{id:'kanzler',name:'DER KANZLER',hp:980,spd:4.0,body:{height:178,shoulder:38},free:false,
color1:0x2a2a2a,color2:0x1a237e,skinTone:0xF0D0B0,visorCol:0x4682B4,
specials:['Ordnung Strike','Euro Shield','Kalt Blitz'],cape:false,padSize:0},
{id:'oligarch',name:'THE OLIGARCH',hp:1100,spd:3.2,body:{height:192,shoulder:54},free:false,
color1:0xB8860B,color2:0xDAA520,skinTone:0xD8B8A0,visorCol:0x2F4F4F,
specials:['Gold Fist','Vodka Fire','Bear Hug'],cape:false,padSize:1.4},
{id:'duce',name:'IL DUCE',hp:1000,spd:3.6,body:{height:182,shoulder:46},free:false,
color1:0x2F4F2F,color2:0x333333,skinTone:0xC89068,visorCol:0x2F2F2F,
specials:['Fascio Strike','March Roma','Imperial Eagle'],cape:false,padSize:1.2}
];

// ===== MOVES =====
const MV={lp:{s:4,a:2,r:6,d:30,k:0.1},hp:{s:9,a:4,r:12,d:80,k:0.22},
lk:{s:5,a:3,r:7,d:35,k:0.12},hk:{s:10,a:4,r:14,d:90,k:0.28},
sweep:{s:10,a:4,r:18,d:75,k:0.15},throw_f:{s:3,a:2,r:20,d:120,k:0.35},
sp1:{s:12,a:5,r:18,d:130,k:0.38},sp2:{s:10,a:6,r:15,d:110,k:0.28},
sp3:{s:14,a:4,r:20,d:150,k:0.42},super:{s:8,a:10,r:25,d:380,k:0.55}};

// ===== AUDIO =====
let ac=null;
function ia(){if(!ac)ac=new(AudioContext||webkitAudioContext)()}
function snd(t){if(!ac)return;const n=ac.currentTime,g=ac.createGain(),o=ac.createOscillator();
o.connect(g);g.connect(ac.destination);
const P={hit_l:[200,'sawtooth',.15,.08],hit_h:[80,'sawtooth',.28,.18],
block:[600,'triangle',.08,.05],ko:[40,'sawtooth',.4,1.8],
sp:[280,'square',.18,.3],super:[180,'sawtooth',.28,.8],
sel:[700,'triangle',.05,.06],fight:[320,'sawtooth',.2,.5],fat:[25,'sawtooth',.5,2.5]};
const p=P[t];if(!p)return;
o.frequency.value=p[0];o.type=p[1];g.gain.setValueAtTime(p[2],n);
g.gain.exponentialRampToValueAtTime(.001,n+p[3]);o.start(n);o.stop(n+p[3]);}

// ===== INPUT =====
const K={};let I={u:0,d:0,l:0,r:0,lp:0,hp:0,lk:0,hk:0,bl:0};let IP={...I};
window.addEventListener('keydown',e=>{K[e.key.toLowerCase()]=1;ia();handleMenuKey(e.key.toLowerCase());});
window.addEventListener('keyup',e=>{K[e.key.toLowerCase()]=0;});
function uI(){IP={...I};
I={u:K.arrowup||K.w||0,d:K.arrowdown||K.s||0,l:K.arrowleft||K.a||0,r:K.arrowright||K.d||0,
lp:K.j||K[' ']||0,hp:K.k||0,lk:K.u||0,hk:K.i||0,bl:K.l||0};}
function jp(b){return I[b]&&!IP[b]}

// ===== MOTION INPUTS =====
const IBUF=[];
function logDir(){const d=(I.d?'D':'')+(I.u?'U':'')+(I.l?'L':'')+(I.r?'R':'');
if(!IBUF.length||IBUF[IBUF.length-1].d!==d){IBUF.push({d,t:performance.now()});if(IBUF.length>30)IBUF.shift();}}
function chkM(seq,fc){const now=performance.now();let si=seq.length-1;
for(let i=IBUF.length-1;i>=0&&si>=0;i--){if(now-IBUF[i].t>400)break;
let ex=seq[si];if(fc===-1)ex=ex.replace('R','$').replace('L','R').replace('$','L');
if(IBUF[i].d===ex)si--;}return si<0;}
function isQCF(fc){return chkM(['D','DR','R'],fc)||chkM(['D','R'],fc)}
function isQCB(fc){return chkM(['D','DL','L'],fc)||chkM(['D','L'],fc)}
function isDP(fc){return chkM(['R','D','DR'],fc)||chkM(['R','DR'],fc)}

// ===== PARTICLES =====
const sparks=[];const MAXSP=50;
for(let i=0;i<MAXSP;i++){const sg=new THREE.SphereGeometry(0.035,4,3);
const sm=new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0});
const m=new THREE.Mesh(sg,sm);m.visible=false;scene.add(m);
sparks.push({m,vx:0,vy:0,vz:0,life:0,max:0});}
let si=0;
function emitSpark(x,y,z,n,col=0xff8800,spd=0.15){
for(let i=0;i<n;i++){const s=sparks[si];si=(si+1)%MAXSP;
s.m.visible=true;s.m.position.set(x,y,z);s.m.material.color.setHex(col);s.m.material.opacity=1;
s.vx=(Math.random()-0.5)*spd;s.vy=Math.random()*spd*0.7+0.02;s.vz=(Math.random()-0.5)*spd*0.4;
s.life=0;s.max=18+Math.random()*12;}}
function updSparks(){sparks.forEach(s=>{if(!s.m.visible)return;
s.life++;if(s.life>=s.max){s.m.visible=false;return;}
s.vy-=0.008;s.m.position.x+=s.vx;s.m.position.y+=s.vy;s.m.position.z+=s.vz;
s.m.material.opacity=1-s.life/s.max;s.m.scale.setScalar(1-s.life/s.max*0.5);});}

// ===== GAME FEEL =====
let hitstopF=0,shakeI=0,camTarget={x:0,y:1.8,z:6.5};
function screenFlash(){document.getElementById('flash').style.opacity='0.25';
setTimeout(()=>document.getElementById('flash').style.opacity='0',60);}
function camShake(i){shakeI=i;}
function hitstop(f){hitstopF=f;}
function announce(t,dur=2000){const el=document.getElementById('ann');el.textContent=t;el.style.display='block';
setTimeout(()=>el.style.display='none',dur);}

// ===== FIGHTER CLASS (GLB MODEL) =====
class Fighter{
constructor(ci,x,fc){
const c=CHARS[ci];this.ci=ci;this.c=c;this.x=x;this.y=0;this.vx=0;this.vy=0;this.fc=fc;
this.hp=c.hp;this.maxHp=c.hp;this.meter=0;this.maxMeter=300;
this.state='idle';this.anim=0;this.attacking=false;this.atk=null;this.atkF=0;
this.hit=false;this.hitT=0;this.blocking=false;this.dead=false;
this.comboN=0;this.comboD=0;this.comboT=0;this.wins=0;this.ai=false;this.aiT=0;

// Clone 3D model
baseGLTF.scene.updateMatrixWorld(true);
const mdl=SkeletonUtils.clone(baseGLTF.scene);

// Scale to character height — model is ~1.8m at native scale (root node has 0.01 scale)
const sc=c.body.height/180;
mdl.scale.setScalar(sc);
this.baseScale=sc;

// Apply cel-shading materials per character
const bodyMat=makeToon(c.color1);
const visorMat=makeToon(c.visorCol,c.visorCol,0.3);
const skinMat=makeToon(c.skinTone);
mdl.traverse(child=>{
if(child.isMesh){
if(child.name==='vanguard_visor')child.material=visorMat;
else child.material=bodyMat;
child;child;
}});

// Find bones
this.bones={};
mdl.traverse(child=>{if(child.isBone){
const nm=child.name.replace('mixamorig:','');
this.bones[nm]=child;}});

// Store initial bone rotations (from idle pose)
this.boneRest={};
for(const[nm,bone]of Object.entries(this.bones)){
this.boneRest[nm]={x:bone.rotation.x,y:bone.rotation.y,z:bone.rotation.z};}

// Animation mixer
this.mixer=new THREE.AnimationMixer(mdl);
this.clips={};
baseGLTF.animations.forEach(clip=>{this.clips[clip.name.toLowerCase()]=clip;});
this.curAnim=null;this.curAction=null;
this.playClip('idle');

// Position and facing (rotate to side-view)
mdl.position.set(x,0,0);
mdl.rotation.y=fc===1?-Math.PI/2:Math.PI/2;
scene.add(mdl);
this.mdl=mdl;

// Bone override accumulators for smooth combat animation
this.boneAcc={};

// Cape (optional, attached to Spine2 bone)
this.capeObj=null;
if(c.cape&&this.bones.Spine2){
const cG=new THREE.PlaneGeometry(0.4*sc,0.5*sc,2,5);
const cM=makeToon(c.color2);cM.side=THREE.DoubleSide;
const cape=new THREE.Mesh(cG,cM);
cape.position.set(0,-0.1,-0.15);
cape;
this.bones.Spine2.add(cape);
this.capeObj=cape;
}

// Shoulder pads (optional)
if(c.padSize>0&&this.bones.LeftShoulder&&this.bones.RightShoulder){
const padGeo=new THREE.SphereGeometry(0.06*c.padSize,8,6,0,Math.PI*2,0,Math.PI*0.6);
const padMat=makeToon(c.color2,c.color2,0.15);
const lPad=new THREE.Mesh(padGeo,padMat);lPad;
const rPad=new THREE.Mesh(padGeo,padMat);rPad;
this.bones.LeftShoulder.add(lPad);
this.bones.RightShoulder.add(rPad);
}
}

playClip(name){
if(this.curAnim===name)return;
const clip=this.clips[name];
if(!clip)return;
const act=this.mixer.clipAction(clip);
act.setLoop(THREE.LoopRepeat);
if(this.curAction)this.curAction.fadeOut(0.15);
act.reset().fadeIn(0.15).play();
this.curAction=act;this.curAnim=name;
}

// Additive bone override for combat
boneAdd(name,rx,ry,rz,str=0.3){
const bone=this.bones[name];
if(!bone)return;
if(!this.boneAcc[name])this.boneAcc[name]={x:0,y:0,z:0};
const a=this.boneAcc[name];
a.x+=(rx-a.x)*str;a.y+=(ry-a.y)*str;a.z+=(rz-a.z)*str;
}

applyBoneOverrides(){
for(const[name,off]of Object.entries(this.boneAcc)){
const bone=this.bones[name];
if(!bone)continue;
bone.rotation.x+=off.x;bone.rotation.y+=off.y;bone.rotation.z+=off.z;
}}

resetBoneAcc(){
for(const a of Object.values(this.boneAcc)){a.x*=0.8;a.y*=0.8;a.z*=0.8;}}

updateAnim(dt){
this.anim+=dt*3;
const t=this.anim;

// Update base animation
this.mixer.update(dt);

if(this.state==='idle'){
this.playClip('idle');
this.resetBoneAcc();
}
else if(this.state==='walk'){
this.playClip('walk');
this.resetBoneAcc();
}
else if(this.state==='attack'){
this.playClip('idle');
const mv=MV[this.atk];if(!mv)return;
const total=mv.s+mv.a+mv.r;
const p=this.atkF/total;
const sw=Math.sin(p*Math.PI);
const pk=p<0.5?sw*1.5:sw;

if(this.atk==='lp'||this.atk==='hp'){
const pw=this.atk==='hp'?1.4:1.0;
this.boneAdd('RightArm',-1.5*pk*pw,0,-0.2*pk,0.35);
this.boneAdd('RightForeArm',-0.9*pk*pw,0,0,0.35);
this.boneAdd('Spine1',0,-0.2*pk,0,0.2);
this.boneAdd('LeftArm',-0.6,0,0.3,0.15);
this.boneAdd('LeftForeArm',-0.8,0,0,0.15);
}
else if(this.atk==='lk'||this.atk==='hk'){
const pw=this.atk==='hk'?1.4:1.0;
this.boneAdd('RightUpLeg',-1.3*pk*pw,0,0,0.35);
this.boneAdd('RightLeg',0.7*pk*pw,0,0,0.35);
this.boneAdd('Hips',0,-0.25*pk,0,0.2);
this.boneAdd('Spine',0,0.15*pk,0,0.15);
this.boneAdd('LeftArm',-0.4,0,0.2,0.12);
this.boneAdd('RightArm',-0.4,0,-0.2,0.12);
}
else if(this.atk==='sweep'){
this.boneAdd('Hips',0.3*pk,0,-0.2*pk,0.3);
this.boneAdd('RightUpLeg',-0.3*pk,0,-1.2*pk,0.3);
this.boneAdd('RightLeg',0.4*pk,0,0,0.3);
this.boneAdd('Spine',-0.2*pk,0,0.1*pk,0.2);
}
else if(this.atk==='sp1'){
// Energy double punch
this.boneAdd('RightArm',-1.8*pk,0,-0.3*pk,0.4);
this.boneAdd('LeftArm',-1.5*pk,0,0.3*pk,0.35);
this.boneAdd('RightForeArm',-1.0*pk,0,0,0.35);
this.boneAdd('LeftForeArm',-0.8*pk,0,0,0.3);
this.boneAdd('Spine1',-0.25*pk,0,0,0.25);
}
else if(this.atk==='sp2'){
// Spinning kick
this.boneAdd('Hips',0,Math.PI*2*p,0,0.45);
this.boneAdd('RightUpLeg',-1.5*pk,0,0,0.35);
this.boneAdd('RightLeg',0.8*pk,0,0,0.3);
this.boneAdd('Spine',0,-Math.PI*0.3*p,0,0.2);
}
else if(this.atk==='sp3'){
// Uppercut
this.boneAdd('RightArm',-2.2*pk,0,-0.4*pk,0.4);
this.boneAdd('RightForeArm',-1.4*pk,0,0,0.4);
this.boneAdd('Spine',-0.35*pk,0,0,0.25);
this.boneAdd('Hips',-0.15*pk,0,0,0.2);
this.boneAdd('LeftUpLeg',0.15*pk,0,0,0.15);
this.boneAdd('RightUpLeg',0.15*pk,0,0,0.15);
}
else if(this.atk==='super'){
// Multi-phase super
const phase=p*3;
if(phase<1){
// Wind up
this.boneAdd('Spine',0.35,0,0,0.25);
this.boneAdd('RightArm',0.6,0,-0.3,0.2);
this.boneAdd('LeftArm',0.6,0,0.3,0.2);
}else{
// Unleash
this.boneAdd('RightArm',-2.0*pk,0,-0.5*pk,0.45);
this.boneAdd('LeftArm',-1.6*pk,0,0.4*pk,0.4);
this.boneAdd('RightForeArm',-1.2*pk,0,0,0.4);
this.boneAdd('LeftForeArm',-1.0*pk,0,0,0.35);
this.boneAdd('Spine',-0.45*pk,0,0,0.3);
this.boneAdd('RightUpLeg',-0.4*pk,0,0,0.2);
}
}
}
else if(this.state==='block'){
this.playClip('idle');
this.boneAdd('RightArm',-1.1,0,-0.6,0.25);
this.boneAdd('RightForeArm',-1.6,0,0,0.25);
this.boneAdd('LeftArm',-1.1,0,0.6,0.25);
this.boneAdd('LeftForeArm',-1.6,0,0,0.25);
this.boneAdd('Spine',0.12,0,0,0.15);
}
else if(this.state==='hit'){
this.playClip('idle');
this.boneAdd('Spine',0.45,0,0,0.35);
this.boneAdd('Spine1',0.2,0,0,0.3);
this.boneAdd('Head',0.35,0,0,0.3);
this.boneAdd('RightArm',0.2,0,0.4,0.2);
this.boneAdd('LeftArm',0.2,0,-0.4,0.2);
}
else if(this.state==='ko'){
this.playClip('idle');
this.boneAdd('Spine',0.9,0,0,0.04);
this.boneAdd('Spine1',0.6,0,0,0.04);
this.boneAdd('Head',0.7,0,0,0.05);
this.boneAdd('RightArm',0.3,0,0.9,0.03);
this.boneAdd('LeftArm',0.3,0,-0.9,0.03);
this.boneAdd('RightUpLeg',0.3,0,0.2,0.02);
this.boneAdd('LeftUpLeg',0.3,0,-0.2,0.02);
this.mdl.position.y=Math.max(this.mdl.position.y-0.006,-0.25);
}

// Apply accumulated bone overrides on top of mixer
this.applyBoneOverrides();

// Cape physics
if(this.capeObj){
const cp=this.capeObj.geometry.attributes.position;
for(let i=0;i<cp.count;i++){const y=cp.getY(i);
if(y<-0.05)cp.setZ(i,Math.sin(t*2.5+i*0.5)*0.04-0.03);}
cp.needsUpdate=true;
}

// Sync position and facing
this.mdl.position.x=this.x;
this.mdl.rotation.y=this.fc===1?-Math.PI/2:Math.PI/2;
}

destroy(){
this.mixer.stopAllAction();
scene.remove(this.mdl);
this.mdl.traverse(child=>{if(child.isMesh){child.geometry?.dispose();child.material?.dispose();}});
}
}

// ===== AI =====
function aiUpd(f,o){
f.aiT--;if(f.aiT>0)return;
const dx=o.x-f.x;const d=Math.abs(dx);f.fc=dx>0?1:-1;
if(o.attacking&&d<1.5&&Math.random()<0.35){f.blocking=true;f.state='block';f.aiT=10;return;}
f.blocking=false;
if(d>2.5){f.x+=Math.sign(dx)*f.c.spd*0.014;f.state='walk';f.aiT=2;}
else if(d>1.2){if(Math.random()<0.4){doAtk(f,'hp');f.aiT=14;}else{f.x+=Math.sign(dx)*f.c.spd*0.014;f.state='walk';f.aiT=3;}}
else{const r=Math.random();if(r<0.25)doAtk(f,'lp');else if(r<0.45)doAtk(f,'hk');
else if(r<0.6)doAtk(f,'sp1');else if(r<0.7)doAtk(f,'sweep');else doAtk(f,'lp');f.aiT=8;}
if(f.meter>=f.maxMeter&&d<2){doAtk(f,'super');f.meter=0;f.aiT=40;}
}

// ===== COMBAT =====
function doAtk(f,m){if(f.attacking||f.hit||f.dead)return;
f.attacking=true;f.atk=m;f.atkF=0;f.state='attack';snd(m==='lp'||m==='lk'?'hit_l':'hit_h');}

function updF(f,o){
f.anim+=0.016;
if(f.y>0||f.vy!==0){f.vy-=0.02;f.y+=f.vy;if(f.y<=0){f.y=0;f.vy=0;}}
if(!f.dead)f.mdl.position.y=f.y;
f.x=Math.max(-4.5,Math.min(4.5,f.x));
if(f.attacking){const mv=MV[f.atk];if(!mv){f.attacking=false;return;}
f.atkF++;
if(f.atkF>=mv.s&&f.atkF<=mv.s+mv.a){
const dist=Math.abs(o.x-f.x);const rng=f.atk==='sp1'||f.atk==='sp2'||f.atk==='sp3'?2.2:f.atk==='super'?2.5:1.3;
if(dist<rng&&!o.hit&&!o.blocking&&!o.dead){applyHit(f,o);}
else if(dist<rng&&o.blocking){snd('block');emitSpark((f.x+o.x)/2,1.3,0.2,3,0x88ccff,0.08);}}
if(f.atkF>=mv.s+mv.a+mv.r){f.attacking=false;f.atk=null;f.state='idle';}}
if(f.hit){f.hitT--;if(f.hitT<=0){f.hit=false;f.state='idle';}}
if(f.comboT>0){f.comboT--;if(f.comboT<=0){f.comboN=0;f.comboD=0;}}
}

function applyHit(a,d){
const mv=MV[a.atk];const dm=mv.d;
d.hp=Math.max(0,d.hp-dm);d.hit=true;d.hitT=10;d.state='hit';d.x+=a.fc*mv.k;
a.meter=Math.min(a.maxMeter,a.meter+dm*0.3);d.meter=Math.min(d.maxMeter,d.meter+dm*0.15);
a.comboN++;a.comboD+=dm;a.comboT=40;
const hx=(a.x+d.x)/2;
emitSpark(hx,1.2+Math.random()*0.3,0.15,10,0xff8800,0.18);
if(dm>=80){emitSpark(hx,1.0,0.1,5,0x880000,0.12);screenFlash();camShake(dm/80*0.08);hitstop(dm>=150?8:4);}
else{camShake(0.03);hitstop(3);}
if(dm>=150)snd('super');
}

// ===== PLAYER INPUT =====
function pInput(f,o){
const dx=o.x-f.x;f.fc=dx>0?1:-1;
f.blocking=!!I.bl;if(f.blocking){f.state='block';return;}
if(!f.attacking&&!f.hit){
if(jp('u')&&f.y<=0.01){f.vy=0.25;}
if(I.l){f.x-=f.c.spd*0.014;f.state='walk';}
else if(I.r){f.x+=f.c.spd*0.014;f.state='walk';}
else f.state='idle';}
if(f.attacking)return;
if(f.meter>=f.maxMeter&&isQCF(f.fc)&&(jp('lp')||jp('hp'))){doAtk(f,'super');f.meter=0;return;}
if(isQCF(f.fc)&&(jp('lp')||jp('hp'))){doAtk(f,'sp1');return;}
if(isQCB(f.fc)&&(jp('lk')||jp('hk'))){doAtk(f,'sp2');return;}
if(isDP(f.fc)&&(jp('lp')||jp('hp'))){doAtk(f,'sp3');return;}
if(jp('lp'))doAtk(f,'lp');else if(jp('hp'))doAtk(f,'hp');
else if(jp('lk'))doAtk(f,'lk');else if(jp('hk'))doAtk(f,'hk');
}

// ===== MAIN LOOP =====
const clock=new THREE.Clock();
function loop(){
requestAnimationFrame(loop);
const dt=Math.min(clock.getDelta(),0.05);

if(hitstopF>0){hitstopF--;renderer.render(scene,camera);return;}

if(G.st==='FIGHT'||G.st==='FINISH'){
uI();logDir();
if(G.p1&&G.p2){
if(G.st==='FIGHT'){
G.timer-=dt;if(G.timer<=0){G.timer=0;endRound();}
if(!G.p1.ai)pInput(G.p1,G.p2);
if(G.p2.ai)aiUpd(G.p2,G.p1);
updF(G.p1,G.p2);updF(G.p2,G.p1);
if((G.p1.hp<=0||G.p2.hp<=0)&&G.st==='FIGHT'){
const dead=G.p1.hp<=0?G.p1:G.p2;dead.state='ko';dead.dead=true;
G.st='FINISH';announce('FINISH HIM!',3000);snd('ko');
setTimeout(endRound,3500);}
}
// Always update animation
G.p1.updateAnim(dt);G.p2.updateAnim(dt);
// Camera
const cx=(G.p1.x+G.p2.x)/2;const dist=Math.abs(G.p1.x-G.p2.x);
camTarget.x=cx;camTarget.z=Math.max(4.5,dist*1.1+3);
updHUD();
}}

if(G.st==='RESET'&&G.p1&&G.p2){
G.p1.updateAnim(dt);G.p2.updateAnim(dt);
}

// Camera smooth follow + shake
camera.position.x+=(camTarget.x-camera.position.x)*0.06;
camera.position.z+=(camTarget.z-camera.position.z)*0.04;
camera.position.y+=(camTarget.y-camera.position.y)*0.03;
if(shakeI>0){camera.position.x+=(Math.random()-0.5)*shakeI;camera.position.y+=(Math.random()-0.5)*shakeI*0.5;shakeI*=0.85;if(shakeI<0.002)shakeI=0;}
camera.lookAt(camTarget.x,1.1,0);

updSparks();
renderer.render(scene,camera);
}

function endRound(){
if(G.st==='END')return;
const w=G.p1.hp>=G.p2.hp?G.p1:G.p2;w.wins++;
if(w.wins>=G.maxR){G.st='END';announce(w.c.name+' WINS!',3000);
setTimeout(()=>{document.getElementById('overlay').classList.remove('hidden');
document.getElementById('overlay').innerHTML=`<h1 style="color:#DAA520">${w.c.name}</h1><h2>VICTORY</h2><div class="prompt">PRESS ANY KEY</div>`;
document.getElementById('hud').style.display='none';},3200);}
else{G.round++;G.st='RESET';
setTimeout(()=>{G.p1.x=-2;G.p1.hp=G.p1.maxHp;G.p1.state='idle';G.p1.attacking=false;G.p1.dead=false;G.p1.meter=0;G.p1.mdl.position.y=0;G.p1.boneAcc={};
G.p2.x=2;G.p2.hp=G.p2.maxHp;G.p2.state='idle';G.p2.attacking=false;G.p2.dead=false;G.p2.meter=0;G.p2.mdl.position.y=0;G.p2.boneAcc={};
G.timer=99;G.st='FIGHT';announce('ROUND '+G.round+' \u2014 FIGHT!',2000);},2000);}
}

// Start
boot();
loop();
</script>
</body>
</html>
