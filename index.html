#mu{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;pointer-events:none}

.dp{position:absolute;bottom:18px;left:14px}
.dp button{position:absolute;width:52px;height:52px;border:2px solid rgba(255,255,255,0.35);

.dp .du{bottom:104px;left:52px}.dp .dd{bottom:0;left:52px}
.dp .dl{bottom:52px;left:0}.dp .dr{bottom:52px;left:104px}
.ab{position:absolute;bottom:18px;right:10px;display:grid;grid-template-columns:58px 58px;gap:7px}
.ab button{width:58px;height:58px;border:2.5px solid;border-radius:50%;
color:#fff;font-weight:800;font-size:9px;background:rgba(0,0,0,0.6)}
.ab .b1{border-color:#ff0}.ab .b2{border-color:#f44}
.ab .b3{border-color:#4af}.ab .b4{border-color:#4f8}
.bl{position:absolute;bottom:84px;right:138px}
.bl button{width:52px;height:52px;border:2px solid #fa0;border-radius:14px;
background:rgba(0,0,0,0.6);color:#fff;font-size:9px;font-weight:800}
@media(hover:none)and(pointer:coarse){#mu{display:block}}
@media(min-width:769px){#mu{display:none!important}}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;pointer-events:none;

#overlay.active{pointer-events:auto;background:rgba(0,0,0,0.85)}

#overlay .menu-item.sel{color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.3)}
#overlay .menu-item:hover{color:#fff}
.hud-bar{position:absolute;top:15px;height:22px;border:2px solid rgba(120,100,40,0.8);
background:rgba(0,0,0,0.8);overflow:hidden}
.hud-bar-left{left:50px;right:calc(50% + 40px);border-radius:0 4px 4px 0;
clip-path:polygon(0 0,100% 0,97% 100%,0 100%)}
.hud-bar-right{right:50px;left:calc(50% + 40px);border-radius:4px 0 0 4px;
clip-path:polygon(3% 0,100% 0,100% 100%,0 100%)}
.hud-fill{height:100%;transition:width 0.3s;border-radius:2px}
.hud-fill-left{float:right;background:linear-gradient(to bottom,#00dd44,#008822)}
.hud-fill-right{float:left;background:linear-gradient(to bottom,#00dd44,#008822)}
.hud-fill.low{background:linear-gradient(to bottom,#dd2200,#881100)!important}
.hud-fill.mid{background:linear-gradient(to bottom,#ddaa00,#886600)!important}
.hud-name{position:absolute;top:40px;color:#aaa;font-size:11px;font-weight:bold}
.hud-name-left{left:55px}.hud-name-right{right:55px}
.hud-round{position:absolute;top:12px;left:50%;transform:translateX(-50%);color:#888;font-size:12px}
.hud-timer{position:absolute;top:28px;left:50%;transform:translateX(-50%);color:#ddd;font-size:22px;font-weight:bold}
.hud-combo{position:absolute;top:40%;color:#ff8800;font-size:24px;font-weight:bold;text-shadow:0 0 10px rgba(255,136,0,0.5)}
.hud-combo-left{left:80px}.hud-combo-right{right:80px}
.hud-meter{position:absolute;top:42px;height:6px;background:rgba(0,0,0,0.7);border:1px solid rgba(100,80,30,0.6)}
.hud-meter-left{left:55px;width:150px}.hud-meter-right{right:55px;width:150px}
.hud-meter-fill{height:100%;background:linear-gradient(to right,#cc8800,#ffd700);width:0%}
.announce{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);
color:#ff0000;font-size:3em;font-weight:bold;text-shadow:0 0 30px rgba(255,0,0,0.7);
animation:pulse 0.5s infinite alternate}
@keyframes pulse{from{transform:translate(-50%,-50%) scale(1)}to{transform:translate(-50%,-50%) scale(1.05)}}

/* === THREE.JS SETUP === */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);
camera.position.set(0,2.2,7);camera.lookAt(0,1.2,0);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('gc'),antialias:true,alpha:false});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=0.8;
renderer.outputEncoding=THREE.sRGBEncoding;
scene.background=new THREE.Color(0x050508);
scene.fog=new THREE.Fog(0x050508,8,20);

addEventListener('resize',()=>{
camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);});

/* === LIGHTING (MKX Style: dark, strong rim, warm key) === */
const ambLight=new THREE.AmbientLight(0x151520,0.4);scene.add(ambLight);
const keyLight=new THREE.DirectionalLight(0xffeedd,1.2);

keyLight.shadow.mapSize.set(1024,1024);
keyLight.shadow.camera.near=0.5;keyLight.shadow.camera.far=15;
keyLight.shadow.camera.left=-5;keyLight.shadow.camera.right=5;
keyLight.shadow.camera.top=5;keyLight.shadow.camera.bottom=-1;
scene.add(keyLight);
const rimLight=new THREE.DirectionalLight(0x4488cc,0.8);
rimLight.position.set(2,3,-3);scene.add(rimLight);
const fillLight=new THREE.DirectionalLight(0x221133,0.3);
fillLight.position.set(0,1,5);scene.add(fillLight);

/* === FLOOR === */
const floorGeo=new THREE.PlaneGeometry(20,10);
const floorMat=new THREE.MeshStandardMaterial({color:0x0a0a0a,roughness:0.8,metalness:0.1});
const floor=new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);

/* === 3D CHARACTER BUILDER === */
/* Each fighter is built from primitive geometries with PBR materials */
/* Body parts: head, neck, chest, waist, upper arms, forearms, hands, thighs, shins, feet */

function createCharMaterial(color,opts={}){
return new THREE.MeshStandardMaterial({
color:new THREE.Color(color),
roughness:opts.roughness||0.6,
metalness:opts.metalness||0.05,
emissive:new THREE.Color(opts.emissive||0x000000),
emissiveIntensity:opts.emissiveIntensity||0,
});
}

function buildFighter3D(charData){
const group=new THREE.Group();
const sk=charData.skin3d;const out=charData.outfit3d;
const body=charData.body;
const hScale=body.height/180;

// Materials
const skinMat=createCharMaterial(sk.base,{roughness:0.55});
const outfitTopMat=createCharMaterial(out.topColor,{roughness:out.topRough||0.7,metalness:out.topMetal||0});
const outfitBotMat=createCharMaterial(out.botColor,{roughness:0.7});
const bootMat=createCharMaterial(out.bootColor,{roughness:0.8});
const hairMat=createCharMaterial(charData.hair3d.color,{roughness:0.9});
const beltMat=createCharMaterial(out.beltColor||0x333333,{roughness:0.4,metalness:0.6});

// TORSO (chest)
const chestW=body.shoulder/100*hScale;const chestH=0.55*hScale;const chestD=0.3*hScale;
const chestGeo=new THREE.BoxGeometry(chestW,chestH,chestD);
// Taper the chest (V-shape) using vertex manipulation
const chestPos=chestGeo.attributes.position;
for(let i=0;i<chestPos.count;i++){
const y=chestPos.getY(i);const x=chestPos.getX(i);
if(y<0)chestPos.setX(i,x*0.75);// Narrow at waist
}
chestGeo.computeVertexNormals();
const chest=new THREE.Mesh(chestGeo,outfitTopMat);
chest.position.y=1.35*hScale;chest.castShadow=true;
group.add(chest);group.userData.chest=chest;

// WAIST/HIPS
const waistGeo=new THREE.BoxGeometry(chestW*0.72,0.2*hScale,chestD*0.85);
const waist=new THREE.Mesh(waistGeo,outfitBotMat);
waist.position.y=1.05*hScale;waist.castShadow=true;
group.add(waist);

// BELT
const beltGeo=new THREE.BoxGeometry(chestW*0.75,0.06*hScale,chestD*0.9);
const belt=new THREE.Mesh(beltGeo,beltMat);
belt.position.y=1.12*hScale;belt.castShadow=true;
group.add(belt);

// HEAD
const headR=0.13*hScale;
const headGeo=new THREE.SphereGeometry(headR,12,10);
headGeo.scale(1,1.15,0.95);// Slightly elongated
const head=new THREE.Mesh(headGeo,skinMat);
head.position.y=1.78*hScale;head.castShadow=true;
group.add(head);group.userData.head=head;

// HAIR (simple shape on top of head)
const hairGeo=new THREE.SphereGeometry(headR*1.05,10,8,0,Math.PI*2,0,Math.PI*0.6);
const hair=new THREE.Mesh(hairGeo,hairMat);
hair.position.y=1.78*hScale+headR*0.15;hair.castShadow=true;
group.add(hair);

// NECK
const neckGeo=new THREE.CylinderGeometry(0.05*hScale,0.07*hScale,0.12*hScale,8);
const neck=new THREE.Mesh(neckGeo,skinMat);
neck.position.y=1.65*hScale;
group.add(neck);

// EYES (small emissive spheres)
const eyeGeo=new THREE.SphereGeometry(0.015*hScale,6,6);
const eyeMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:new THREE.Color(charData.face3d.eyeColor||0x4488ff),emissiveIntensity:0.3});
const eyeL=new THREE.Mesh(eyeGeo,eyeMat);eyeL.position.set(-0.04*hScale,1.8*hScale,headR*0.8);
const eyeR=new THREE.Mesh(eyeGeo,eyeMat);eyeR.position.set(0.04*hScale,1.8*hScale,headR*0.8);
group.add(eyeL,eyeR);

// UPPER ARMS
const armR_upper=createLimb(0.06*hScale,0.05*hScale,0.3*hScale,outfitTopMat);
armR_upper.position.set(chestW/2+0.04,1.45*hScale,0);armR_upper.rotation.z=-0.3;
armR_upper.castShadow=true;group.add(armR_upper);group.userData.armR_upper=armR_upper;

const armL_upper=createLimb(0.06*hScale,0.05*hScale,0.3*hScale,outfitTopMat);
armL_upper.position.set(-chestW/2-0.04,1.45*hScale,0);armL_upper.rotation.z=0.3;
armL_upper.castShadow=true;group.add(armL_upper);group.userData.armL_upper=armL_upper;

// FOREARMS
const armR_fore=createLimb(0.05*hScale,0.04*hScale,0.28*hScale,skinMat);
armR_fore.position.set(chestW/2+0.12,1.15*hScale,0);armR_fore.rotation.z=-0.2;
armR_fore.castShadow=true;group.add(armR_fore);group.userData.armR_fore=armR_fore;

const armL_fore=createLimb(0.05*hScale,0.04*hScale,0.28*hScale,skinMat);
armL_fore.position.set(-chestW/2-0.12,1.15*hScale,0);armL_fore.rotation.z=0.2;
armL_fore.castShadow=true;group.add(armL_fore);group.userData.armL_fore=armL_fore;

// HANDS (fists)
const fistGeo=new THREE.SphereGeometry(0.04*hScale,8,6);
const fistR=new THREE.Mesh(fistGeo,skinMat);
fistR.position.set(chestW/2+0.18,0.88*hScale,0);fistR.castShadow=true;
group.add(fistR);group.userData.fistR=fistR;
const fistL=new THREE.Mesh(fistGeo,skinMat);
fistL.position.set(-chestW/2-0.18,0.88*hScale,0);fistL.castShadow=true;
group.add(fistL);group.userData.fistL=fistL;

// THIGHS
const thighR=createLimb(0.08*hScale,0.06*hScale,0.35*hScale,outfitBotMat);
thighR.position.set(0.08*hScale,0.72*hScale,0);thighR.castShadow=true;
group.add(thighR);group.userData.thighR=thighR;
const thighL=createLimb(0.08*hScale,0.06*hScale,0.35*hScale,outfitBotMat);
thighL.position.set(-0.08*hScale,0.72*hScale,0);thighL.castShadow=true;
group.add(thighL);group.userData.thighL=thighL;

// SHINS
const shinR=createLimb(0.06*hScale,0.05*hScale,0.33*hScale,outfitBotMat);
shinR.position.set(0.08*hScale,0.35*hScale,0);shinR.castShadow=true;
group.add(shinR);group.userData.shinR=shinR;
const shinL=createLimb(0.06*hScale,0.05*hScale,0.33*hScale,outfitBotMat);
shinL.position.set(-0.08*hScale,0.35*hScale,0);shinL.castShadow=true;
group.add(shinL);group.userData.shinL=shinL;

// BOOTS/FEET
const bootGeo=new THREE.BoxGeometry(0.09*hScale,0.08*hScale,0.16*hScale);
const bootR=new THREE.Mesh(bootGeo,bootMat);
bootR.position.set(0.08*hScale,0.04*hScale,0.02);bootR.castShadow=true;
group.add(bootR);group.userData.bootR=bootR;
const bootL=new THREE.Mesh(bootGeo,bootMat);
bootL.position.set(-0.08*hScale,0.04*hScale,0.02);bootL.castShadow=true;
group.add(bootL);group.userData.bootL=bootL;

// CAPE (if character has one)
if(out.cape){
const capeGeo=new THREE.PlaneGeometry(chestW*1.2,0.7*hScale,4,8);
const capeMat=createCharMaterial(out.cape,{roughness:0.8});
capeMat.side=THREE.DoubleSide;
const cape=new THREE.Mesh(capeGeo,capeMat);
cape.position.set(0,1.3*hScale,-chestD/2-0.05);cape.castShadow=true;
group.add(cape);group.userData.cape=cape;
}

// SHOULDER PADS (if details include them)
if(out.shoulders){
const padGeo=new THREE.SphereGeometry(0.08*hScale,8,6,0,Math.PI*2,0,Math.PI*0.5);
const padMat=createCharMaterial(out.shoulders,{roughness:0.3,metalness:0.7});
const padR=new THREE.Mesh(padGeo,padMat);padR.position.set(chestW/2+0.02,1.55*hScale,0);
const padL=new THREE.Mesh(padGeo,padMat);padL.position.set(-chestW/2-0.02,1.55*hScale,0);
padR.castShadow=true;padL.castShadow=true;
group.add(padR,padL);
}

group.userData.hScale=hScale;
return group;
}

function createLimb(topR,botR,height,mat){
const geo=new THREE.CylinderGeometry(topR,botR,height,8);
const mesh=new THREE.Mesh(geo,mat);
return mesh;
}

const IBUF=[];
function logDir(){const d=(I.d?'D':'')+(I.u?'U':'')+(I.l?'L':'')+(I.r?'R':'');
if(IBUF.length===0||IBUF[IBUF.length-1].d!==d){IBUF.push({d,t:performance.now()});if(IBUF.length>30)IBUF.shift();}}
function chkMotion(seq,fc){const now=performance.now();let si=seq.length-1;
for(let i=IBUF.length-1;i>=0&&si>=0;i--){if(now-IBUF[i].t>400)break;
let ex=seq[si];if(fc===-1)ex=ex.replace('R','$').replace('L','R').replace('$','L');
if(IBUF[i].d===ex)si--;}return si<0;}
function isQCF(fc){return chkMotion(['D','DR','R'],fc)||chkMotion(['D','R'],fc);}
function isQCB(fc){return chkMotion(['D','DL','L'],fc)||chkMotion(['D','L'],fc);}
function isDP(fc){return chkMotion(['R','D','DR'],fc)||chkMotion(['R','DR'],fc);}

const sparkPool=[];const MAX_SPARKS=60;
for(let i=0;i<MAX_SPARKS;i++){
const geo=new THREE.SphereGeometry(0.03,4,4);
const mat=new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0});
const m=new THREE.Mesh(geo,mat);m.visible=false;
scene.add(m);sparkPool.push({mesh:m,vx:0,vy:0,vz:0,life:0,maxLife:0});}
let spIdx=0;
function emit3D(x,y,z,count,color,speed){
for(let i=0;i<count;i++){const sp=sparkPool[spIdx];spIdx=(spIdx+1)%MAX_SPARKS;
sp.mesh.visible=true;sp.mesh.position.set(x,y,z);
sp.mesh.material.color.set(color||0xff8800);sp.mesh.material.opacity=1;
sp.vx=(Math.random()-0.5)*speed;sp.vy=Math.random()*speed*0.8;sp.vz=(Math.random()-0.5)*speed*0.5;
sp.life=0;sp.maxLife=20+Math.random()*15;}}
function updateSparks(){for(const sp of sparkPool){if(!sp.mesh.visible)continue;
sp.life++;if(sp.life>=sp.maxLife){sp.mesh.visible=false;continue;}
sp.vy-=0.015;sp.mesh.position.x+=sp.vx;sp.mesh.position.y+=sp.vy;sp.mesh.position.z+=sp.vz;
sp.mesh.material.opacity=1-sp.life/sp.maxLife;}}

this.vx=0;this.vy=0;this.fc=facing;
this.hp=c.hp;this.maxHp=c.hp;this.meter=0;this.maxMeter=300;
this.state='idle';this.stateTimer=0;this.anim=0;
this.attacking=false;this.curAtk=null;this.atkFrame=0;
this.hit=false;this.hitTimer=0;this.blocking=false;
this.crouching=false;this.airborne=false;

/* === 3D ANIMATION === */
function animateFighter(f,dt){
f.anim+=dt*3;
const m=f.model;const ud=m.userData;const t=f.anim;
const hs=ud.hScale||1;

// Idle bob
if(f.state==='idle'){
const bob=Math.sin(t*2)*0.01;
m.position.y=bob;
if(ud.chest)ud.chest.rotation.z=Math.sin(t*1.5)*0.02;
// Arms guard position
if(ud.armR_upper){ud.armR_upper.rotation.z=-0.4+Math.sin(t*1.8)*0.05;ud.armR_upper.rotation.x=0.3;}
if(ud.armL_upper){ud.armL_upper.rotation.z=0.4+Math.sin(t*1.8+1)*0.05;ud.armL_upper.rotation.x=0.3;}
if(ud.thighR){ud.thighR.rotation.x=Math.sin(t*0.8)*0.03;}
if(ud.thighL){ud.thighL.rotation.x=-Math.sin(t*0.8)*0.03;}
}
else if(f.state==='walk'){
if(ud.thighR){ud.thighR.rotation.x=Math.sin(t*6)*0.4;}
if(ud.thighL){ud.thighL.rotation.x=-Math.sin(t*6)*0.4;}
if(ud.armR_upper){ud.armR_upper.rotation.x=-Math.sin(t*6)*0.3;}
if(ud.armL_upper){ud.armL_upper.rotation.x=Math.sin(t*6)*0.3;}
}
else if(f.state==='attack'){
const mv=MV[f.curAtk];if(!mv)return;
const prog=f.atkFrame/(mv.su+mv.ac+mv.rc);
const swing=Math.sin(prog*Math.PI);
if(f.curAtk==='lp'||f.curAtk==='hp'){
if(ud.armR_upper){ud.armR_upper.rotation.x=-1.2*swing;ud.armR_upper.rotation.z=-0.2;}
if(ud.fistR){ud.fistR.position.z=0.3*swing*hs;}
if(ud.chest){ud.chest.rotation.y=-0.2*swing*f.fc;}
}
else if(f.curAtk==='lk'||f.curAtk==='hk'){
if(ud.thighR){ud.thighR.rotation.x=-1.0*swing;}
if(ud.shinR){ud.shinR.position.z=0.2*swing*hs;}
if(ud.chest){ud.chest.rotation.y=0.15*swing*f.fc;}
}
else if(f.curAtk==='sweep'){
if(ud.thighR){ud.thighR.rotation.x=-0.5;ud.thighR.rotation.z=-0.8*swing;}
m.position.y=-0.2*swing;
}
else if(f.curAtk&&f.curAtk.startsWith('special')){
if(ud.armR_upper){ud.armR_upper.rotation.x=-1.5*swing;ud.armR_upper.rotation.z=-0.8*swing;}
if(ud.armL_upper){ud.armL_upper.rotation.x=-1.0*swing;}
if(ud.chest){ud.chest.rotation.y=-0.3*swing*f.fc;}
}
else if(f.curAtk==='super'){
const scale=1+0.1*swing;
m.scale.set(f.fc*scale,scale,scale);
if(ud.armR_upper){ud.armR_upper.rotation.x=-2.0*swing;}
if(ud.armL_upper){ud.armL_upper.rotation.x=-1.5*swing;}
}
}
else if(f.state==='hit'){
if(ud.chest){ud.chest.rotation.z=0.15;ud.chest.rotation.x=-0.1;}
m.position.y=-0.05;
if(ud.head){ud.head.rotation.z=0.2;}
}
else if(f.state==='block'){
if(ud.armR_upper){ud.armR_upper.rotation.x=0.8;ud.armR_upper.rotation.z=-0.6;}
if(ud.armL_upper){ud.armL_upper.rotation.x=0.8;ud.armL_upper.rotation.z=0.6;}
}
else if(f.state==='ko'){
m.rotation.x=Math.min(m.rotation.x+0.02,-Math.PI/3*-1);
m.position.y=Math.max(m.position.y-0.01,-0.3);
}

// Reset rotations when not in specific state
if(f.state!=='attack'&&f.state!=='hit'&&f.state!=='ko'){
if(ud.chest){ud.chest.rotation.y*=0.9;ud.chest.rotation.x*=0.9;}
if(ud.head){ud.head.rotation.z*=0.9;}
m.scale.set(f.fc,1,1);
}

// Update position
m.position.x=f.x;
m.position.z=0;

// Cape physics
if(ud.cape){
const capeVerts=ud.cape.geometry.attributes.position;
for(let i=0;i<capeVerts.count;i++){
const y=capeVerts.getY(i);
if(y<0){// Lower part of cape
capeVerts.setZ(i,Math.sin(t*2+i*0.5)*0.05-0.05);
capeVerts.setX(i,capeVerts.getX(i)+Math.sin(t*1.5+i*0.3)*0.002);
}}
ud.cape.geometry.attributes.position.needsUpdate=true;
}
}

/* === AI === */
function aiUpdate(f,opp,diff){
f.aiTimer--;if(f.aiTimer>0)return;
const dx=opp.x-f.x;const dist=Math.abs(dx);
f.fc=dx>0?1:-1;f.model.scale.set(f.fc,1,1);
const react=diff===2?6:diff===1?12:20;
const aggro=diff===2?0.7:diff===1?0.5:0.3;

if(opp.attacking&&dist<1.5&&Math.random()<(diff*0.2+0.1)){
f.blocking=true;f.state='block';f.aiTimer=react;return;}
f.blocking=false;

if(dist>3){f.x+=Math.sign(dx)*f.c.spd*0.015;f.state='walk';f.aiTimer=3;}
else if(dist>1.8){
if(Math.random()<aggro*0.4){doAttack(f,'special1');f.aiTimer=35;}
else{f.x+=Math.sign(dx)*f.c.spd*0.015;f.state='walk';f.aiTimer=4;}}
else if(dist>0.8){
const r=Math.random();
if(r<aggro*0.3){doAttack(f,'lp');f.aiTimer=react*0.6;}
else if(r<aggro*0.6){doAttack(f,'hk');f.aiTimer=react;}
else if(r<aggro*0.8){doAttack(f,'sweep');f.aiTimer=react*1.2;}
else{f.aiTimer=react*0.5;}}
else{
if(Math.random()<0.3){doAttack(f,'throw_f');f.aiTimer=react*1.5;}
else{doAttack(f,'lp');f.aiTimer=react*0.5;}}

if(f.meter>=f.maxMeter&&dist<2&&Math.random()<aggro){
doAttack(f,'super');f.meter=0;f.aiTimer=50;}
}

/* === COMBAT === */
function doAttack(f,mv){
if(f.attacking||f.hit||f.dead)return;
f.attacking=true;f.curAtk=mv;f.atkFrame=0;f.state='attack';
snd(mv==='lp'||mv==='lk'?'hit_l':'hit_h');
}

function updateFighter(f,opp){
f.anim+=0.016;
// Gravity
if(f.y>0||f.vy>0){f.vy-=0.025;f.y+=f.vy;
if(f.y<=0){f.y=0;f.vy=0;f.airborne=false;}}
// Boundaries
f.x=Math.max(-4,Math.min(4,f.x));
// Attack
if(f.attacking){
const mv=MV[f.curAtk];if(!mv){f.attacking=false;return;}
f.atkFrame++;
if(f.atkFrame>=mv.su&&f.atkFrame<=mv.su+mv.ac){
const dist=Math.abs(opp.x-f.x);
if(dist<mv.rg&&!opp.hit&&!opp.blocking&&!opp.dead){
applyHit(f,opp,f.curAtk,mv);}
else if(dist<mv.rg&&opp.blocking){
snd('block');opp.meter=Math.min(opp.maxMeter,opp.meter+5);
emit3D(opp.x-f.fc*0.3,1.2,0.2,3,0x88ccff,0.08);}}
if(f.atkFrame>=mv.su+mv.ac+mv.rc){f.attacking=false;f.curAtk=null;f.state='idle';}}
// Hit stun
if(f.hit){f.hitTimer--;if(f.hitTimer<=0){f.hit=false;f.state='idle';}}
// Combo timer
if(f.comboTimer>0){f.comboTimer--;if(f.comboTimer<=0){f.comboCount=0;f.comboDmg=0;}}
}

function applyHit(atk,def,mvName,mv){
let dm=mv.dm;
def.hp=Math.max(0,def.hp-dm);def.hit=true;def.hitTimer=12;def.state='hit';
def.x+=atk.fc*mv.kb;
atk.meter=Math.min(atk.maxMeter,atk.meter+dm*0.3);
def.meter=Math.min(def.maxMeter,def.meter+dm*0.15);
atk.comboCount++;atk.comboDmg+=dm;atk.comboTimer=45;
// 3D sparks
const hx=(atk.x+def.x)/2;
emit3D(hx,1.2+Math.random()*0.3,0.1,8,0xff8800,0.15);
if(dm>=80)emit3D(hx,1.0,0,4,0x880000,0.1);// Blood
// Camera shake
camera.position.x+=(Math.random()-0.5)*0.05*dm/50;
camera.position.y+=(Math.random()-0.5)*0.03*dm/50;
}

if(this.p1){this.p1.destroy();}
if(this.p2){this.p2.destroy();}
this.p1=new Fighter(this.selP1,-2,1);
this.p2=new Fighter(this.selP2,2,-1);
if(this.mode==='arcade'||this.mode==='training')this.p2.ai=true;
this.round=1;this.timer=99;this.st='FIGHT';
this.showOverlay('fight');
document.getElementById('name1').textContent=this.p1.c.name;
document.getElementById('name2').textContent=this.p2.c.name;
document.getElementById('hud').style.display='block';
announce('ROUND 1 — FIGHT!',2000);
// Set stage lighting
this.setStage();
},

setStage(){
// Random stage atmosphere
const stages=[
{bg:0x050508,fog:0x050508,key:0xffeedd,rim:0x4488cc},// Dark
{bg:0x020210,fog:0x020210,key:0xaabbff,rim:0x2244aa},// Night blue
{bg:0x0a0505,fog:0x0a0505,key:0xff8844,rim:0x8844ff},// Warm red
{bg:0x030308,fog:0x030308,key:0x88ffaa,rim:0x44aa88},// Green
{bg:0x080808,fog:0x080808,key:0xffffff,rim:0xff4444},// White/red
];
const s=stages[Math.floor(Math.random()*stages.length)];
scene.background.set(s.bg);scene.fog.color.set(s.fog);
keyLight.color.set(s.key);rimLight.color.set(s.rim);
},

update(){
if(this.st!=='FIGHT')return;
uI();logDir();
const p1=this.p1,p2=this.p2;
if(!p1||!p2)return;

// Timer
this.timer-=1/60;if(this.timer<=0){this.timer=0;this.endRound();}

// AI
if(p2.ai)aiUpdate(p2,p1,this.difficulty);

// Player input
if(!p1.ai)playerInput(p1,p2);

// Update
updateFighter(p1,p2);updateFighter(p2,p1);

// Check KO
if((p1.hp<=0||p2.hp<=0)&&this.st==='FIGHT'){
const dead=p1.hp<=0?p1:p2;
dead.state='ko';dead.dead=true;
this.st='FINISH';this.finishTimer=180;
announce('FINISH HIM!',3000);snd('finish');
}

// Finish timer
if(this.st==='FINISH'){this.finishTimer--;
if(this.finishTimer<=0)this.endRound();}

// Animate 3D
animateFighter(p1,0.016);animateFighter(p2,0.016);
updateSparks();

// Camera follow
const cx=(p1.x+p2.x)/2;const dist=Math.abs(p1.x-p2.x);
const cz=Math.max(5,dist*1.2+3);
camera.position.x+=(cx-camera.position.x)*0.05;
camera.position.z+=(cz-camera.position.z)*0.03;
camera.position.y+=(2.0-camera.position.y)*0.02;
camera.lookAt(cx,1.2,0);

// HUD update
updateHUD(p1,p2);
},

endRound(){
const winner=this.p1.hp>this.p2.hp?this.p1:this.p2;
winner.wins++;snd('ko');
if(winner.wins>=this.maxRounds){
this.st='END';announce(winner.c.name+' WINS!',3000);
setTimeout(()=>{this.showOverlay('end');},3000);
}else{
this.round++;
setTimeout(()=>{this.resetRound();},2000);}
},

resetRound(){
this.p1.x=-2;this.p1.y=0;this.p1.hp=this.p1.maxHp;this.p1.state='idle';
this.p1.attacking=false;this.p1.dead=false;this.p1.meter=0;this.p1.model.rotation.x=0;
this.p2.x=2;this.p2.y=0;this.p2.hp=this.p2.maxHp;this.p2.state='idle';
this.p2.attacking=false;this.p2.dead=false;this.p2.meter=0;this.p2.model.rotation.x=0;
this.timer=99;this.st='FIGHT';
announce('ROUND '+this.round+' — FIGHT!',2000);
}
};

function playerInput(f,opp){
const dx=opp.x-f.x;f.fc=dx>0?1:-1;f.model.scale.set(f.fc,1,1);
f.blocking=!!I.bl;if(f.blocking){f.state='block';return;}
if(!f.attacking&&!f.hit){
if(I.u&&!IP.u&&f.y<=0.01){f.vy=0.3;f.airborne=true;}
f.crouching=!!I.d;
if(I.l){f.x-=f.c.spd*0.015;f.state='walk';}
else if(I.r){f.x+=f.c.spd*0.015;f.state='walk';}
else f.state=f.crouching?'crouch':'idle';
}
if(f.attacking)return;
// Specials
if(f.meter>=f.maxMeter&&isQCF(f.fc)&&(jp('lp')||jp('hp'))){
doAttack(f,'super');f.meter=0;snd('super');return;}
if(isQCF(f.fc)&&(jp('lp')||jp('hp'))){doAttack(f,'special1');snd('special');return;}
if(isQCB(f.fc)&&(jp('lk')||jp('hk'))){doAttack(f,'special2');snd('special');return;}
if(isDP(f.fc)&&(jp('lp')||jp('hp'))){doAttack(f,'special3');snd('special');return;}
// Normals
if(jp('lp'))doAttack(f,'lp');
else if(jp('hp'))doAttack(f,'hp');
else if(jp('lk'))doAttack(f,'lk');
else if(jp('hk'))doAttack(f,'hk');
}

function updateHUD(p1,p2){
const hp1El=document.getElementById('hp1');
const hp2El=document.getElementById('hp2');
const pct1=Math.max(0,p1.hp/p1.maxHp*100);
const pct2=Math.max(0,p2.hp/p2.maxHp*100);
hp1El.style.width=pct1+'%';
hp2El.style.width=pct2+'%';
hp1El.className='hud-fill hud-fill-left'+(pct1<25?' low':pct1<50?' mid':'');
hp2El.className='hud-fill hud-fill-right'+(pct2<25?' low':pct2<50?' mid':'');
document.getElementById('timerDisp').textContent=Math.ceil(G.timer);
document.getElementById('roundDisp').textContent='ROUND '+G.round;
document.getElementById('meter1').style.width=(p1.meter/p1.maxMeter*100)+'%';
document.getElementById('meter2').style.width=(p2.meter/p2.maxMeter*100)+'%';
// Combos
const c1=document.getElementById('combo1');const c2=document.getElementById('combo2');
if(p1.comboCount>1&&p1.comboTimer>0){c1.style.display='block';c1.textContent=p1.comboCount+' HITS '+p1.comboDmg+' DMG';}
else c1.style.display='none';
if(p2.comboCount>1&&p2.comboTimer>0){c2.style.display='block';c2.textContent=p2.comboCount+' HITS '+p2.comboDmg+' DMG';}
else c2.style.display='none';
}

function announce(text,duration){
const el=document.getElementById('announceDiv');
el.textContent=text;el.style.display='block';
setTimeout(()=>{el.style.display='none';},duration);
}

/* === MAIN LOOP === */
function gameLoop(){
requestAnimationFrame(gameLoop);
G.update();
renderer.render(scene,camera);
}
gameLoop();

</script>
</body>
</html>
